<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>روسی برای فارسی‌زبان‌ها</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap');

:root{
  --bg:#0e1320; --bg2:#151c30; --card:#1b2540; --card2:#222e52;
  --ink:#eef2ff; --mut:#93a0c4; --dim:#5d6a92;
  --acc:#ff5d73; --acc2:#ffb454; --ok:#39d98a; --ru:#5b8cff;
  --line:rgba(255,255,255,.08); --glow:0 8px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Vazirmatn',system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%,#1d2747 0%,transparent 55%),
             radial-gradient(900px 500px at -10% 110%,#23173a 0%,transparent 50%),
             var(--bg);
  color:var(--ink);min-height:100vh;overflow-x:hidden;
}
.wrap{max-width:780px;margin:0 auto;padding:18px 16px 120px}

/* Header */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:10px}
.brand .dot{width:13px;height:13px;border-radius:50%;background:var(--acc);box-shadow:0 0 16px var(--acc)}
.brand h1{font-size:19px;font-weight:800;letter-spacing:.2px}
.brand small{display:block;color:var(--mut);font-weight:500;font-size:11.5px;margin-top:2px}
.streak{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#1a1020;font-weight:800;
  padding:7px 13px;border-radius:14px;font-size:13px;display:flex;align-items:center;gap:6px;box-shadow:var(--glow)}

/* Stat strip */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 10px;text-align:center}
.stat b{font-size:21px;font-weight:800;display:block;background:linear-gradient(135deg,#fff,var(--mut));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{font-size:11.5px;color:var(--mut)}

/* Tabs */
.tabs{display:flex;gap:7px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:6px;margin-bottom:18px;position:sticky;top:10px;z-index:40;backdrop-filter:blur(8px)}
.tab{flex:1;border:0;background:transparent;color:var(--mut);font-family:inherit;font-weight:700;font-size:13.5px;
  padding:11px 4px;border-radius:11px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab svg{width:19px;height:19px}
.tab.on{background:linear-gradient(135deg,var(--card2),var(--card));color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.tab.on svg{stroke:var(--acc)}

.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Category grid */
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;color:var(--ink);
  font-family:inherit;font-size:15px;padding:14px 16px;margin-bottom:16px;outline:none}
.search:focus{border-color:var(--ru)}
.search::placeholder{color:var(--dim)}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 15px;cursor:pointer;
  transition:.18s;position:relative;overflow:hidden}
.cat:active{transform:scale(.97)}
.cat::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--acc) 0%,transparent 60%);opacity:0;transition:.2s}
.cat:hover::after{opacity:.07}
.cat .ic{font-size:24px;margin-bottom:9px}
.cat h3{font-size:14.5px;font-weight:700;line-height:1.4;margin-bottom:5px}
.cat .n{font-size:11.5px;color:var(--mut);font-weight:600}
.cat .bar{height:4px;background:var(--bg2);border-radius:4px;margin-top:9px;overflow:hidden}
.cat .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),var(--ru));border-radius:4px;transition:.4s}

/* Word list */
.back{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);color:var(--ink);
  font-family:inherit;font-weight:700;font-size:14px;padding:11px 16px;border-radius:13px;cursor:pointer;margin-bottom:14px}
.word{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 17px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.word .ru{font-size:19px;font-weight:700;color:var(--ru);direction:ltr;text-align:left;flex:1}
.word .meta{text-align:left;direction:rtl;flex:1.2}
.word .tr{font-size:14px;color:var(--acc2);font-weight:600;margin-bottom:3px}
.word .fa{font-size:14px;color:var(--ink)}
.spk{background:var(--bg2);border:1px solid var(--line);border-radius:50%;width:40px;height:40px;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.spk:active{transform:scale(.88);background:var(--ru)}
.spk svg{width:19px;height:19px;stroke:var(--mut)}

/* Flashcard */
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:var(--mut);font-size:13px;font-weight:600}
.flash{perspective:1400px;height:340px;margin-bottom:18px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;cursor:pointer}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:26px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:26px;text-align:center;box-shadow:var(--glow)}
.fc-front{background:linear-gradient(150deg,var(--card2),var(--card));border:1px solid var(--line)}
.fc-back{background:linear-gradient(150deg,#2a1f3e,#1c2540);border:1px solid var(--line);transform:rotateY(180deg)}
.fc-front .big{font-size:42px;font-weight:800;color:var(--ru);direction:ltr;margin-bottom:14px;line-height:1.2}
.fc-front .hint{color:var(--dim);font-size:13px}
.fc-back .tr{font-size:24px;color:var(--acc2);font-weight:700;margin-bottom:14px}
.fc-back .fa{font-size:27px;font-weight:800;margin-bottom:10px}
.fc-back .ru2{font-size:17px;color:var(--ru);direction:ltr}
.fc-spk{margin-top:18px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:30px;
  padding:9px 18px;color:var(--ink);font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}
.srs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.srs button{border:0;font-family:inherit;font-weight:800;font-size:14px;padding:15px 6px;border-radius:15px;cursor:pointer;color:#11151f;transition:.15s;display:flex;flex-direction:column;gap:3px;align-items:center}
.srs button small{font-size:10.5px;opacity:.7;font-weight:600}
.srs button:active{transform:scale(.95)}
.s-bad{background:linear-gradient(135deg,#ff8a8a,var(--acc))}
.s-ok{background:linear-gradient(135deg,#ffd591,var(--acc2))}
.s-good{background:linear-gradient(135deg,#7bedb6,var(--ok))}
.fc-pick{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.fc-pick button{background:var(--card);border:1px solid var(--line);color:var(--mut);font-family:inherit;font-weight:600;
  font-size:12.5px;padding:8px 13px;border-radius:11px;cursor:pointer}
.fc-pick button.on{background:var(--ru);color:#fff;border-color:var(--ru)}

/* Quiz */
.q-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 20px;text-align:center;margin-bottom:16px;box-shadow:var(--glow)}
.q-card .ask{font-size:13px;color:var(--mut);margin-bottom:12px}
.q-card .word-ru{font-size:38px;font-weight:800;color:var(--ru);direction:ltr;margin-bottom:6px}
.q-card .word-tr{font-size:16px;color:var(--acc2);font-weight:600}
.opts{display:grid;gap:11px}
.opt{background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-family:inherit;font-weight:700;
  font-size:16px;padding:16px;border-radius:15px;cursor:pointer;transition:.15s;text-align:center}
.opt:active{transform:scale(.98)}
.opt.correct{background:rgba(57,217,138,.18);border-color:var(--ok);color:var(--ok)}
.opt.wrong{background:rgba(255,93,115,.18);border-color:var(--acc);color:var(--acc)}
.opt:disabled{cursor:default}
.q-next{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--ru),#7aa5ff);border:0;color:#fff;
  font-family:inherit;font-weight:800;font-size:16px;padding:16px;border-radius:16px;cursor:pointer;opacity:0;pointer-events:none;transition:.2s}
.q-next.show{opacity:1;pointer-events:auto}
.q-score{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.q-score div{text-align:center}
.q-score b{font-size:22px;font-weight:800;display:block}
.q-score span{font-size:11px;color:var(--mut)}

.empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:14px}
.cta{display:inline-block;margin-top:14px;background:var(--ru);color:#fff;padding:11px 22px;border-radius:13px;font-weight:700;border:0;font-family:inherit;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="top">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>روسی برای تو</h1>
        <small>۲۰۰۲ واژه از پایه تا پیشرفته · فارسی + تلفظ</small>
      </div>
    </div>
    <div class="streak">🔥 <span id="streak">0</span></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><b id="st-learned">0</b><span>یاد گرفته</span></div>
    <div class="stat"><b id="st-total">2002</b><span>کل واژه‌ها</span></div>
    <div class="stat"><b id="st-due">0</b><span>برای مرور</span></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" data-v="browse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      دسته‌ها
    </button>
    <button class="tab" data-v="flash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
      فلش‌کارت
    </button>
    <button class="tab" data-v="quiz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      آزمون
    </button>
  </div>

  <!-- BROWSE -->
  <div class="view on" id="v-browse">
    <input class="search" id="search" placeholder="جستجو… (فارسی، روسی یا تلفظ)">
    <div class="cats" id="cats"></div>
    <div id="wordlist" style="display:none"></div>
  </div>

  <!-- FLASH -->
  <div class="view" id="v-flash">
    <div class="fc-pick" id="fc-pick"></div>
    <div class="fc-top"><span id="fc-cat">همه واژه‌ها</span><span id="fc-prog">0 / 0</span></div>
    <div class="flash"><div class="fc-inner" id="fc-inner">
      <div class="fc-face fc-front">
        <div class="big" id="fc-ru">—</div>
        <div class="hint">برای دیدن معنی لمس کن</div>
      </div>
      <div class="fc-face fc-back">
        <div class="tr" id="fc-tr"></div>
        <div class="fa" id="fc-fa"></div>
        <div class="ru2" id="fc-ru2"></div>
        <button class="fc-spk" id="fc-spk">🔊 تلفظ روسی</button>
      </div>
    </div></div>
    <div class="srs">
      <button class="s-bad" data-q="0">دوباره<small>~۱ دقیقه</small></button>
      <button class="s-ok" data-q="1">سخت بود<small>~۱۰ دقیقه</small></button>
      <button class="s-good" data-q="2">بلدم<small>فردا</small></button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="view" id="v-quiz">
    <div class="q-score">
      <div><b id="q-correct" style="color:var(--ok)">0</b><span>درست</span></div>
      <div><b id="q-wrong" style="color:var(--acc)">0</b><span>غلط</span></div>
      <div><b id="q-pct">0%</b><span>دقت</span></div>
    </div>
    <div class="q-card">
      <div class="ask">معنی این واژه چیست؟</div>
      <div class="word-ru" id="q-ru">—</div>
      <div class="word-tr" id="q-tr"></div>
    </div>
    <div class="opts" id="q-opts"></div>
    <button class="q-next" id="q-next">سوال بعدی ←</button>
  </div>
</div>

<script>
/* ---------- flatten ---------- */
const CATS = VOCAB_DATA.categories;
let ALL = [];
CATS.forEach((c,ci)=>c.words.forEach((w,wi)=>ALL.push({...w,cat:c.name,ci,id:ci+'_'+wi})));

const ICONS=['💬','❓','🔢','👨‍👩‍👧','❤️','💕','🍽️','🏙️','🛍️','✈️','🩺','⚡','✨','🏠','🌿','🔗','🗣️','🎨','🐾','💼','💻','📈','🧠','🙏','📱','🕐','🌹','🎯','🎁','🌙','🎵','📚','🚗','🏃','🌍','⭐','🔥','💡','🎬','🍷'];
function icon(i){return ICONS[i%ICONS.length]}

/* ---------- state (in-memory only) ---------- */
const SRS={}; // id -> {box, due}
let streak=0, lastDay=null;

function learnedCount(){return Object.values(SRS).filter(s=>s.box>=2).length}
function dueList(){const now=Date.now();return ALL.filter(w=>{const s=SRS[w.id];return !s||s.due<=now})}
function refreshStats(){
  document.getElementById('st-learned').textContent=learnedCount();
  document.getElementById('st-due').textContent=Math.min(dueList().length,ALL.length);
  document.getElementById('streak').textContent=streak;
}

/* ---------- speech ---------- */
let ruVoice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();ruVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('ru'))||null;}
if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(t){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='ru-RU';u.rate=.82;if(ruVoice)u.voice=ruVoice;
  speechSynthesis.speak(u);
}
function spkSvg(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>'}

/* ---------- tabs ---------- */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('v-'+t.dataset.v).classList.add('on');
  if(t.dataset.v==='flash')buildDeck();
  if(t.dataset.v==='quiz')nextQuiz();
});

/* ---------- BROWSE ---------- */
const catsEl=document.getElementById('cats');
const wlEl=document.getElementById('wordlist');
function renderCats(){
  catsEl.style.display='grid';wlEl.style.display='none';
  catsEl.innerHTML=CATS.map((c,i)=>{
    const learned=c.words.filter((w,wi)=>{const s=SRS[i+'_'+wi];return s&&s.box>=2}).length;
    const pct=Math.round(learned/c.words.length*100);
    return `<div class="cat" onclick="openCat(${i})">
      <div class="ic">${icon(i)}</div>
      <h3>${c.name}</h3>
      <div class="n">${c.words.length} واژه · ${pct}%</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`}).join('');
}
function wordRow(w){
  return `<div class="word">
    <div class="spk" onclick="say('${w.ru.replace(/'/g,"\\'")}')">${spkSvg()}</div>
    <div class="meta"><div class="tr">${w.tr}</div><div class="fa">${w.fa}</div></div>
    <div class="ru">${w.ru}</div>
  </div>`;
}
window.openCat=function(i){
  catsEl.style.display='none';wlEl.style.display='block';
  const c=CATS[i];
  wlEl.innerHTML=`<button class="back" onclick="renderCats()">→ بازگشت به دسته‌ها</button>
    <h2 style="margin:4px 4px 14px;font-size:17px">${icon(i)} ${c.name}</h2>`+
    c.words.map(w=>wordRow({...w,ci:i})).join('');
  window.scrollTo(0,0);
}
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){renderCats();return}
  catsEl.style.display='none';wlEl.style.display='block';
  const hits=ALL.filter(w=>w.ru.toLowerCase().includes(q)||w.tr.includes(q)||w.fa.includes(q)).slice(0,120);
  wlEl.innerHTML=`<div style="color:var(--mut);font-size:13px;margin:0 4px 12px">${hits.length} نتیجه</div>`+
    (hits.length?hits.map(wordRow).join(''):'<div class="empty">چیزی پیدا نشد 🤔</div>');
});

/* ---------- FLASHCARDS ---------- */
let deck=[],di=0;
const pickEl=document.getElementById('fc-pick');
let fcMode='all';
function buildPick(){
  const opts=[['all','✨ همه'],['due','🔁 مرور امروز']].concat(CATS.map((c,i)=>[i,c.name]));
  pickEl.innerHTML=opts.map(o=>`<button data-m="${o[0]}" class="${o[0]==fcMode?'on':''}">${o[1]}</button>`).join('');
  pickEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{fcMode=b.dataset.m;buildPick();buildDeck();});
}
function buildDeck(){
  if(fcMode==='all')deck=shuffle([...ALL]);
  else if(fcMode==='due')deck=shuffle(dueList());
  else deck=shuffle(ALL.filter(w=>w.ci==fcMode));
  if(!deck.length)deck=shuffle([...ALL]);
  di=0;showCard();
  document.getElementById('fc-cat').textContent=fcMode==='all'?'همه واژه‌ها':fcMode==='due'?'مرور امروز':CATS[fcMode].name;
}
const fcInner=document.getElementById('fc-inner');
function showCard(){
  const w=deck[di];if(!w){document.getElementById('fc-ru').textContent='تمام شد 🎉';return}
  fcInner.classList.remove('flip');
  setTimeout(()=>{
    document.getElementById('fc-ru').textContent=w.ru;
    document.getElementById('fc-tr').textContent=w.tr;
    document.getElementById('fc-fa').textContent=w.fa;
    document.getElementById('fc-ru2').textContent=w.ru;
  },fcInner.classList.contains('flip')?260:0);
  document.getElementById('fc-prog').textContent=(di+1)+' / '+deck.length;
}
fcInner.onclick=()=>fcInner.classList.toggle('flip');
document.getElementById('fc-spk').onclick=e=>{e.stopPropagation();say(deck[di].ru)};
const BOX_MS=[60e3,600e3,864e5,3*864e5,7*864e5,30*864e5];
document.querySelectorAll('.srs button').forEach(b=>b.onclick=()=>{
  const w=deck[di];if(!w)return;
  const q=+b.dataset.q;
  let s=SRS[w.id]||{box:0};
  if(q===0)s.box=0;else if(q===1)s.box=Math.max(1,s.box);else s.box=Math.min(s.box+1,5);
  s.due=Date.now()+BOX_MS[Math.min(s.box,5)];
  SRS[w.id]=s;
  bumpStreak();refreshStats();
  di++;if(di>=deck.length){buildDeck();}else showCard();
});
function bumpStreak(){const d=new Date().toDateString();if(lastDay!==d){streak++;lastDay=d;}}

/* ---------- QUIZ ---------- */
let qWord=null,qLock=false;
function nextQuiz(){
  qLock=false;
  document.getElementById('q-next').classList.remove('show');
  const pool=Math.random()<.55?(dueList().length?dueList():ALL):ALL;
  qWord=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('q-ru').textContent=qWord.ru;
  document.getElementById('q-tr').textContent=qWord.tr;
  const wrongs=shuffle(ALL.filter(w=>w.fa!==qWord.fa)).slice(0,3);
  const opts=shuffle([qWord,...wrongs]);
  const oe=document.getElementById('q-opts');
  oe.innerHTML=opts.map(o=>`<button class="opt">${o.fa}</button>`).join('');
  oe.querySelectorAll('.opt').forEach((btn,k)=>btn.onclick=()=>answer(btn,opts[k]));
  say(qWord.ru);
}
let qc=0,qw=0;
function answer(btn,opt){
  if(qLock)return;qLock=true;
  const correct=opt.fa===qWord.fa;
  const all=document.querySelectorAll('.opt');
  all.forEach(b=>{b.disabled=true;if(b.textContent===qWord.fa)b.classList.add('correct')});
  if(!correct)btn.classList.add('wrong');
  if(correct){qc++;let s=SRS[qWord.id]||{box:0};s.box=Math.min(s.box+1,5);s.due=Date.now()+BOX_MS[Math.min(s.box,5)];SRS[qWord.id]=s;}
  else{qw++;SRS[qWord.id]={box:0,due:Date.now()+60e3};}
  bumpStreak();
  document.getElementById('q-correct').textContent=qc;
  document.getElementById('q-wrong').textContent=qw;
  document.getElementById('q-pct').textContent=Math.round(qc/(qc+qw)*100)+'%';
  document.getElementById('q-next').classList.add('show');
  refreshStats();
}
