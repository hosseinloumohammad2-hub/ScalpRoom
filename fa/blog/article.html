<script>
const SUPABASE_URL = 'https://fjdjqaffoeixspcmxprw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZGpxYWZmb2VpeHNwY214cHJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDI5OTMsImV4cCI6MjA4OTY3ODk5M30.pP_O6S3uJVtiP6bNmxswnQhnB_Q43nGOT3ke_Lapr20';

/* تغییر تم */
(function(){
  const root=document.documentElement;
  const toggle=document.getElementById('themeToggle');
  const stored=localStorage.getItem('fx-theme');
  if(stored==='dark'||stored==='light')root.setAttribute('data-theme',stored);
  toggle.addEventListener('click',()=>{
    const current=root.getAttribute('data-theme');
    let next;
    if(current==='dark')next='light';
    else if(current==='light')next='dark';
    else{
      const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
      next=prefersDark?'light':'dark';
    }
    root.setAttribute('data-theme',next);
    localStorage.setItem('fx-theme',next);
  });
})();

/* ═══════════════════════════════════════════════════════════════
   ابزارهای کمکی
   ═══════════════════════════════════════════════════════════════ */
function getSlug(){
  const params=new URLSearchParams(window.location.search);
  return params.get('slug');
}

function escapeHtml(s){
  if(!s)return '';
  return String(s).replace(/[&<>"']/g,c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* تبدیل اعداد انگلیسی به فارسی */
function toFa(s){
  return String(s).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);
}

/* قالب‌بندی تاریخ فارسی */
function formatDate(d){
  if(!d)return '';
  try{
    return new Date(d).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});
  }catch(e){
    return toFa(new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}));
  }
}

/* برچسب دسته به فارسی */
function catLabel(cat){
  const map={
    'fundamentals':'فاندامنتال','strategy':'استراتژی','central-banks':'بانک مرکزی',
    'gold':'طلا','forex':'فارکس','crypto':'کریپتو','analysis':'تحلیل','general':'عمومی',
    'education':'آموزش','news':'اخبار'
  };
  return map[(cat||'').toLowerCase()]||cat||'عمومی';
}

/* تنظیم meta tag */
function setMeta(name,content){
  let el=document.querySelector(`meta[name="${name}"]`);
  if(!el){el=document.createElement('meta');el.name=name;document.head.appendChild(el)}
  el.content=content;
}

/* تنظیم OG */
function setOg(prop,content){
  let el=document.querySelector(`meta[property="${prop}"]`);
  if(!el){el=document.createElement('meta');el.setAttribute('property',prop);document.head.appendChild(el)}
  el.content=content;
}

/* ═══════════════════════════════════════════════════════════════
   بارگذاری مقاله
   ═══════════════════════════════════════════════════════════════ */
async function loadArticle(){
  const container=document.getElementById('articleContainer');
  const slug=getSlug();

  if(!slug){
    container.innerHTML='<div class="state"><div style="font-size:48px;margin-bottom:16px">📄</div><div>مقاله‌ای مشخص نشده است. <a href="/fa/blog/" style="color:var(--blue)">بازگشت به بلاگ</a></div></div>';
    return;
  }

  try{
    /* فقط مقاله‌های فارسی منتشرشده */
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/Articles?slug=eq.${encodeURIComponent(slug)}&published=eq.true&language=eq.fa&select=*&limit=1`,
      {
        headers:{
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':`Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );
    if(!res.ok)throw new Error('Failed');
    const data=await res.json();

    if(!Array.isArray(data)||data.length===0){
      container.innerHTML='<div class="state"><div style="font-size:48px;margin-bottom:16px">🔍</div><div style="font-size:18px;color:var(--tx);font-weight:600;margin-bottom:8px">مقاله پیدا نشد</div><div>این مقاله یافت نشد یا ممکن است هنوز منتشر نشده باشد.</div><div style="margin-top:24px"><a href="/fa/blog/" style="color:var(--blue);font-weight:500">→ بازگشت به بلاگ</a></div></div>';
      return;
    }

    const a=data[0];

    /* ───── به‌روزرسانی SEO ───── */
    const pageTitle = `${a.meta_title || a.title} | فارکس اسکالپ روم`;
    const pageDesc = a.meta_desc || a.excerpt || a.subtitle || '';
    const pageUrl = window.location.href;
    const canonicalUrl = `https://fxscalproom.com/fa/blog/article.html?slug=${encodeURIComponent(slug)}`;
    const enUrl = `https://fxscalproom.com/blog/article.html?slug=${encodeURIComponent(a.translation_slug || slug)}`;

    document.title = pageTitle;
    setMeta('description', pageDesc);
    if(a.meta_keywords) setMeta('keywords', a.meta_keywords);

    /* canonical و hreflang به‌روز می‌شه */
    const canonicalTag = document.getElementById('canonicalTag');
    if(canonicalTag) canonicalTag.href = canonicalUrl;
    const hreflangFa = document.getElementById('hreflangFa');
    if(hreflangFa) hreflangFa.href = canonicalUrl;
    const hreflangEn = document.getElementById('hreflangEn');
    if(hreflangEn) hreflangEn.href = enUrl;

    /* Open Graph */
    setOg('og:title', a.title);
    setOg('og:description', pageDesc);
    setOg('og:type', 'article');
    setOg('og:url', pageUrl);
    setOg('og:locale', 'fa_IR');
    if(a.cover_image) setOg('og:image', a.cover_image);
    if(a.created_at) setOg('article:published_time', a.created_at);
    if(a.updated_at) setOg('article:modified_time', a.updated_at);
    if(a.category) setOg('article:section', catLabel(a.category));

    /* Twitter Card */
    setMeta('twitter:card', 'summary_large_image');
    setMeta('twitter:title', a.title);
    setMeta('twitter:description', pageDesc);
    if(a.cover_image) setMeta('twitter:image', a.cover_image);

    /* ───── Schema.org ───── */
    const schema={
      "@context":"https://schema.org",
      "@type":"Article",
      "headline":a.title,
      "description":pageDesc,
      "image":a.cover_image||"https://fxscalproom.com/og-image.png",
      "inLanguage":"fa-IR",
      "author":{"@type":"Organization","name":a.author||"Fxscalproom","url":"https://fxscalproom.com/"},
      "publisher":{
        "@type":"Organization",
        "name":"Fxscalproom",
        "logo":{"@type":"ImageObject","url":"https://fxscalproom.com/icon-512.png"}
      },
      "datePublished":a.created_at,
      "dateModified":a.updated_at||a.created_at,
      "mainEntityOfPage":{
        "@type":"WebPage",
        "@id":canonicalUrl
      },
      "articleSection":catLabel(a.category),
      "keywords":a.meta_keywords||""
    };

    /* حذف schemaهای قدیمی اگر موجود باشن */
    document.querySelectorAll('script[data-schema="article"]').forEach(s=>s.remove());
    const schemaScript=document.createElement('script');
    schemaScript.type='application/ld+json';
    schemaScript.setAttribute('data-schema','article');
    schemaScript.textContent=JSON.stringify(schema);
    document.head.appendChild(schemaScript);

    /* Breadcrumb schema */
    const breadcrumbSchema={
      "@context":"https://schema.org",
      "@type":"BreadcrumbList",
      "itemListElement":[
        {"@type":"ListItem","position":1,"name":"خانه","item":"https://fxscalproom.com/fa/"},
        {"@type":"ListItem","position":2,"name":"بلاگ","item":"https://fxscalproom.com/fa/blog/"},
        {"@type":"ListItem","position":3,"name":a.title,"item":canonicalUrl}
      ]
    };
    const bcScript=document.createElement('script');
    bcScript.type='application/ld+json';
    bcScript.setAttribute('data-schema','breadcrumb');
    bcScript.textContent=JSON.stringify(breadcrumbSchema);
    document.head.appendChild(bcScript);

    /* به‌روزرسانی لینک زبان اگه translation_slug موجود باشه */
    const langSwitch = document.getElementById('langSwitch');
    if(langSwitch && a.translation_slug){
      langSwitch.href = `/blog/article.html?slug=${encodeURIComponent(a.translation_slug)}`;
    }

    /* ───── رندر مقاله ───── */
    container.innerHTML=`
      <article>
        <div class="breadcrumb">
          <a href="/fa/">خانه</a>
          <span class="sep">›</span>
          <a href="/fa/blog/">بلاگ</a>
          <span class="sep">›</span>
          <span class="current">${escapeHtml(a.title)}</span>
        </div>
        <span class="article-tag">${escapeHtml(catLabel(a.category))}</span>
        <h1>${escapeHtml(a.title)}</h1>
        ${a.subtitle?`<p class="article-subtitle">${escapeHtml(a.subtitle)}</p>`:''}
        <div class="article-meta">
          <span class="author">${escapeHtml(a.author||'فارکس اسکالپ روم')}</span>
          <span class="sep">·</span>
          <span>${formatDate(a.created_at)}</span>
          <span class="sep">·</span>
          <span>${toFa(a.read_time||5)} دقیقه مطالعه</span>
          ${a.views?`<span class="sep">·</span><span>${toFa(a.views)} بازدید</span>`:''}
        </div>
        ${a.cover_image?`<div class="article-cover"><img src="${escapeHtml(a.cover_image)}" alt="${escapeHtml(a.title)}" loading="eager"></div>`:''}
        <div class="article-content">${a.content||'<p>محتوای مقاله در دسترس نیست.</p>'}</div>

        <!-- اشتراک‌گذاری -->
        <div class="share-bar">
          <span class="label">اشتراک‌گذاری:</span>
          <a class="share-btn" href="https://t.me/share/url?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(a.title)}" target="_blank" rel="noopener" aria-label="تلگرام">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.505.505 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          </a>
          <a class="share-btn" href="https://twitter.com/intent/tweet?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(a.title)}" target="_blank" rel="noopener" aria-label="توییتر">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </a>
          <a class="share-btn" href="https://api.whatsapp.com/send?text=${encodeURIComponent(a.title+' '+pageUrl)}" target="_blank" rel="noopener" aria-label="واتساپ">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          </a>
          <a class="share-btn" href="#" id="copyLinkBtn" aria-label="کپی لینک">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          </a>
        </div>

        <!-- CTA -->
        <div class="article-cta">
          <h3>سیگنال‌های لحظه‌ای دریافت کنید</h3>
          <p>به هزاران تریدری بپیوندید که سیگنال‌های حرفه‌ای فارکس را در لحظه دریافت می‌کنند.</p>
          <a href="/app" class="btn">ورود به اپلیکیشن</a>
        </div>

        <!-- بازگشت به بلاگ -->
        <div style="text-align:center;margin-top:32px">
          <a href="/fa/blog/" class="back-to-blog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            بازگشت به بلاگ
          </a>
        </div>
      </article>
    `;

    /* کپی لینک */
    const copyBtn = document.getElementById('copyLinkBtn');
    if(copyBtn){
      copyBtn.addEventListener('click',(e)=>{
        e.preventDefault();
        navigator.clipboard.writeText(pageUrl).then(()=>{
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          copyBtn.style.background='#28cd41';
          copyBtn.style.color='#fff';
          copyBtn.style.borderColor='#28cd41';
          setTimeout(()=>{
            copyBtn.innerHTML = original;
            copyBtn.style.background='';
            copyBtn.style.color='';
            copyBtn.style.borderColor='';
          },1500);
        }).catch(()=>{});
      });
    }

    /* شمارنده بازدید (fire and forget) */
    fetch(`${SUPABASE_URL}/rest/v1/Articles?slug=eq.${encodeURIComponent(slug)}&language=eq.fa`,{
      method:'PATCH',
      headers:{
        'apikey':SUPABASE_ANON_KEY,
        'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type':'application/json',
        'Prefer':'return=minimal'
      },
      body:JSON.stringify({views:(a.views||0)+1})
    }).catch(()=>{});

  }catch(e){
    console.error(e);
    container.innerHTML='<div class="state"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;color:var(--tx);font-weight:600;margin-bottom:8px">مشکلی پیش آمد</div><div>بارگذاری مقاله با مشکل مواجه شد. لطفاً دوباره تلاش کنید.</div><div style="margin-top:24px"><a href="/fa/blog/" style="color:var(--blue);font-weight:500">→ بازگشت به بلاگ</a></div></div>';
  }
}

loadArticle();

/* ثبت Service Worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
