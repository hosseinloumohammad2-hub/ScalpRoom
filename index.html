body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background 0.3s,color 0.3s}
::-webkit-scrollbar{width:0}
input,button,textarea{font-family:inherit;border:none;outline:none;color:var(--tx)}
input::placeholder{color:var(--dm)}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.m{font-family:'DM Mono',monospace}
.app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative;background:var(--bg)}
.hd{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:40}
.lg{font-size:19px;font-weight:700;color:var(--tx);letter-spacing:-0.4px}
.lg b{color:var(--R);font-weight:700}
.ct{padding:16px;padding-bottom:100px}
.tb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;padding:8px 0 env(safe-area-inset-bottom,22px);z-index:50}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding-top:4px;transition:color 0.15s}
.tl{font-size:10px;font-weight:600;letter-spacing:0.2px}
.cd{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px;transition:background 0.3s,border-color 0.3s}
.ip{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:13px 15px;font-size:14px;margin-bottom:8px;transition:border-color 0.2s,background 0.3s}
.ip:focus{border-color:var(--brd2)}
.bt{width:100%;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:center;border:none;transition:all 0.15s}
.bt:active{transform:scale(0.98);opacity:0.85}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi{animation:fi 0.2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.3}}
.ld{width:5px;height:5px;border-radius:50%;background:var(--G);animation:pl 2s infinite}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border:1px solid var(--brd);border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
svg{display:block}
</style>

function usePrices(){
  const[P,setP]=useState({"XAU/USD":{p:"---",c:"0.00%",u:true},"EUR/USD":{p:"---",c:"0.00%",u:true},"BTC/USD":{p:"---",c:"0.00%",u:true},"GBP/JPY":{p:"---",c:"0.00%",u:true}});
  const[ok,setOk]=useState(false);
  const f=useCallback(async()=>{try{
    // Fetch from multiple sources for gold
    const[cbRes,goldRes]=await Promise.all([
      fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD").then(r=>r.json()).catch(()=>null),
      fetch("https://api.metalpriceapi.com/v1/latest?api_key=demo&base=USD&currencies=XAU").then(r=>r.json()).catch(()=>null)
    ]);
    const rt=cbRes?.data?.rates||{};
    const btc=rt.BTC?(1/+rt.BTC).toFixed(0):"87234";
    const eur=rt.EUR?(1/+rt.EUR).toFixed(4):"1.1570";
    const gbpjpy=(rt.GBP&&rt.JPY)?((+rt.JPY)/(+rt.GBP)).toFixed(2):"195.20";
    // Gold: try metal API, fallback to Coinbase, fallback to estimate
    let xau="2987.00";
    if(goldRes?.rates?.XAU){xau=(1/goldRes.rates.XAU).toFixed(2)}
    else if(rt.XAU&&+rt.XAU>0){xau=(1/+rt.XAU).toFixed(2)}
    setP(pv=>{const c=(k,v)=>{const o=parseFloat(String(pv[k]?.p).replace(/,/g,""))||0;const n=parseFloat(String(v).replace(/,/g,""))||0;const df=o>0?((n-o)/o*100).toFixed(2):"0.00";return{p:Number(v).toLocaleString("en",{minimumFractionDigits:v.includes(".")?Math.min(v.split(".")[1]?.length||0,2):0}),c:`${df>=0?"+":""}${df}%`,u:df>=0}};
    return{"XAU/USD":c("XAU/USD",xau),"EUR/USD":c("EUR/USD",eur),"BTC/USD":c("BTC/USD",btc),"GBP/JPY":c("GBP/JPY",gbpjpy)}});setOk(true);
  }catch(e){}},[]);
  useEffect(()=>{f();const i=setInterval(f,12000);return()=>clearInterval(i)},[f]);
  return{P,ok};
}

function useTheme(){

  return{dark,toggle:()=>setDark(d=>!d)};
}

function Auth({onAuth}){
  const[m,setM]=useState("login"),[e,setE]=useState(""),[p,setP]=useState(""),[n,setN]=useState(""),[er,setEr]=useState(""),[ld,setLd]=useState(false);
  const go=async()=>{if(!e||!p){setEr("Fill all fields");return}setLd(true);setEr("");
    try{if(m==="login"){const r=await api.in(e,p);if(r.error){setEr(r.error.message);setLd(false);return}onAuth(r.access_token,r.user)}
    else{if(!n){setEr("Enter name");setLd(false);return}const r=await api.up(e,p);if(r.error){setEr(r.error.message);setLd(false);return}
    const tk=r.access_token||(r.session?.access_token);const u=r.user||(r.data?.user);
    if(tk&&u){await api.add("Users",{id:u.id,email:e,full_name:n,membership:"free",role:"user"},tk);onAuth(tk,u)}
    else{const r2=await api.in(e,p);if(!r2.error){onAuth(r2.access_token,r2.user)}else{setEr("Account created! Try signing in.");setM("login")}}}}catch(x){setEr(x.message)}setLd(false)};
  return(<div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"var(--bg)"}}>
    <div style={{width:"100%",maxWidth:360}} className="fi">

      {er&&<div style={{background:"color-mix(in srgb,var(--R) 8%,transparent)",border:"1px solid color-mix(in srgb,var(--R) 15%,transparent)",borderRadius:10,padding:12,marginBottom:10,fontSize:13,color:"var(--R)"}}>{er}</div>}
      {m==="register"&&<input className="ip" placeholder="Full name" value={n} onChange={x=>setN(x.target.value)}/>}
      <input className="ip" placeholder="Email address" type="email" value={e} onChange={x=>setE(x.target.value)} autoCapitalize="none"/>
      <input className="ip" placeholder="Password" type="password" value={p} onChange={x=>setP(x.target.value)}/>
      <button className="bt" style={{background:"var(--R)",opacity:ld?0.5:1,marginTop:6}} onClick={go} disabled={ld}>{ld?"Please wait...":m==="login"?"Sign In":"Create Account"}</button>
      <p style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--mu)"}}>{m==="login"?"Don\u2019t have an account? ":"Already have an account? "}<span onClick={()=>{setM(m==="login"?"register":"login");setEr("")}} style={{color:"var(--R)",fontWeight:600,cursor:"pointer"}}>{m==="login"?"Sign Up":"Sign In"}</span></p>
    </div></div>);
}

function App(){
  const[tk,setTk]=useState(null),[usr,setUsr]=useState(null),[up,setUp]=useState(null),[adm,setAdm]=useState(false);
  const[tab,setTab]=useState(0),[posts,setP]=useState([]),[sigs,setS]=useState([]);
  const{P,ok}=usePrices();const{dark,toggle}=useTheme();
  const load=useCallback(async()=>{try{const p=await api.get("Posts",tk);if(Array.isArray(p))setP(p);const s=await api.get("Signals",tk);if(Array.isArray(s))setS(s)}catch(e){}},[tk]);
  const chk=useCallback(async(u,t)=>{try{const r=await fetch(`${SB}/rest/v1/Users?id=eq.${u.id}`,{headers:H(t)});const d=await r.json();if(Array.isArray(d)&&d[0]){setUp(d[0]);if(d[0].role==="admin")setAdm(true)}}catch(e){}},[]);
  useEffect(()=>{if(tk)load()},[tk,load]);
  useEffect(()=>{if(tk&&usr)chk(usr,tk)},[tk,usr,chk]);
  if(!tk)return<Auth onAuth={(t,u)=>{setTk(t);setUsr(u)}}/>;
  const AT=[{l:"Home",i:IC.home},{l:"Gallery",i:IC.gal},{l:"Signals",i:IC.sig},{l:"Plans",i:IC.pla},{l:"Admin",i:IC.adm,ao:true},{l:"Profile",i:IC.usr}];
  const VT=AT.filter(t=>!t.ao||adm);const st=Math.min(tab,VT.length-1);const cur=VT[st];
  const goTab=i=>{const idx=VT.findIndex(t=>t===AT[i]);setTab(idx>=0?idx:0)};
  const scr=()=>{switch(cur?.l){case"Home":return<Home posts={posts} go={goTab} P={P} ok={ok} dark={dark} toggle={toggle}/>;case"Gallery":return<Gallery posts={posts}/>;case"Signals":return<Sigs signals={sigs}/>;case"Plans":return<Plans/>;case"Admin":return<Adm token={tk} posts={posts} signals={sigs} onR={load}/>;case"Profile":return<Prof user={usr} up={up} onOut={()=>{setTk(null);setUsr(null);setAdm(false);setUp(null);setTab(0)}} dark={dark} toggle={toggle}/>;default:return null}};
  return(<div className="app">
    <div className="hd"><div className="lg">Fxscalproom<b>.</b></div><div style={{display:"flex",alignItems:"center",gap:8}}>{adm&&<span style={{fontSize:9,fontWeight:600,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"3px 8px",borderRadius:6}}>ADMIN</span>}<span style={{fontSize:12,color:"var(--mu)",fontWeight:500}}>{cur?.l}</span></div></div>
    <div className="ct">{scr()}</div>
    <div className="tb">{VT.map((t,i)=><div key={i} className="ti" onClick={()=>setTab(i)} style={{color:st===i?"var(--tx)":"var(--dm)"}}>{t.i}<span className="tl" style={{color:st===i?"var(--R)":"var(--dm)"}}>{t.l}</span>{st===i&&<div className="td"/>}</div>)}</div>
  </div>);
}
