      const d=await r.json();
      if(Array.isArray(d))setPayments(d);
      const us=await fetch(`${SB}/rest/v1/Users?select=id,full_name,email,membership`,{headers:H(token)});
      const usData=await us.json();
      if(Array.isArray(usData)){const m={};usData.forEach(u=>m[u.id]=u);setUsers(m)}
    }catch(e){}
    setLoading(false);
  },[token]);

  useEffect(()=>{load()},[load]);

  const approve=async(p)=>{
    setProcessing(p.id);
    try{
      // Update payment status
      await fetch(`${SB}/rest/v1/PaymentRequests?id=eq.${p.id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({status:"approved"})});
      // Activate premium for user
      const exp=new Date();exp.setDate(exp.getDate()+(p.plan_days||30));
      await fetch(`${SB}/rest/v1/Users?id=eq.${p.user_id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({membership:"premium",premium_expires_at:exp.toISOString()})});
      load();
    }catch(e){}
    setProcessing(null);
  };

  const reject=async(id)=>{
    if(!confirm(lang==="fa"?"رد شود؟":"Reject?"))return;
    setProcessing(id);
    try{
      await fetch(`${SB}/rest/v1/PaymentRequests?id=eq.${id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({status:"rejected"})});
      load();
    }catch(e){}
    setProcessing(null);
  };

  const statusColor=(s)=>s==="approved"?"var(--G)":s==="rejected"?"var(--R)":"var(--Y)";
  const statusLabel=(s)=>({pending:lang==="fa"?"در انتظار":"Pending",approved:lang==="fa"?"تأیید شده":"Approved",rejected:lang==="fa"?"رد شده":"Rejected"}[s]||s);
  const pending=payments.filter(p=>p.status==="pending");
  const history=payments.filter(p=>p.status!=="pending");

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{lang==="fa"?"💳 درخواست‌های پرداخت":"💳 Payment Requests"}</div>

    {loading&&<div style={{textAlign:"center",padding:30}}><div className="ptr-spinner"/></div>}

    {/* Pending */}
    {pending.length>0&&<div style={{fontSize:12,fontWeight:600,color:"var(--Y)",marginBottom:8}}>{lang==="fa"?"در انتظار تأیید":"Pending"} ({pending.length})</div>}
    {pending.map(p=>{
      const u=users[p.user_id];
      return<div key={p.id} className="cd" style={{padding:14,marginBottom:8,borderColor:"color-mix(in srgb,var(--Y) 25%,transparent)",background:"color-mix(in srgb,var(--Y) 3%,transparent)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>{u?.full_name||"Unknown"}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{u?.email}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="m" style={{fontSize:22,fontWeight:700,color:"var(--G)"}}>${p.amount}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{p.plan_name}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:"var(--dm)",marginBottom:10}}>{new Date(p.created_at).toLocaleDateString()} {new Date(p.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{display:"flex",gap:6}}>
          <button className="bt" style={{background:"var(--G)",flex:1,padding:12,fontSize:13,opacity:processing===p.id?.5:1}} onClick={()=>approve(p)} disabled={processing===p.id}>
            {processing===p.id?"...":(lang==="fa"?"✓ تأیید و فعال‌سازی":"✓ Approve & Activate")}
          </button>
          <button className="bt" style={{background:"var(--R)",flex:"0 0 auto",padding:"12px 16px",fontSize:13,opacity:processing===p.id?.5:1}} onClick={()=>reject(p.id)} disabled={processing===p.id}>
            ✗
          </button>
        </div>
      </div>
    })}

    {!loading&&pending.length===0&&<div style={{textAlign:"center",color:"var(--dm)",fontSize:12,padding:20,marginBottom:12}}>{lang==="fa"?"درخواست پرداخت جدیدی نیست":"No pending payments"}</div>}

    {/* History */}
    {history.length>0&&<>
      <div style={{fontSize:12,fontWeight:600,color:"var(--dm)",marginTop:12,marginBottom:8}}>{lang==="fa"?"تاریخچه":"History"} ({history.length})</div>
      {history.map(p=>{
        const u=users[p.user_id];
        return<div key={p.id} className="cd" style={{padding:10,marginBottom:4,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600}}>{u?.full_name||"Unknown"}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{p.plan_name} · ${p.amount} · {new Date(p.created_at).toLocaleDateString()}</div>
          </div>
          <span style={{fontSize:9,fontWeight:700,color:statusColor(p.status),background:`color-mix(in srgb,${statusColor(p.status)} 10%,transparent)`,padding:"3px 8px",borderRadius:6}}>{statusLabel(p.status)}</span>
        </div>
      })}
    </>}
  </div>);
}

          <div style={{fontSize:15,fontWeight:700,color:"var(--R)"}}>{{fa:"حراج ویژه!",ar:"!تخفيضات خاصة",tr:"Özel İndirim!",ru:"Распродажа!",es:"¡Oferta especial!"}[lang]||"Special Sale!"}</div>
          <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{{fa:"تخفیف محدود — عجله کنید",ar:"عرض محدود — أسرع",tr:"Sınırlı süre — acele edin",ru:"Ограниченное предложение — торопитесь",es:"Oferta limitada — date prisa"}[lang]||"Limited time offer — hurry up"}</div>

      return<div key={i} className="cd" style={{marginBottom:8,padding:16,borderColor:p.best?"color-mix(in srgb,var(--R) 30%,transparent)":"var(--brd)",background:p.best?"color-mix(in srgb,var(--R) 3%,transparent)":"var(--card)"}}>

/* ─── Admin Performance Report Generator ─── */
function AdminReport({token,posts,signals}){
  const{lang}=useLang();
  const[fromDate,setFromDate]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10)});
  const[toDate,setToDate]=useState(()=>new Date().toISOString().slice(0,10));
  const[generating,setGenerating]=useState(false);
  const canvasRef=useRef(null);

  const filteredPosts=(posts||[]).filter(p=>{
    const d=new Date(p.created_at);
    return d>=new Date(fromDate)&&d<=new Date(toDate+"T23:59:59");
  });
  const filteredSigs=(signals||[]).filter(s=>{
    const d=new Date(s.created_at);
    return d>=new Date(fromDate)&&d<=new Date(toDate+"T23:59:59");
  });
  const tpHit=filteredSigs.filter(s=>s.status==="tp_hit").length;
  const slHit=filteredSigs.filter(s=>s.status==="sl_hit").length;
  const activeSigs=filteredSigs.filter(s=>s.status==="active").length;
  const winRate=(tpHit+slHit)>0?Math.round((tpHit/(tpHit+slHit))*100):0;

  const generate=async()=>{
    setGenerating(true);
    try{
      const W=1080,PAD=60;
      const c=document.createElement("canvas");
      c.width=W;
      const ctx=c.getContext("2d");
      const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)};

      // Calculate height
      const imgPosts=filteredPosts.filter(p=>p.image_url);
      const cols=4;
      const thumbSize=Math.floor((W-PAD*2-(cols-1)*12)/cols);
      const rows=Math.ceil(imgPosts.length/cols);
      const gridH=rows*(thumbSize+12);
      const totalH=580+gridH+200;
      c.height=Math.max(totalH,900);

      // Background gradient
      const bg=ctx.createLinearGradient(0,0,0,c.height);
      bg.addColorStop(0,"#0a0a0c");bg.addColorStop(0.5,"#111114");bg.addColorStop(1,"#0a0a0c");
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,c.height);

      // Decorative circles
      ctx.globalAlpha=0.04;
      ctx.fillStyle="#FF4136";ctx.beginPath();ctx.arc(W-100,-50,250,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#3b82f6";ctx.beginPath();ctx.arc(100,c.height+50,250,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;

      // Top line accent
      const accent=ctx.createLinearGradient(PAD,0,W-PAD,0);
      accent.addColorStop(0,"#FF4136");accent.addColorStop(1,"transparent");
      ctx.fillStyle=accent;ctx.fillRect(PAD,40,W-PAD*2,3);

      // Logo
      let Y=80;
      ctx.font="bold 38px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="#ffffff";ctx.fillText("Fxscalproom",PAD,Y);
      const lw=ctx.measureText("Fxscalproom").width;
      ctx.fillStyle="#FF4136";ctx.fillText(".",PAD+lw,Y);

      // Period
      Y+=40;
      ctx.font="500 16px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="#71717a";
      const fromStr=new Date(fromDate).toLocaleDateString("en",{month:"short",day:"numeric"});
      const toStr=new Date(toDate).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"});
      ctx.fillText(`${fromStr} — ${toStr}`,PAD,Y);

      // Title
      Y+=60;
      ctx.font="bold 48px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="#ffffff";ctx.fillText("Performance Report",PAD,Y);

      // Stats row
      Y+=50;
      const stats=[
        {label:"Analyses",value:String(filteredPosts.length),color:"#3b82f6"},
        {label:"Signals",value:String(filteredSigs.length),color:"#22c55e"},
        {label:"Win Rate",value:winRate+"%",color:winRate>=60?"#22c55e":"#eab308"},
        {label:"TP Hit",value:String(tpHit),color:"#22c55e"},
        {label:"SL Hit",value:String(slHit),color:"#ef4444"},
      ];
      const statW=Math.floor((W-PAD*2-(stats.length-1)*12)/stats.length);
      stats.forEach((s,i)=>{
        const sx=PAD+i*(statW+12);
        rr(sx,Y,statW,90,16);ctx.fillStyle="rgba(255,255,255,0.04)";ctx.fill();
        rr(sx,Y,statW,90,16);ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=1;ctx.stroke();
        ctx.font="bold 28px 'DM Mono',monospace";
        ctx.fillStyle=s.color;ctx.textAlign="center";ctx.fillText(s.value,sx+statW/2,Y+40);
        ctx.font="500 12px 'DM Sans',system-ui,sans-serif";
        ctx.fillStyle="#71717a";ctx.fillText(s.label,sx+statW/2,Y+65);
        ctx.textAlign="left";
      });

      // Image grid title
      Y+=120;
      ctx.font="bold 22px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="#a1a1aa";ctx.fillText(imgPosts.length+" Analyses Published",PAD,Y);
      Y+=20;

      // Load and draw images
      for(let i=0;i<imgPosts.length;i++){
        const p=imgPosts[i];
        const col=i%cols;
        const row=Math.floor(i/cols);
        const x=PAD+col*(thumbSize+12);
        const y=Y+row*(thumbSize+12);
        try{
          const img=new Image();img.crossOrigin="anonymous";
          await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=(p.image_url||"").split(",")[0];setTimeout(rej,3000)});
          ctx.save();rr(x,y,thumbSize,thumbSize,12);ctx.clip();
          const scale=Math.max(thumbSize/img.width,thumbSize/img.height);
          const sw=img.width*scale,sh=img.height*scale;
          ctx.drawImage(img,x-(sw-thumbSize)/2,y-(sh-thumbSize)/2,sw,sh);
          ctx.restore();
          rr(x,y,thumbSize,thumbSize,12);ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.stroke();
        }catch(e){
          rr(x,y,thumbSize,thumbSize,12);ctx.fillStyle="rgba(255,255,255,0.03)";ctx.fill();
          ctx.font="bold 11px 'DM Sans',system-ui,sans-serif";
          ctx.fillStyle="#52525b";ctx.textAlign="center";
          ctx.fillText(p.title?.slice(0,12)||"",x+thumbSize/2,y+thumbSize/2+4);
          ctx.textAlign="left";
        }
      }

      // Footer
      const footY=c.height-80;
      ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD,footY);ctx.lineTo(W-PAD,footY);ctx.stroke();

      ctx.textAlign="center";
      ctx.font="bold 22px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="rgba(255,255,255,0.2)";
      ctx.fillText("Fxscalproom.",W/2,footY+35);
      ctx.font="400 12px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle="rgba(255,255,255,0.15)";
      ctx.fillText("t.me/FxScalpRoom  ·  fxscalproom.com",W/2,footY+58);
      ctx.textAlign="left";

      // Export
      c.toBlob(blob=>{
        if(!blob){setGenerating(false);return}
        const url=URL.createObjectURL(blob);
        const fname=`fxscalproom_report_${fromDate}_${toDate}.png`;
        if(navigator.share&&navigator.canShare){
          try{
            const file=new File([blob],fname,{type:"image/png"});
            if(navigator.canShare({files:[file]})){
              navigator.share({files:[file],title:"Fxscalproom Report"}).catch(()=>{});
              setGenerating(false);return;
            }
          }catch(e){}
        }
        const a=document.createElement("a");a.href=url;a.download=fname;a.click();
        setGenerating(false);
      },"image/png");
    }catch(e){console.error(e);setGenerating(false)}
  };

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{lang==="fa"?"📊 گزارش عملکرد":"📊 Performance Report"}</div>

    <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{lang==="fa"?"بازه زمانی:":"Date range:"}</div>
    <div style={{display:"flex",gap:6,marginBottom:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:"var(--dm)",marginBottom:4}}>{lang==="fa"?"از:":"From:"}</div>
        <input className="ip" type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)} style={{marginBottom:0}}/>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:"var(--dm)",marginBottom:4}}>{lang==="fa"?"تا:":"To:"}</div>
        <input className="ip" type="date" value={toDate} onChange={e=>setToDate(e.target.value)} style={{marginBottom:0}}/>
      </div>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:12}}>
      {[{l:lang==="fa"?"امروز":"Today",d:0},{l:lang==="fa"?"۷ روز":"7 Days",d:7},{l:lang==="fa"?"۳۰ روز":"30 Days",d:30},{l:lang==="fa"?"۹۰ روز":"90 Days",d:90}].map(p=><div key={p.d} onClick={()=>{const d=new Date();d.setDate(d.getDate()-p.d);setFromDate(d.toISOString().slice(0,10));setToDate(new Date().toISOString().slice(0,10))}} style={{flex:1,padding:8,borderRadius:8,textAlign:"center",cursor:"pointer",fontSize:10,fontWeight:700,background:"var(--bg2)",border:"1px solid var(--brd)",color:"var(--mu)"}}>{p.l}</div>)}
    </div>

    {/* Preview stats */}
    <div className="cd" style={{padding:14,marginBottom:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        <div style={{textAlign:"center"}}><div className="m" style={{fontSize:22,fontWeight:700,color:"var(--B)"}}>{filteredPosts.length}</div><div style={{fontSize:9,color:"var(--dm)",fontWeight:600}}>{lang==="fa"?"تحلیل":"Analyses"}</div></div>
        <div style={{textAlign:"center"}}><div className="m" style={{fontSize:22,fontWeight:700,color:"var(--G)"}}>{filteredSigs.length}</div><div style={{fontSize:9,color:"var(--dm)",fontWeight:600}}>{lang==="fa"?"سیگنال":"Signals"}</div></div>
        <div style={{textAlign:"center"}}><div className="m" style={{fontSize:22,fontWeight:700,color:winRate>=60?"var(--G)":"var(--Y)"}}>{winRate}%</div><div style={{fontSize:9,color:"var(--dm)",fontWeight:600}}>Win Rate</div></div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <div style={{flex:1,textAlign:"center",padding:8,borderRadius:8,background:"color-mix(in srgb,var(--G) 6%,transparent)"}}><span className="m" style={{fontSize:14,fontWeight:700,color:"var(--G)"}}>{tpHit}</span><span style={{fontSize:9,color:"var(--dm)",marginLeft:4}}>TP</span></div>

/* ─── Support Chat (iOS 26 style) ─── */
function SupportChat({userId,token,onClose}){
  const{t,lang}=useLang();
  const[msgs,setMsgs]=useState([]);
  const[txt,setTxt]=useState("");
  const[sending,setSending]=useState(false);
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const scrollToBottom=()=>{setTimeout(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},100)};
  const load=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/SupportChats?user_id=eq.${userId}&order=created_at.asc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setMsgs(d);
    }catch(e){}
    setLoading(false);
  },[userId,token]);
  useEffect(()=>{load();const i=setInterval(load,5000);return()=>clearInterval(i)},[load]);
  useEffect(()=>{scrollToBottom()},[msgs.length]);
  const send=async()=>{
    const m=txt.trim();if(!m)return;
    setTxt("");setSending(true);
    try{
      await fetch(`${SB}/rest/v1/SupportChats`,{method:"POST",headers:H(token),body:JSON.stringify({user_id:userId,sender:"user",message:m})});
      load();
    }catch(e){}
    setSending(false);
  };
  const formatTime=(d)=>{const dt=new Date(d);return dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
  const formatDate=(d)=>{const dt=new Date(d);const today=new Date();if(dt.toDateString()===today.toDateString())return lang==="fa"?"امروز":"Today";const y=new Date(today);y.setDate(y.getDate()-1);if(dt.toDateString()===y.toDateString())return lang==="fa"?"دیروز":"Yesterday";return dt.toLocaleDateString()};
  // Group messages by date
  const grouped=useMemo(()=>{
    const g=[];let lastDate="";
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toDateString();
      if(d!==lastDate){g.push({type:"date",label:formatDate(m.created_at)});lastDate=d}
      g.push({type:"msg",...m});
    });
    return g;
  },[msgs]);
  return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:200,background:"var(--bg)",display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--brd)",background:"color-mix(in srgb,var(--bg) 92%,transparent)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
      <div onClick={onClose} style={{cursor:"pointer",color:"var(--mu)",display:"flex",alignItems:"center"}}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div style={{width:40,height:40,borderRadius:"50%",background:"var(--card)",border:"2px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <span style={{fontSize:11,fontWeight:800,color:"var(--tx)"}}>Fx<span style={{color:"var(--R)"}}>.</span></span>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:15,fontWeight:700}}>Fxscalproom<span style={{color:"var(--R)"}}>.</span> Admin</div>
        <div style={{fontSize:11,color:"var(--G)",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"var(--G)"}}/>
          {lang==="fa"?"آنلاین":"Online"}
        </div>
      </div>
    </div>

    {/* Messages */}
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:6}}>
      {loading&&<div style={{textAlign:"center",padding:40}}><div className="ptr-spinner"/></div>}
      {!loading&&msgs.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:"60px 0"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:"var(--card)",border:"2px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <span style={{fontSize:14,fontWeight:800,color:"var(--tx)"}}>Fx<span style={{color:"var(--R)"}}>.</span></span>
        </div>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Fxscalproom<span style={{color:"var(--R)"}}>.</span> Admin</div>
        <div style={{fontSize:12,color:"var(--dm)"}}>{t.noMessages||"No messages yet. Say hi!"}</div>
      </div>}
      {grouped.map((item,i)=>item.type==="date"
        ?<div key={"d"+i} style={{textAlign:"center",margin:"8px 0"}}>
          <span style={{fontSize:10,color:"var(--dm)",fontWeight:600,background:"var(--bg2)",padding:"4px 12px",borderRadius:10}}>{item.label}</span>
        </div>
        :<div key={item.id||i} style={{display:"flex",flexDirection:"column",alignItems:item.sender==="user"?"flex-end":"flex-start"}}>
          {item.sender==="admin"&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"var(--card)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:6,fontWeight:800,color:"var(--tx)"}}>Fx</span>
            </div>
            <span style={{fontSize:9,color:"var(--dm)",fontWeight:600}}>Admin</span>
          </div>}
          <div className={`chat-bubble ${item.sender==="user"?"chat-user":"chat-admin"}`}>{item.message}</div>
          <span style={{fontSize:9,color:"var(--dm)",marginTop:2,padding:"0 4px"}}>{formatTime(item.created_at)}</span>
        </div>
      )}
      <div ref={endRef}/>
    </div>

    {/* Input */}
    <div style={{padding:"10px 16px calc(env(safe-area-inset-bottom,8px) + 10px)",borderTop:"1px solid var(--brd)",background:"color-mix(in srgb,var(--bg) 92%,transparent)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
      <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}} placeholder={t.typeMessage||"Type a message..."} style={{flex:1,background:"var(--bg2)",border:"1px solid var(--brd)",borderRadius:22,padding:"10px 16px",fontSize:14,color:"var(--tx)",outline:"none"}}/>
      <div onClick={send} style={{width:40,height:40,borderRadius:"50%",background:txt.trim()?"var(--R)":"var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",cursor:txt.trim()?"pointer":"default",transition:".2s",flexShrink:0,opacity:sending?.5:1}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </div>
    </div>
  </div>);
}

/* ─── Admin Support Chat View ─── */
function AdminSupportChat({token}){
  const{lang}=useLang();
  const[convos,setConvos]=useState([]);
  const[users,setUsers]=useState({});
  const[selUser,setSelUser]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[txt,setTxt]=useState("");
  const[sending,setSending]=useState(false);
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const scrollToBottom=()=>{setTimeout(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},100)};

  // Load all conversations (grouped by user)
  const loadConvos=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/SupportChats?select=user_id,message,sender,created_at&order=created_at.desc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d)){
        const byUser={};
        d.forEach(m=>{
          if(!byUser[m.user_id]){byUser[m.user_id]={user_id:m.user_id,lastMsg:m.message,lastSender:m.sender,lastTime:m.created_at,count:0,unread:0}}
          byUser[m.user_id].count++;
          if(m.sender==="user"&&!byUser[m.user_id]._seenAdmin)byUser[m.user_id].unread++;
          if(m.sender==="admin")byUser[m.user_id]._seenAdmin=true;
        });
        setConvos(Object.values(byUser).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime)));
      }
      const us=await fetch(`${SB}/rest/v1/Users?select=id,full_name,email,membership`,{headers:H(token)});
      const usData=await us.json();
      if(Array.isArray(usData)){const m={};usData.forEach(u=>m[u.id]=u);setUsers(m)}
    }catch(e){}
    setLoading(false);
  },[token]);

  useEffect(()=>{loadConvos()},[loadConvos]);

  // Load messages for selected user
  const loadMsgs=useCallback(async()=>{
    if(!selUser)return;
    try{
      const r=await fetch(`${SB}/rest/v1/SupportChats?user_id=eq.${selUser}&order=created_at.asc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setMsgs(d);
    }catch(e){}
  },[selUser,token]);

  useEffect(()=>{if(selUser){loadMsgs();const i=setInterval(loadMsgs,4000);return()=>clearInterval(i)}},[selUser,loadMsgs]);
  useEffect(()=>{scrollToBottom()},[msgs.length]);

  const send=async()=>{
    const m=txt.trim();if(!m||!selUser)return;
    setTxt("");setSending(true);
    try{
      await fetch(`${SB}/rest/v1/SupportChats`,{method:"POST",headers:H(token),body:JSON.stringify({user_id:selUser,sender:"admin",message:m})});
      loadMsgs();
    }catch(e){}
    setSending(false);
  };
  const formatTime=(d)=>{const dt=new Date(d);return dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
  const timeSince=(d)=>{const s=Math.floor((new Date()-new Date(d))/1000);if(s<60)return"now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d"};

  if(selUser){
    const u=users[selUser];
    return(<div>
      <div onClick={()=>{setSelUser(null);loadConvos()}} style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,cursor:"pointer",color:"var(--B)",fontSize:13,fontWeight:600}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        {lang==="fa"?"بازگشت":"Back"}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{(u?.full_name||"?")[0].toUpperCase()}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>{u?.full_name||"Unknown"}</div>
          <div style={{fontSize:10,color:"var(--dm)"}}>{u?.email}</div>
        </div>
        {u?.membership==="premium"&&<span style={{fontSize:8,fontWeight:700,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"2px 6px",borderRadius:4,marginLeft:"auto"}}>PRO</span>}
      </div>
      <div style={{background:"var(--bg2)",border:"1px solid var(--brd)",borderRadius:16,padding:12,maxHeight:400,overflowY:"auto",marginBottom:10}}>
        {msgs.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:20,fontSize:12}}>{lang==="fa"?"پیامی نیست":"No messages"}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {msgs.map(m=><div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:m.sender==="user"?"flex-start":"flex-end"}}>
          {m.sender==="user"&&<span style={{fontSize:9,color:"var(--dm)",marginBottom:2}}>{u?.full_name||"User"}</span>}
          {m.sender==="admin"&&<span style={{fontSize:9,color:"var(--B)",marginBottom:2}}>Admin</span>}
          <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:14,fontSize:12,lineHeight:1.5,wordWrap:"break-word",

            border:`1px solid ${m.sender==="admin"?"color-mix(in srgb,var(--B) 20%,transparent)":"var(--brd)"}`,
            color:"var(--tx)",
            borderBottomRightRadius:m.sender==="admin"?4:14,
            borderBottomLeftRadius:m.sender==="user"?4:14,
          }}>{m.message}</div>
          <span style={{fontSize:8,color:"var(--dm)",marginTop:2}}>{formatTime(m.created_at)}</span>
        </div>)}
        <div ref={endRef}/>

      </div>
      <div style={{display:"flex",gap:6}}>

        <div onClick={send} style={{width:42,height:42,borderRadius:"50%",background:txt.trim()?"var(--B)":"var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",cursor:txt.trim()?"pointer":"default",transition:".2s",flexShrink:0,opacity:sending?.5:1}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </div>
      </div>
    </div>);
  }

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{lang==="fa"?"💬 چت‌های پشتیبانی":"💬 Support Chats"}</div>

    {!loading&&convos.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:"40px 0",fontSize:13}}>{lang==="fa"?"هنوز چتی نیست":"No chats yet"}</div>}
    {convos.map(c=>{
      const u=users[c.user_id];
      return<div key={c.user_id} onClick={()=>setSelUser(c.user_id)} className="cd" style={{padding:12,marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <div style={{position:"relative"}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700}}>{(u?.full_name||"?")[0].toUpperCase()}</div>
          {c.unread>0&&<div style={{position:"absolute",top:-2,right:-2,width:10,height:10,borderRadius:"50%",background:"var(--R)",border:"2px solid var(--card)"}}/>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13,fontWeight:600}}>{u?.full_name||"Unknown"}</span>
            {u?.membership==="premium"&&<span style={{fontSize:7,fontWeight:700,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"1px 4px",borderRadius:3}}>PRO</span>}
          </div>
          <div style={{fontSize:11,color:c.unread>0?"var(--tx)":"var(--dm)",fontWeight:c.unread>0?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>
            {c.lastSender==="admin"&&<span style={{color:"var(--B)"}}>You: </span>}{c.lastMsg}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
          <span style={{fontSize:9,color:"var(--dm)"}}>{timeSince(c.lastTime)}</span>
          {c.unread>0&&<span style={{fontSize:9,fontWeight:700,color:"#fff",background:"var(--R)",width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{c.unread}</span>}
          <span style={{fontSize:9,color:"var(--dm)"}}>{c.count} msgs</span>
        </div>
      </div>
    })}
  </div>);
}

/* ─── Giveaway Spin Wheel (Profile) ─── */
function GiveawayWheel({userId,token}){
  const{t,lang}=useLang();
  const[gw,setGw]=useState(null);
  const[entry,setEntry]=useState(null);
  const[spinning,setSpinning]=useState(false);
  const[result,setResult]=useState(null);
  const[angle,setAngle]=useState(0);
  const[showWheel,setShowWheel]=useState(false);
  const[refs,setRefs]=useState(0);

  useEffect(()=>{
    (async()=>{
      try{
        const r=await fetch(`${SB}/rest/v1/giveaways?active=eq.true&select=*&limit=1`,{headers:H(token)});
        const d=await r.json();
        if(Array.isArray(d)&&d.length>0)setGw(d[0]);
      }catch(e){}
      try{
        const r2=await fetch(`${SB}/rest/v1/giveaway_entries?user_id=eq.${userId}&select=*&order=created_at.desc&limit=1`,{headers:H(token)});
        const d2=await r2.json();
        if(Array.isArray(d2)&&d2.length>0)setEntry(d2[0]);
      }catch(e){}
      try{
        const r3=await fetch(`${SB}/rest/v1/Referrals?referrer_id=eq.${userId}&select=id`,{headers:H(token)});
        const d3=await r3.json();
        if(Array.isArray(d3))setRefs(d3.length);
      }catch(e){}
    })();
  },[userId,token]);

  if(!gw)return null;

  const prizes=gw.prizes||[];
  const minRef=gw.min_referrals||3;
  const noRefRequired=gw.no_referral_required||false;
  const canSpin=(noRefRequired||refs>=minRef)&&!entry;
  const alreadySpun=!!entry;
  const endsAt=gw.ends_at?new Date(gw.ends_at):null;
  const expired=endsAt&&endsAt<new Date();
  if(expired)return null;

  const spin=async()=>{
    if(!canSpin||spinning)return;
    setSpinning(true);setShowWheel(true);
    // Weighted random
    const total=prizes.reduce((s,p)=>s+(p.chance||1),0);
    let rnd=Math.random()*total,idx=0;
    for(let i=0;i<prizes.length;i++){rnd-=(prizes[i].chance||1);if(rnd<=0){idx=i;break}}
    const segAngle=360/prizes.length;
    const targetAngle=360*12+(360-idx*segAngle-segAngle/2);
    setAngle(targetAngle);
    setTimeout(async()=>{
      setResult(prizes[idx]);
      try{
        await fetch(`${SB}/rest/v1/giveaway_entries`,{method:"POST",headers:H(token),body:JSON.stringify({user_id:userId,giveaway_id:gw.id,prize_won:prizes[idx].name,prize_index:idx})});
        setEntry({prize_won:prizes[idx].name,prize_index:idx});
      }catch(e){}
      setSpinning(false);
    },10000);
  };

  const segAngle=prizes.length?360/prizes.length:60;

  const timeLeft=endsAt?(() => {
    const diff=endsAt-new Date();
    if(diff<=0)return null;
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    return `${h}h ${m}m`;
  })():null;

  return(<div className="cd" style={{marginBottom:6,overflow:"hidden",position:"relative"}}>
    <div style={{padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{display:"inline-flex"}}><svg width="36" height="36" viewBox="-2 -2 28 28" fill="none" style={{display:"inline-block",verticalAlign:"middle"}}><g><circle cx="12" cy="12" r="10" stroke="#ef4444" strokeWidth="1.5"/><path d="M12 2 L12 12" stroke="#ef4444" strokeWidth="1.2"/><path d="M12 12 L20.5 6" stroke="#f97316" strokeWidth="1.2"/><path d="M12 12 L20.5 18" stroke="#eab308" strokeWidth="1.2"/><path d="M12 12 L12 22" stroke="#22c55e" strokeWidth="1.2"/><path d="M12 12 L3.5 18" stroke="#3b82f6" strokeWidth="1.2"/><path d="M12 12 L3.5 6" stroke="#8b5cf6" strokeWidth="1.2"/><animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="4s" repeatCount="indefinite"/></g><circle cx="12" cy="12" r="3.5" fill="#fff" stroke="#ef4444" strokeWidth="1"/><text x="12" y="13.5" textAnchor="middle" fontSize="4" fontWeight="800" fill="#ef4444">WIN</text><g><circle cx="12" cy="1" r="1.2" fill="#ef4444"/><polygon points="12,-0.5 10.5,2.5 13.5,2.5" fill="#ef4444"/></g><circle cx="4" cy="3" r="0.7" fill="#eab308"><animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/></circle><circle cx="21" cy="4" r="0.5" fill="#f97316"><animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></circle><circle cx="3" cy="20" r="0.6" fill="#22c55e"><animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle><circle cx="22" cy="19" r="0.5" fill="#3b82f6"><animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0.9s" repeatCount="indefinite"/></circle></svg></span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700}}>{gw.title||"Spin & Win"}</div>
          {timeLeft&&<div style={{fontSize:10,color:"var(--R)",fontWeight:600,marginTop:2}}>⏳ {timeLeft} {{fa:"مانده",ar:"متبقي",tr:"kaldı",ru:"осталось",es:"restante"}[lang]||"left"}</div>}
        </div>
        {!alreadySpun&&!noRefRequired&&<div style={{fontSize:9,fontWeight:600,color:canSpin?"var(--G)":"var(--dm)",background:canSpin?"color-mix(in srgb,var(--G) 10%,transparent)":"var(--bg)",padding:"4px 10px",borderRadius:20,border:"1px solid "+(canSpin?"color-mix(in srgb,var(--G) 20%,transparent)":"var(--brd)")}}>{refs}/{minRef} {{fa:"دعوت",ar:"دعوة",tr:"davet",ru:"приг.",es:"inv."}[lang]||"invites"}</div>}
      </div>

      {alreadySpun&&!showWheel?<div style={{textAlign:"center",padding:"16px 0"}}>
        <div style={{fontSize:36,marginBottom:8}}>{entry.prize_won==="Try Again"?"😅":"🎉"}</div>
        <div style={{fontSize:14,fontWeight:700,color:entry.prize_won==="Try Again"?"var(--dm)":"var(--G)"}}>{prizes[entry.prize_index]?((lang==="fa"?prizes[entry.prize_index].name_fa:null)||prizes[entry.prize_index].name):entry.prize_won}</div>
        <div style={{fontSize:11,color:"var(--dm)",marginTop:4}}>{{fa:"قبلاً شرکت کردید",ar:"شاركت مسبقاً",tr:"Zaten katıldınız",ru:"Вы уже участвовали",es:"Ya participaste"}[lang]||"Already participated"}</div>
      </div>

      :!canSpin&&!alreadySpun&&!noRefRequired?<div style={{textAlign:"center",padding:"12px 0"}}>
        <div style={{fontSize:12,color:"var(--dm)",marginBottom:8}}>{{fa:`${minRef-refs} دعوت دیگه نیاز داری`,ar:`تحتاج ${minRef-refs} دعوة أخرى`,tr:`${minRef-refs} davet daha gerekli`,ru:`Нужно ещё ${minRef-refs} приглашений`,es:`Necesitas ${minRef-refs} invitaciones más`}[lang]||`Need ${minRef-refs} more invites`}</div>
        <div style={{fontSize:11,fontWeight:600,color:"var(--R)",cursor:"pointer"}}>{{fa:"→ برو به بخش دعوت",ar:"→ اذهب للإحالة",tr:"→ Davet bölümüne git",ru:"→ Перейти к приглашениям",es:"→ Ir a referidos"}[lang]||"→ Go to Referral section"}</div>
      </div>

      :<div style={{textAlign:"center"}}>{!showWheel?
        <div onClick={spin} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 32px",borderRadius:50,background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(239,68,68,0.3)"}}>
          🎡 {{fa:"بچرخون!",ar:"أدِر!",tr:"Çevir!",ru:"Крути!",es:"¡Gira!"}[lang]||"Spin!"}
        </div>
        :<div style={{padding:"10px 0"}}>
          {/* Wheel */}
          <div style={{position:"relative",width:220,height:220,margin:"0 auto"}}>
            {/* Pointer */}
            <div style={{position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",zIndex:5,fontSize:18}}>▼</div>
            {/* Spinning wheel */}
            <svg width="220" height="220" viewBox="0 0 220 220" style={{transform:`rotate(${angle}deg)`,transition:spinning?"transform 10s cubic-bezier(0.17,0.67,0.12,0.99)":"none"}}>
              {prizes.map((p,i)=>{
                const a1=(i*segAngle-90)*Math.PI/180;
                const a2=((i+1)*segAngle-90)*Math.PI/180;
                const x1=110+100*Math.cos(a1),y1=110+100*Math.sin(a1);
                const x2=110+100*Math.cos(a2),y2=110+100*Math.sin(a2);
                const large=segAngle>180?1:0;
                const mid=((i+0.5)*segAngle-90)*Math.PI/180;
                const tx=110+60*Math.cos(mid),ty=110+60*Math.sin(mid);
                return<g key={i}>
                  <path d={`M110,110 L${x1},${y1} A100,100 0 ${large},1 ${x2},${y2} Z`} fill={p.color||"#ccc"} stroke="#fff" strokeWidth="2"/>
                  <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="9" fontWeight="700" transform={`rotate(${(i+0.5)*segAngle},${tx},${ty})`}>{(lang==="fa"&&p.name_fa)?p.name_fa.slice(0,12):p.name?.slice(0,12)}</text>
                </g>
              })}
              <circle cx="110" cy="110" r="22" fill="#fff" stroke="#eee" strokeWidth="2"/>
              <text x="110" y="114" textAnchor="middle" fontSize="16">🎰</text>
            </svg>
          </div>
          {result&&<div style={{marginTop:16}}>
            <div style={{fontSize:28,marginBottom:6}}>{result.name==="Try Again"?"😅":"🎉"}</div>
            <div style={{fontSize:16,fontWeight:800,color:result.name==="Try Again"?"var(--dm)":"var(--G)"}}>{(lang==="fa"&&result.name_fa)?result.name_fa:result.name}</div>
          </div>}
        </div>
      }</div>}
    </div>
  </div>);
}

/* ─── Admin Giveaway Manager ─── */
function AdminGiveaway({token}){

  const[msg,setMsg]=useState("");

    try{
      const r=await fetch(`${SB}/rest/v1/giveaways?select=*&order=created_at.desc&limit=1`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d)&&d.length>0)setGw(d[0]);
      const r2=await fetch(`${SB}/rest/v1/giveaway_entries?select=*&order=created_at.desc`,{headers:H(token)});
      const d2=await r2.json();
      if(Array.isArray(d2))setEntries(d2);
    }catch(e){}
    setLoading(false);

    await fetch(`${SB}/rest/v1/giveaways?id=eq.${gw.id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({active:!gw.active})});

  useEffect(()=>{if(tk)load()},[tk,load]);
  useEffect(()=>{if(tk&&usr)chk(usr,tk)},[tk,usr,chk]);
  useEffect(()=>{if(tk){const i=setInterval(load,30000);return()=>clearInterval(i)}},[tk,load]);
  const{PTR}=usePullToRefresh(load);
  useActivityTracker(usr?.id,tk);
  // Notification badges
  const newPosts=posts.length>lastPostCount?posts.length-lastPostCount:0;
  const newSigs=sigs.length>lastSigCount?sigs.length-lastSigCount:0;
  const clearBadge=(key)=>{
    if(key==="analysis"&&newPosts>0){setLastPostCount(posts.length);try{localStorage.setItem("fx_pc",String(posts.length))}catch(e){}}
    if(key==="signals"&&newSigs>0){setLastSigCount(sigs.length);try{localStorage.setItem("fx_sc",String(sigs.length))}catch(e){}}
  };
  const splashDone=()=>{setShowSplash(false);try{sessionStorage.setItem("fx_splash","1")}catch(e){}};
  const onbDone=()=>{setShowOnb(false);try{localStorage.setItem("fx_onb","1")}catch(e){}};
  if(showSplash)return<SplashScreen onDone={splashDone}/>;
  if(!tk){
    return<>{showOnb&&<Onboarding onDone={onbDone} lang={lang}/>}<Auth onAuth={handleAuth} lang={lang} setLang={setLang}/></>;
  }
  const AT=[
    {l:t.home,k:"home",i:IC.home},
    {l:t.analysis,k:"analysis",i:IC.analysis,badge:newPosts},
    {l:t.signals,k:"signals",i:IC.sig,badge:newSigs},
    {l:t.plans,k:"plans",i:IC.pla},
    {l:t.admin,k:"admin",i:IC.adm,ao:true},
    {l:t.profile,k:"profile",i:IC.usr}
  ];
  const VT=AT.filter(tab=>!tab.ao||adm);
  const st=Math.min(tab,VT.length-1);
  const cur=VT[st];
  const goTab=i=>{setTab(i);clearBadge(VT[i]?.k)};
  const goToTabByKey=(k)=>{const idx=VT.findIndex(t=>t.k===k);if(idx>=0)goTab(idx)};
  const scr=()=>{switch(cur?.k){
    case"home":return<Home posts={posts} signals={sigs} msgs={msgs} stories={stories} go={goTab} goToPlans={()=>goToTabByKey("plans")} P={P} ok={ok} lastUpdate={lastUpdate} dark={dark} toggle={toggle} userProfile={up} token={tk} onR={load}/>;
    case"analysis":return<Analysis posts={posts} userProfile={up} msgs={msgs} token={tk} onR={load} goToPlans={()=>goToTabByKey("plans")}/>;
    case"signals":return<Sigs signals={sigs} userProfile={up} goToPlans={()=>goToTabByKey("plans")}/>;
    case"plans":return<Plans userProfile={up} goToSupport={()=>{goToTabByKey("profile");setOpenSupport(true)}} token={tk}/>;
    case"admin":return<Adm token={tk} posts={posts} signals={sigs} onR={load}/>;
    case"profile":return<Prof user={usr} up={up} onOut={handleLogout} dark={dark} toggle={toggle} lang={lang} setLang={setLang} token={tk} onNameChange={(name)=>{setUp(prev=>prev?{...prev,full_name:name}:prev)}} openSupport={openSupport} onSupportOpened={()=>setOpenSupport(false)}/>;
    default:return null;
  }};
  return(
    <LangCtx.Provider value={{t,lang}}>
      <div className="app">
        <div className="hd">
          <div className="lg">Fxscalproom<b>.</b></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {adm&&<span style={{fontSize:9,fontWeight:600,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"3px 8px",borderRadius:6}}>ADMIN</span>}
            <span style={{fontSize:12,color:"var(--mu)",fontWeight:500}}>{cur?.l}</span>
          </div>
        </div>
        <div className="ct">
          <PTR/>
          {scr()}
        </div>
        <div className="tb">{VT.map((tab,i)=>
          <div key={i} className={`ti${st===i?" ti-active":""}`} onClick={()=>goTab(i)} style={{color:st===i?"var(--tx)":"var(--dm)"}}>
            <div style={{position:"relative"}}>
              {tab.i}
              {tab.badge>0&&st!==i&&<div className="nb"/>}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:st===i?"var(--R)":"var(--dm)"}}>{tab.l}</span>
          </div>
        )}</div>
      </div>
    </LangCtx.Provider>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
