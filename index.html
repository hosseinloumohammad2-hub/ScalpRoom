.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi{animation:fi .2s ease}

@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.ld{width:5px;height:5px;border-radius:50%;background:var(--G);animation:pl 2s infinite}

/* ─── Theme Hook ─── */
function useTheme(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("fxtheme")!=="light"}catch(e){return true}});
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");try{localStorage.setItem("fxtheme",dark?"dark":"light")}catch(e){};document.querySelector('meta[name="theme-color"]').content=dark?"#050507":"#f4f4f5"},[dark]);
  return{dark,toggle:()=>setDark(d=>!d)};
}

/* ─── Push Notifications ─── */
function useNotifications(){
  const[enabled,setEnabled]=useState(false);
  const enable=async()=>{
    if(!("Notification" in window))return false;
    const perm=await Notification.requestPermission();
    if(perm==="granted"){setEnabled(true);return true}
    return false;
  };
  const notify=(title,body)=>{
    if(enabled&&"Notification" in window&&Notification.permission==="granted"){
      new Notification(title,{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='12' fill='%2309090b'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='central' font-family='Arial' font-weight='800' font-size='20' fill='white'>Fx</text><circle cx='48' cy='44' r='4' fill='%23FF4136'/></svg>"});
    }
  };
  useEffect(()=>{if("Notification" in window&&Notification.permission==="granted")setEnabled(true)},[]);
  return{enabled,enable,notify};
}

/* ─── Toast ─── */
function Toast({msg,onDone}){
  useEffect(()=>{if(msg){const t=setTimeout(onDone,2500);return()=>clearTimeout(t)}},[msg]);
  if(!msg)return null;
  return<div className="toast">{msg}</div>;
}

      <input className="ip" placeholder={t.title} value={ti} onChange={e=>setTi(e.target.value)}/>
      <textarea placeholder={t.description} value={de} onChange={e=>setDe(e.target.value)} rows={3}/>
      <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>{["gold","forex","crypto","indices","iran"].map(c=>
        <div key={c} onClick={()=>setCa(c)} style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",background:ca===c?"color-mix(in srgb,var(--R) 10%,transparent)":"transparent",border:`1px solid ${ca===c?"color-mix(in srgb,var(--R) 25%,transparent)":"var(--brd)"}`,fontSize:11,fontWeight:600,color:ca===c?"var(--R)":"var(--mu)"}}>{c==="gold"?t.gold:c==="forex"?t.forex:c==="crypto"?t.crypto:c==="indices"?t.indices:t.iran}</div>
      )}</div>
      <div onClick={()=>setPr(!pr)} className="cd" style={{padding:12,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13}}>Premium</span>
        <div style={{width:40,height:22,borderRadius:11,background:pr?"var(--R)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:pr?20:2,transition:".2s"}}/></div>
      </div>
      <div onClick={()=>setCustomDate(!customDate)} className="cd" style={{padding:12,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13}}>Custom Date</span>
        <div style={{width:40,height:22,borderRadius:11,background:customDate?"var(--B)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:customDate?20:2,transition:".2s"}}/></div>
      </div>
      {customDate&&<input className="ip" type="datetime-local" value={postDate} onChange={e=>setPostDate(e.target.value)}/>}
      <button className="bt" style={{background:"var(--R)",opacity:ld?.5:1}} onClick={pub} disabled={ld}>{ld?"...":t.publish}</button>
    </>}

    {tb==="signal"&&<>
      <input className="ip" placeholder={t.pair+" (e.g. XAUUSD)"} value={pa} onChange={e=>setPa(e.target.value)}/>
      <div style={{display:"flex",gap:6,marginBottom:8}}>{["BUY","SELL"].map(typ=>
        <div key={typ} onClick={()=>setSt(typ)} style={{flex:1,padding:12,borderRadius:10,textAlign:"center",cursor:"pointer",background:st===typ?(typ==="BUY"?"color-mix(in srgb,var(--G) 10%,transparent)":"color-mix(in srgb,var(--R) 10%,transparent)"):"transparent",border:`1px solid ${st===typ?(typ==="BUY"?"color-mix(in srgb,var(--G) 20%,transparent)":"color-mix(in srgb,var(--R) 20%,transparent)"):"var(--brd)"}`,fontSize:14,fontWeight:600,color:st===typ?(typ==="BUY"?"var(--G)":"var(--R)"):"var(--mu)"}}>{typ}</div>
      )}</div>
      <input className="ip" placeholder={t.entry} value={en} onChange={e=>setEn(e.target.value)}/>
      <input className="ip" placeholder="TP1" value={tp1} onChange={e=>setTp1(e.target.value)}/>
      <input className="ip" placeholder="TP2 (optional)" value={tp2} onChange={e=>setTp2(e.target.value)}/>
      <input className="ip" placeholder="TP3 (optional)" value={tp3} onChange={e=>setTp3(e.target.value)}/>
      <input className="ip" placeholder={t.sl} value={sl} onChange={e=>setSl(e.target.value)}/>
      <div onClick={()=>setSigPr(!sigPr)} className="cd" style={{padding:12,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13}}>Premium Signal</span>
        <div style={{width:40,height:22,borderRadius:11,background:sigPr?"var(--R)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:sigPr?20:2,transition:".2s"}}/></div>
      </div>
      <div onClick={()=>setSigCustomDate(!sigCustomDate)} className="cd" style={{padding:12,marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13}}>Custom Date</span>
        <div style={{width:40,height:22,borderRadius:11,background:sigCustomDate?"var(--B)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:sigCustomDate?20:2,transition:".2s"}}/></div>
      </div>
      {sigCustomDate&&<input className="ip" type="datetime-local" value={sigDate} onChange={e=>setSigDate(e.target.value)}/>}
      <button className="bt" style={{background:"var(--G)",opacity:ld?.5:1}} onClick={pubS} disabled={ld}>{ld?"...":t.publishSignal}</button>
    </>}

    {tb==="manage"&&<>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>{t.post}s ({(posts||[]).length})</div>
      {(posts||[]).map(p=><div key={p.id} className="cd" style={{display:"flex",alignItems:"center",gap:10,padding:10,marginBottom:4}}>
        {p.image_url?<img src={p.image_url} style={{width:36,height:36,borderRadius:6,objectFit:"cover"}} alt=""/>:<div style={{width:36,height:36,borderRadius:6,background:"var(--bg)"}}/>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.title}</div>
          <div style={{fontSize:10,color:"var(--dm)"}}>{p.category} · {p.created_at?new Date(p.created_at).toLocaleDateString():""}</div>
        </div>
        {p.is_premium&&<span style={{fontSize:8,fontWeight:700,color:"var(--R)",padding:"2px 5px",borderRadius:4,background:"color-mix(in srgb,var(--R) 10%,transparent)"}}>PRO</span>}
        <div onClick={()=>setEditPost(p)} style={{cursor:"pointer",color:"var(--B)",padding:4}}>{IC.edit}</div>
        <div onClick={()=>delP(p.id)} style={{cursor:"pointer",color:"var(--R)",padding:4}}>{IC.del}</div>
      </div>)}

      <div style={{fontSize:13,fontWeight:600,marginBottom:8,marginTop:16}}>{t.signal}s ({(signals||[]).length})</div>
      {(signals||[]).map(s=><div key={s.id} className="cd" style={{display:"flex",alignItems:"center",gap:10,padding:10,marginBottom:4}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span className="m" style={{fontSize:12,fontWeight:500}}>{s.pair}</span>
            <span style={{fontSize:10,fontWeight:600,color:s.type==="BUY"?"var(--G)":"var(--R)"}}>{s.type}</span>
            <span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:4,
              background:s.status==="active"?"color-mix(in srgb,var(--B) 10%,transparent)":s.status==="tp_hit"?"color-mix(in srgb,var(--G) 10%,transparent)":"color-mix(in srgb,var(--R) 10%,transparent)",
              color:s.status==="active"?"var(--B)":s.status==="tp_hit"?"var(--G)":"var(--R)"
            }}>{s.status?.toUpperCase().replace("_"," ")}</span>
          </div>
          <div style={{fontSize:10,color:"var(--dm)",marginTop:2}}>{s.created_at?new Date(s.created_at).toLocaleDateString():""}{s.pnl&&<span className="m" style={{marginLeft:6,color:s.pnl.startsWith("-")?"var(--R)":"var(--G)"}}>{s.pnl}</span>}</div>
        </div>
        {s.is_premium&&<span style={{fontSize:8,fontWeight:700,color:"var(--R)",padding:"2px 5px",borderRadius:4,background:"color-mix(in srgb,var(--R) 10%,transparent)"}}>PRO</span>}
        <div onClick={()=>setEditSig(s)} style={{cursor:"pointer",color:"var(--B)",padding:4}}>{IC.edit}</div>
        <div onClick={()=>delS(s.id)} style={{cursor:"pointer",color:"var(--R)",padding:4}}>{IC.del}</div>
      </div>)}
    </>}

    {tb==="users"&&<>
      <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{t.users} ({users.length})</div>
      {users.map(u=><div key={u.id} className="cd" style={{display:"flex",alignItems:"center",gap:10,padding:12,marginBottom:4}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{(u.full_name||u.email||"?")[0].toUpperCase()}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600}}>{u.full_name||"No name"}</div>
          <div style={{fontSize:10,color:"var(--dm)"}}>{u.email}</div>
        </div>
        {u.membership==="premium"?
          <div onClick={()=>setFree(u.id)} style={{cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--G)",background:"color-mix(in srgb,var(--G) 10%,transparent)",padding:"4px 10px",borderRadius:6,display:"flex",alignItems:"center",gap:4}}>{IC.ck} PRO</div>:
          <div onClick={()=>setPremium(u.id)} style={{cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--mu)",background:"var(--bg)",padding:"4px 10px",borderRadius:6,border:"1px solid var(--brd)"}}>{t.setpro}</div>
        }
      </div>)}
    </>}

    {editSig&&<SignalEditModal sig={editSig} onClose={()=>setEditSig(null)} onSave={saveSig}/>}
    {editPost&&<PostEditModal post={editPost} onClose={()=>setEditPost(null)} onSave={savePost}/>}
  </div>);
}

/* ─── Profile ─── */
function Prof({user,up,onOut,dark,toggle,lang,setLang}){
  const{t}=useLang();
  const noti=useNotifications();
  const[showLang,setShowLang]=useState(false);
  return(<div className="fi">
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 0 30px"}}>
      <div style={{width:72,height:72,borderRadius:"50%",background:"var(--bg2)",border:"2px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:700,marginBottom:14}}>{(up?.full_name||user?.email||"U")[0].toUpperCase()}</div>
      <div style={{fontSize:17,fontWeight:600}}>{up?.full_name||"User"}</div>
      <div style={{fontSize:12,color:"var(--dm)",marginTop:4}}>{user?.email}</div>
      <div style={{marginTop:10,fontSize:11,fontWeight:600,color:up?.membership==="premium"?"var(--G)":"var(--mu)",background:up?.membership==="premium"?"color-mix(in srgb,var(--G) 10%,transparent)":"color-mix(in srgb,var(--mu) 10%,transparent)",padding:"4px 12px",borderRadius:20}}>
        {(up?.membership||"free").toUpperCase()}{up?.role==="admin"?" · ADMIN":""}
      </div>
    </div>

    {/* Theme toggle */}
    <div onClick={toggle} className="cd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:14,marginBottom:6,cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"var(--mu)"}}>{dark?IC.moon:IC.sun}</span><span style={{fontSize:13,fontWeight:500}}>{dark?t.darkMode:t.lightMode}</span></div>
      <div style={{width:40,height:22,borderRadius:11,background:dark?"var(--R)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:dark?20:2,transition:".2s"}}/></div>
    </div>

    {/* Language */}
    <div onClick={()=>setShowLang(!showLang)} className="cd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:14,marginBottom:6,cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"var(--mu)"}}>{IC.globe}</span><span style={{fontSize:13,fontWeight:500}}>{t.language}</span></div>
      <span style={{fontSize:12,color:"var(--mu)"}}>{LANGS[lang]}</span>
    </div>
    {showLang&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
      {Object.entries(LANGS).map(([k,v])=>
        <div key={k} onClick={()=>{setLang(k);setShowLang(false)}} style={{padding:"8px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:lang===k?"color-mix(in srgb,var(--R) 10%,transparent)":"transparent",border:`1px solid ${lang===k?"color-mix(in srgb,var(--R) 25%,transparent)":"var(--brd)"}`,color:lang===k?"var(--R)":"var(--mu)"}}>{v}</div>
      )}
    </div>}

    {/* Notifications */}
    <div onClick={async()=>{if(!noti.enabled)await noti.enable()}} className="cd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:14,marginBottom:6,cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"var(--mu)"}}>{IC.bell}</span><span style={{fontSize:13,fontWeight:500}}>{noti.enabled?t.pushEnabled:t.pushEnable}</span></div>
      <div style={{width:40,height:22,borderRadius:11,background:noti.enabled?"var(--G)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:noti.enabled?20:2,transition:".2s"}}/></div>
    </div>

    {/* Social */}
    <a href="https://t.me/FxScalpRoom" target="_blank" rel="noopener" className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginBottom:4,cursor:"pointer"}}><span style={{color:"#0088cc"}}>{IC.tg}</span><span style={{flex:1,fontSize:13,fontWeight:500}}>Telegram</span></a>
    <a href="https://www.instagram.com/forexscalproom" target="_blank" rel="noopener" className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginBottom:4,cursor:"pointer"}}><span style={{color:"#E1306C"}}>{IC.ig}</span><span style={{flex:1,fontSize:13,fontWeight:500}}>Instagram</span></a>

    {/* Sign out */}
    <div onClick={onOut} className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginTop:12,cursor:"pointer",background:"color-mix(in srgb,var(--R) 5%,transparent)",borderColor:"color-mix(in srgb,var(--R) 12%,transparent)"}}><span style={{fontSize:13,color:"var(--R)",fontWeight:600}}>{t.signOut}</span></div>
  </div>);
}

/* ─── Main App ─── */
function App(){
  // Restore session from localStorage
  const[tk,setTk]=useState(()=>{try{return localStorage.getItem("fx_tk")||null}catch(e){return null}});
  const[usr,setUsr]=useState(()=>{try{const u=localStorage.getItem("fx_usr");return u?JSON.parse(u):null}catch(e){return null}});
  const[up,setUp]=useState(null),[adm,setAdm]=useState(false);
  const[tab,setTab]=useState(0),[posts,setP]=useState([]),[sigs,setS]=useState([]);
  const[lang,setLangState]=useState(()=>{try{return localStorage.getItem("fxlang")||"en"}catch(e){return"en"}});
  const{P,ok}=usePrices();const{dark,toggle}=useTheme();
  const t=T[lang]||T.en;

  // Save session on login
  const handleAuth=(token,user)=>{
    setTk(token);setUsr(user);
    try{localStorage.setItem("fx_tk",token);localStorage.setItem("fx_usr",JSON.stringify(user))}catch(e){}
  };
  // Clear session on logout
  const handleLogout=()=>{
    setTk(null);setUsr(null);setAdm(false);setUp(null);setTab(0);
    try{localStorage.removeItem("fx_tk");localStorage.removeItem("fx_usr")}catch(e){}
  };

  const setLang=(l)=>{setLangState(l);try{localStorage.setItem("fxlang",l)}catch(e){}
    const isRtl=RTL_LANGS.includes(l);
    document.documentElement.setAttribute("dir",isRtl?"rtl":"ltr");
    document.documentElement.setAttribute("lang",l);
  };
  useEffect(()=>{const isRtl=RTL_LANGS.includes(lang);document.documentElement.setAttribute("dir",isRtl?"rtl":"ltr");document.documentElement.setAttribute("lang",lang)},[]);

  const load=useCallback(async()=>{try{const p=await api.get("Posts",tk);if(Array.isArray(p))setP(p);else if(p?.message){handleLogout();return}const s=await api.get("Signals",tk);if(Array.isArray(s))setS(s)}catch(e){}},[tk]);
  const chk=useCallback(async(u,t)=>{try{const r=await fetch(`${SB}/rest/v1/Users?id=eq.${u.id}`,{headers:H(t)});const d=await r.json();if(Array.isArray(d)&&d[0]){setUp(d[0]);if(d[0].role==="admin")setAdm(true)}}catch(e){}},[]);
  useEffect(()=>{if(tk)load()},[tk,load]);
  useEffect(()=>{if(tk&&usr)chk(usr,tk)},[tk,usr,chk]);
  // Auto-refresh
  useEffect(()=>{if(tk){const i=setInterval(load,30000);return()=>clearInterval(i)}},[tk,load]);

  if(!tk)return<Auth onAuth={handleAuth} lang={lang} setLang={setLang}/>;

  const AT=[
    {l:t.home,k:"home",i:IC.home},
    {l:t.analysis,k:"analysis",i:IC.analysis},
    {l:t.signals,k:"signals",i:IC.sig},
    {l:t.plans,k:"plans",i:IC.pla},
    {l:t.admin,k:"admin",i:IC.adm,ao:true},
    {l:t.profile,k:"profile",i:IC.usr}
  ];
  const VT=AT.filter(tab=>!tab.ao||adm);
  const st=Math.min(tab,VT.length-1);
  const cur=VT[st];
  const goTab=i=>setTab(i);

  const scr=()=>{switch(cur?.k){
    case"home":return<Home posts={posts} go={goTab} P={P} ok={ok} dark={dark} toggle={toggle} userProfile={up}/>;
    case"analysis":return<Analysis posts={posts} userProfile={up}/>;
    case"signals":return<Sigs signals={sigs} userProfile={up}/>;
    case"plans":return<Plans/>;
    case"admin":return<Adm token={tk} posts={posts} signals={sigs} onR={load}/>;
    case"profile":return<Prof user={usr} up={up} onOut={handleLogout} dark={dark} toggle={toggle} lang={lang} setLang={setLang}/>;
    default:return null;
  }};

  return(
    <LangCtx.Provider value={{t,lang}}>
      <div className="app">
        <div className="hd">
          <div className="lg">Fxscalproom<b>.</b></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {adm&&<span style={{fontSize:9,fontWeight:600,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"3px 8px",borderRadius:6}}>ADMIN</span>}
            <span style={{fontSize:12,color:"var(--mu)",fontWeight:500}}>{cur?.l}</span>
          </div>
        </div>
        <div className="ct">{scr()}</div>
        <div className="tb">{VT.map((tab,i)=>
          <div key={i} className="ti" onClick={()=>setTab(i)} style={{color:st===i?"var(--tx)":"var(--dm)"}}>
            {tab.i}
          </div>
        )}</div>
      </div>
    </LangCtx.Provider>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
