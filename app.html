function AdminPromo({token}){
  const{lang}=useLang();
  const{promo,reloadPromo}=usePromo(token);
  const[pct,setPct]=useState("30");
  const[days,setDays]=useState("7");
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState("");

  const basePlans=[{dur:"1 Month",p:54},{dur:"3 Months",p:100},{dur:"6 Months",p:170},{dur:"1 Year",p:300}];
  const discPct=parseInt(pct)||0;

  const activate=async()=>{
    if(discPct<1||discPct>90){setMsg("Discount 1-90%");return}
    const d=parseInt(days)||7;
    if(d<1){setMsg("Min 1 day");return}
    setSaving(true);
    try{
      // Deactivate old promos
      await fetch(`${SB}/rest/v1/PromoSales?is_active=eq.true`,{method:"PATCH",headers:H(token),body:JSON.stringify({is_active:false})});
      // Create new
      const end=new Date();end.setDate(end.getDate()+d);
      await fetch(`${SB}/rest/v1/PromoSales`,{method:"POST",headers:H(token),body:JSON.stringify({discount_pct:discPct,end_date:end.toISOString(),is_active:true})});
      setMsg("Sale activated!");
      reloadPromo();
    }catch(e){setMsg(e.message)}
    setSaving(false);
    setTimeout(()=>setMsg(""),3000);
  };

  const deactivate=async()=>{
    if(!confirm(lang==="fa"?"غیرفعال شود؟":"Deactivate?"))return;
    setSaving(true);
    try{
      await fetch(`${SB}/rest/v1/PromoSales?is_active=eq.true`,{method:"PATCH",headers:H(token),body:JSON.stringify({is_active:false})});
      setMsg("Sale deactivated");
      reloadPromo();
    }catch(e){setMsg(e.message)}
    setSaving(false);
    setTimeout(()=>setMsg(""),3000);
  };

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{lang==="fa"?"🏷 مدیریت تخفیف":"🏷 Sale Manager"}</div>

    {/* Active promo */}
    {promo&&<div className="cd" style={{marginBottom:14,padding:16,borderColor:"color-mix(in srgb,var(--G) 25%,transparent)",background:"color-mix(in srgb,var(--G) 3%,transparent)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"var(--G)",animation:"pl 2s infinite"}}/>
          <span style={{fontSize:13,fontWeight:700,color:"var(--G)"}}>{lang==="fa"?"فعال":"ACTIVE"}</span>
        </div>
        <span className="m" style={{fontSize:24,fontWeight:700,color:"var(--R)"}}>{promo.discount_pct}% OFF</span>
      </div>
      <div style={{marginBottom:12}}><Countdown endDate={promo.end_date}/></div>
      <div style={{fontSize:11,color:"var(--dm)",marginBottom:4}}>Ends: {new Date(promo.end_date).toLocaleDateString()} {new Date(promo.end_date).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
      {/* Preview */}
      <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:8,marginTop:12}}>{lang==="fa"?"پیش‌نمایش قیمت‌ها:":"Price preview:"}</div>
      {basePlans.map((pl,i)=>{const disc=Math.round(pl.p*(1-promo.discount_pct/100));return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:12}}>
        <span>{pl.dur}</span>
        <div><span style={{textDecoration:"line-through",color:"var(--dm)",marginRight:8}}>${pl.p}</span><span style={{fontWeight:700,color:"var(--G)"}}>${disc}</span></div>
      </div>})}
      <div onClick={deactivate} className="bt" style={{background:"var(--R)",marginTop:12,opacity:saving?.5:1}} disabled={saving}>{saving?"...":(lang==="fa"?"غیرفعال کردن":"Deactivate Sale")}</div>
    </div>}

    {/* Create new */}
    <div className="cd" style={{padding:16}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{lang==="fa"?"ایجاد تخفیف جدید":"Create New Sale"}</div>
      <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{lang==="fa"?"درصد تخفیف":"Discount %"}</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {["10","20","30","40","50"].map(v=><div key={v} onClick={()=>setPct(v)} style={{flex:1,padding:10,borderRadius:10,textAlign:"center",cursor:"pointer",fontSize:14,fontWeight:700,
          background:pct===v?"color-mix(in srgb,var(--R) 10%,transparent)":"transparent",
          border:`1px solid ${pct===v?"color-mix(in srgb,var(--R) 25%,transparent)":"var(--brd)"}`,
          color:pct===v?"var(--R)":"var(--mu)"
        }}>{v}%</div>)}
      </div>
      <input className="ip" type="number" placeholder={lang==="fa"?"درصد دلخواه":"Custom %"} value={pct} onChange={e=>setPct(e.target.value)} style={{marginBottom:8}}/>

      <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{lang==="fa"?"مدت (روز)":"Duration (days)"}</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {["3","5","7","10","14"].map(v=><div key={v} onClick={()=>setDays(v)} style={{flex:1,padding:10,borderRadius:10,textAlign:"center",cursor:"pointer",fontSize:13,fontWeight:700,
          background:days===v?"color-mix(in srgb,var(--B) 10%,transparent)":"transparent",
          border:`1px solid ${days===v?"color-mix(in srgb,var(--B) 25%,transparent)":"var(--brd)"}`,
          color:days===v?"var(--B)":"var(--mu)"
        }}>{v}</div>)}
      </div>
      <input className="ip" type="number" placeholder={lang==="fa"?"مدت دلخواه (روز)":"Custom days"} value={days} onChange={e=>setDays(e.target.value)} style={{marginBottom:10}}/>

      {/* Preview */}
      {discPct>0&&<div style={{marginBottom:12,padding:12,background:"var(--bg)",borderRadius:12,border:"1px solid var(--brd)"}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:8}}>{lang==="fa"?"پیش‌نمایش:":"Preview:"}</div>
        {basePlans.map((pl,i)=>{const disc=Math.round(pl.p*(1-discPct/100));return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:12}}>
          <span style={{color:"var(--tx2)"}}>{pl.dur}</span>
          <div><span style={{textDecoration:"line-through",color:"var(--dm)",marginRight:8}}>${pl.p}</span><span className="m" style={{fontWeight:700,color:"var(--G)"}}>${disc}</span><span style={{fontSize:9,color:"var(--R)",marginLeft:4}}>-{discPct}%</span></div>
        </div>})}
      </div>}

      {msg&&<div style={{marginBottom:10,padding:10,borderRadius:10,fontSize:12,fontWeight:600,textAlign:"center",background:msg.includes("!")?"color-mix(in srgb,var(--G) 8%,transparent)":"color-mix(in srgb,var(--R) 8%,transparent)",color:msg.includes("!")?"var(--G)":"var(--R)"}}>{msg}</div>}
      <div onClick={activate} className="bt" style={{background:"var(--G)",opacity:saving?.5:1}} disabled={saving}>{saving?"...":(lang==="fa"?"فعال‌سازی تخفیف":"Activate Sale")}</div>
    </div>
  </div>);
}

/* ─── Admin Payments ─── */
function AdminPayments({token}){
  const{lang}=useLang();
  const[payments,setPayments]=useState([]);
  const[users,setUsers]=useState({});
  const[loading,setLoading]=useState(true);
  const[processing,setProcessing]=useState(null);

  const load=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/PaymentRequests?order=created_at.desc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setPayments(d);
      const us=await fetch(`${SB}/rest/v1/Users?select=id,full_name,email,membership`,{headers:H(token)});
      const usData=await us.json();
      if(Array.isArray(usData)){const m={};usData.forEach(u=>m[u.id]=u);setUsers(m)}
    }catch(e){}
    setLoading(false);
  },[token]);

  useEffect(()=>{load()},[load]);

  const approve=async(p)=>{
    setProcessing(p.id);
    try{
      // Update payment status
      await fetch(`${SB}/rest/v1/PaymentRequests?id=eq.${p.id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({status:"approved"})});
      // Activate premium for user
      const exp=new Date();exp.setDate(exp.getDate()+(p.plan_days||30));
      await fetch(`${SB}/rest/v1/Users?id=eq.${p.user_id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({membership:"premium",premium_expires_at:exp.toISOString()})});
      load();
    }catch(e){}
    setProcessing(null);
  };

  const reject=async(id)=>{
    if(!confirm(lang==="fa"?"رد شود؟":"Reject?"))return;
    setProcessing(id);
    try{
      await fetch(`${SB}/rest/v1/PaymentRequests?id=eq.${id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({status:"rejected"})});
      load();
    }catch(e){}
    setProcessing(null);
  };

  const statusColor=(s)=>s==="approved"?"var(--G)":s==="rejected"?"var(--R)":"var(--Y)";
  const statusLabel=(s)=>({pending:lang==="fa"?"در انتظار":"Pending",approved:lang==="fa"?"تأیید شده":"Approved",rejected:lang==="fa"?"رد شده":"Rejected"}[s]||s);
  const pending=payments.filter(p=>p.status==="pending");
  const history=payments.filter(p=>p.status!=="pending");

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{lang==="fa"?"💳 درخواست‌های پرداخت":"💳 Payment Requests"}</div>

    {loading&&<div style={{textAlign:"center",padding:30}}><div className="ptr-spinner"/></div>}

    {/* Pending */}
    {pending.length>0&&<div style={{fontSize:12,fontWeight:600,color:"var(--Y)",marginBottom:8}}>{lang==="fa"?"در انتظار تأیید":"Pending"} ({pending.length})</div>}
    {pending.map(p=>{
      const u=users[p.user_id];
      return<div key={p.id} className="cd" style={{padding:14,marginBottom:8,borderColor:"color-mix(in srgb,var(--Y) 25%,transparent)",background:"color-mix(in srgb,var(--Y) 3%,transparent)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>{u?.full_name||"Unknown"}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{u?.email}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="m" style={{fontSize:22,fontWeight:700,color:"var(--G)"}}>${p.amount}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{p.plan_name}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:"var(--dm)",marginBottom:10}}>{new Date(p.created_at).toLocaleDateString()} {new Date(p.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{display:"flex",gap:6}}>
          <button className="bt" style={{background:"var(--G)",flex:1,padding:12,fontSize:13,opacity:processing===p.id?.5:1}} onClick={()=>approve(p)} disabled={processing===p.id}>
            {processing===p.id?"...":(lang==="fa"?"✓ تأیید و فعال‌سازی":"✓ Approve & Activate")}
          </button>
          <button className="bt" style={{background:"var(--R)",flex:"0 0 auto",padding:"12px 16px",fontSize:13,opacity:processing===p.id?.5:1}} onClick={()=>reject(p.id)} disabled={processing===p.id}>
            ✗
          </button>
        </div>
      </div>
    })}

    {!loading&&pending.length===0&&<div style={{textAlign:"center",color:"var(--dm)",fontSize:12,padding:20,marginBottom:12}}>{lang==="fa"?"درخواست پرداخت جدیدی نیست":"No pending payments"}</div>}

    {/* History */}
    {history.length>0&&<>
      <div style={{fontSize:12,fontWeight:600,color:"var(--dm)",marginTop:12,marginBottom:8}}>{lang==="fa"?"تاریخچه":"History"} ({history.length})</div>
      {history.map(p=>{
        const u=users[p.user_id];
        return<div key={p.id} className="cd" style={{padding:10,marginBottom:4,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600}}>{u?.full_name||"Unknown"}</div>
            <div style={{fontSize:10,color:"var(--dm)"}}>{p.plan_name} · ${p.amount} · {new Date(p.created_at).toLocaleDateString()}</div>
          </div>
          <span style={{fontSize:9,fontWeight:700,color:statusColor(p.status),background:`color-mix(in srgb,${statusColor(p.status)} 10%,transparent)`,padding:"3px 8px",borderRadius:6}}>{statusLabel(p.status)}</span>
        </div>
      })}
    </>}
  </div>);
}

/* ─── Admin Performance Report Generator ─── */
function AdminReport({token,posts,signals}){
  const{lang}=useLang();
  const[fromDate,setFromDate]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10)});
  const[toDate,setToDate]=useState(()=>new Date().toISOString().slice(0,10));
  const[generating,setGenerating]=useState(false);
  const[showSigs,setShowSigs]=useState(true);
  const[previewHtml,setPreviewHtml]=useState(null);

  const filteredPosts=(posts||[]).filter(p=>{
    const d=new Date(p.created_at);
    return d>=new Date(fromDate)&&d<=new Date(toDate+"T23:59:59");
  });
  const filteredSigs=(signals||[]).filter(s=>{
    const d=new Date(s.created_at);
    return d>=new Date(fromDate)&&d<=new Date(toDate+"T23:59:59");
  });
  const tpHit=filteredSigs.filter(s=>s.status==="tp_hit").length;
  const slHit=filteredSigs.filter(s=>s.status==="sl_hit").length;
  const activeSigs=filteredSigs.filter(s=>s.status==="active").length;
  const winRate=(tpHit+slHit)>0?Math.round((tpHit/(tpHit+slHit))*100):0;
  const hasSigs=showSigs&&filteredSigs.length>0;

  const generateHtml=(theme)=>{
    const dk=theme==="dark";
    const imgPosts=filteredPosts.filter(p=>p.image_url);
    const imgs=imgPosts.map(p=>(p.image_url||"").split(",")[0]).filter(Boolean);
    // Smart columns: fit ALL images in the grid area
    const maxGridCells=100;
    const totalImgs=Math.min(imgs.length,maxGridCells);
    const cols=totalImgs<=4?2:totalImgs<=9?3:totalImgs<=16?4:totalImgs<=25?5:totalImgs<=36?6:totalImgs<=49?7:totalImgs<=64?8:totalImgs<=81?9:10;
    const fromStr=new Date(fromDate).toLocaleDateString("en",{month:"short",day:"numeric"});
    const toStr=new Date(toDate).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"});

    // Smart title based on date range
    const dayDiff=Math.round((new Date(toDate)-new Date(fromDate))/(1000*60*60*24));
    let periodTitle="Performance";
    if(dayDiff===0)periodTitle=lang==="fa"?"گزارش امروز":"Today's Report";
    else if(dayDiff<=1)periodTitle=lang==="fa"?"گزارش روزانه":"Daily Report";
    else if(dayDiff<=7)periodTitle=lang==="fa"?"گزارش هفتگی":"Weekly Report";
    else if(dayDiff<=14)periodTitle=lang==="fa"?"گزارش دو هفته":"Bi-Weekly Report";
    else if(dayDiff<=31)periodTitle=lang==="fa"?"گزارش ماهانه":"Monthly Report";
    else if(dayDiff<=93)periodTitle=lang==="fa"?"گزارش فصلی":"Quarterly Report";
    else periodTitle=lang==="fa"?"گزارش عملکرد":"Performance Report";

    // Theme colors
    const C=dk?{
      bg:"#0a0a0c",bg2:"#1c1c1e",tx:"#ffffff",tx2:"#a1a1aa",mu:"#71717a",dm:"#52525b",
      brd:"rgba(255,255,255,.08)",R:"#ff453a",G:"#30d158",B:"#0a84ff",Y:"#ffd60a",
      cardBg:"rgba(255,255,255,.04)",cardBrd:"rgba(255,255,255,.08)",
      glow1:"rgba(255,65,54,.08)",glow2:"rgba(10,132,255,.06)",
      footTx:"rgba(255,255,255,.2)",footDot:"rgba(255,69,58,.3)",footSub:"rgba(255,255,255,.12)"
    }:{
      bg:"#f5f5f7",bg2:"#ffffff",tx:"#1d1d1f",tx2:"#424245",mu:"#86868b",dm:"#aeaeb2",
      brd:"rgba(0,0,0,.06)",R:"#ff3b30",G:"#28cd41",B:"#0071e3",Y:"#ff9f0a",
      cardBg:"rgba(0,0,0,.03)",cardBrd:"rgba(0,0,0,.06)",
      glow1:"rgba(255,59,48,.06)",glow2:"rgba(0,113,227,.05)",
      footTx:"rgba(0,0,0,.15)",footDot:"rgba(255,59,48,.25)",footSub:"rgba(0,0,0,.1)"
    };

    let statsHtml="";
    const statItems=[{v:filteredPosts.length,l:lang==="fa"?"تحلیل":"Analyses",c:C.B}];
    if(hasSigs){
      statItems.push({v:filteredSigs.length,l:lang==="fa"?"سیگنال":"Signals",c:C.G});
      statItems.push({v:winRate+"%",l:"Win Rate",c:winRate>=60?C.G:C.Y});
      statItems.push({v:tpHit,l:"TP Hit",c:C.G});
      statItems.push({v:slHit,l:"SL Hit",c:C.R});
    }
    statsHtml=statItems.map((s,i)=>`<div class="stat-box" style="animation-delay:${.8+i*.15}s"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("");

    const gridImgs=imgs.slice(0,cols*Math.ceil(totalImgs/cols)).map((url,i)=>`<div class="img-cell" style="animation-delay:${1.5+i*.03}s"><img src="${url}" crossorigin="anonymous"/></div>`).join("");

    return`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;background:${C.bg};font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;top:-120px;right:-80px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,${C.glow1},transparent);pointer-events:none;animation:orbFloat 8s ease-in-out infinite}
body::after{content:'';position:absolute;bottom:-80px;left:-60px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,${C.glow2},transparent);pointer-events:none;animation:orbFloat 10s ease-in-out 2s infinite reverse}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-40px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes statPop{0%{opacity:0;transform:scale(0) rotate(-10deg)}60%{transform:scale(1.15) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes imgReveal{from{opacity:0;transform:scale(.7) rotate(-2deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-300% 0}100%{background-position:300% 0}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes borderGlow{0%,100%{border-color:${C.cardBrd}}50%{border-color:${dk?"rgba(255,255,255,.15)":"rgba(0,0,0,.12)"}}}
.accent{height:4px;border-radius:2px;background:linear-gradient(90deg,${C.R},${C.Y},transparent);transform-origin:left;animation:lineGrow .8s ease both}
.logo-wrap{animation:fadeUp .6s ease .2s both}
.period{font-size:16px;color:${C.dm};margin:20px 0 8px;animation:fadeUp .5s ease .3s both}
.title{font-size:${dayDiff===0?56:50}px;font-weight:800;color:${C.tx};letter-spacing:-1.5px;line-height:1.05;margin-bottom:32px;animation:fadeUp .6s ease .4s both}
.stats-row{display:grid;grid-template-columns:repeat(${statItems.length},1fr);gap:12px;margin-bottom:32px}
.stat-box{text-align:center;padding:16px 8px;border-radius:16px;background:${C.cardBg};border:1px solid ${C.cardBrd};animation:statPop .5s ease both;animation-fill-mode:both}
.stat-val{font-family:'SF Mono',monospace;font-size:${hasSigs?28:40}px;font-weight:700}
.stat-lbl{font-size:11px;color:${C.mu};margin-top:6px;font-weight:600}
.grid{flex:1;display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;align-content:start;margin-bottom:20px}
.img-cell{border-radius:10px;overflow:hidden;aspect-ratio:1;background:${C.bg2};border:1px solid ${C.brd};animation:imgReveal .35s ease both;animation-fill-mode:both}
.img-cell img{width:100%;height:100%;object-fit:cover;display:block}
.footer{text-align:center;padding-top:20px;border-top:1px solid ${C.brd};animation:fadeUp .5s ease 2s both}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:${C.G};animation:pulse 2s infinite;margin-right:6px;vertical-align:middle}
</style></head><body>
<div style="padding:72px 72px 50px;height:100%;display:flex;flex-direction:column">
  <div class="accent"></div>
  <div class="logo-wrap">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
      <div style="width:52px;height:52px;border-radius:14px;background:#000;border:1px solid ${dk?"rgba(255,255,255,.1)":"rgba(0,0,0,.1)"};display:flex;align-items:center;justify-content:center">
        <span style="color:#fff;font-size:18px;font-weight:700">Fx</span><span style="color:#ff453a;font-size:18px;font-weight:700">.</span>
      </div>
      <div>
        <div style="font-size:30px;font-weight:700;color:${C.tx};letter-spacing:-.5px">Fxscalproom<span style="color:${C.R}">.</span></div>
        <div style="font-size:11px;color:${C.dm};letter-spacing:1.5px;margin-top:2px">PROFESSIONAL TRADING SIGNALS</div>
      </div>
    </div>
  </div>
  <div class="period"><span class="live-dot"></span>${fromStr} — ${toStr}</div>
  <div class="title">${periodTitle}</div>
  <div class="stats-row">${statsHtml}</div>
  ${imgs.length>0?`<div class="grid">${gridImgs}</div>`:`<div style="flex:1;display:flex;align-items:center;justify-content:center"><div style="text-align:center;animation:fadeUp .6s ease .8s both"><div style="font-size:64px;margin-bottom:16px">📊</div><div style="font-size:20px;color:${C.dm}">No analyses</div></div></div>`}
  <div class="footer">
    <div style="font-size:18px;font-weight:700;color:${C.footTx}">Fxscalproom<span style="color:${C.footDot}">.</span></div>
    <div style="font-size:11px;color:${C.footSub};margin-top:4px">t.me/FxScalpRoom · fxscalproom.com</div>
  </div>
</div>
</body></html>`;
  };

  const[reportTheme,setReportTheme]=useState("dark");

  const generate=async()=>{
    setGenerating(true);
    const html=generateHtml(reportTheme);
    const blob=new Blob([html],{type:"text/html"});
    const fname=`fxscalproom_report_${fromDate}_${toDate}.html`;
    if(navigator.share&&navigator.canShare){
      try{const file=new File([blob],fname,{type:"text/html"});if(navigator.canShare({files:[file]})){navigator.share({files:[file],title:"Fxscalproom Report"}).catch(()=>{});setGenerating(false);return}}catch(e){}
    }
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;a.click();setGenerating(false);
  };

  const preview=()=>{setPreviewHtml(generateHtml(reportTheme))};

function AdminBlog({token,onR}){
  const{t,lang}=useLang();
  const[articles,setArticles]=useState([]);
  const[loading,setLoading]=useState(false);
  const[editing,setEditing]=useState(null); // null | 'new' | article object
  const[ms,setMs]=useState("");

  // Form state
  const[title,setTitle]=useState("");
  const[slug,setSlug]=useState("");
  const[subtitle,setSubtitle]=useState("");
  const[excerpt,setExcerpt]=useState("");
  const[content,setContent]=useState("");
  const[category,setCategory]=useState("general");
  const[tags,setTags]=useState("");
  const[readTime,setReadTime]=useState(5);
  const[coverImage,setCoverImage]=useState("");
  const[coverFile,setCoverFile]=useState(null);
  const[coverPreview,setCoverPreview]=useState("");
  const[metaTitle,setMetaTitle]=useState("");
  const[metaDesc,setMetaDesc]=useState("");
  const[metaKeywords,setMetaKeywords]=useState("");
  const[published,setPublished]=useState(true);

  const CATEGORIES=[
    {k:"general",l:"General"},
    {k:"fundamentals",l:"Fundamentals"},
    {k:"strategy",l:"Strategy"},
    {k:"central-banks",l:"Central Banks"},
    {k:"gold",l:"Gold"},
    {k:"forex",l:"Forex"},
    {k:"crypto",l:"Crypto"},
    {k:"analysis",l:"Analysis"},
  ];

  // Auto-generate slug from title
  const slugify=(s)=>s.toLowerCase()
    .replace(/[^\w\s-]/g,'')
    .replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-|-$/g,'')
    .slice(0,80);

  useEffect(()=>{
    if(editing==='new'&&title&&!slug){
      setSlug(slugify(title));
    }
  },[title]);

  // Load articles
  const loadArticles=async()=>{
    setLoading(true);
    try{
      const r=await fetch(`${SB}/rest/v1/Articles?order=created_at.desc&select=*`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setArticles(d);
    }catch(e){console.error(e)}
    setLoading(false);
  };

  useEffect(()=>{loadArticles()},[token]);

  const resetForm=()=>{
    setTitle("");setSlug("");setSubtitle("");setExcerpt("");setContent("");
    setCategory("general");setTags("");setReadTime(5);
    setCoverImage("");setCoverFile(null);setCoverPreview("");
    setMetaTitle("");setMetaDesc("");setMetaKeywords("");
    setPublished(true);
  };

  const startNew=()=>{
    resetForm();
    setEditing('new');
  };

  const startEdit=(a)=>{
    setTitle(a.title||"");
    setSlug(a.slug||"");
    setSubtitle(a.subtitle||"");
    setExcerpt(a.excerpt||"");
    setContent(a.content||"");
    setCategory(a.category||"general");
    setTags(a.tags||"");
    setReadTime(a.read_time||5);
    setCoverImage(a.cover_image||"");
    setCoverPreview(a.cover_image||"");
    setMetaTitle(a.meta_title||"");
    setMetaDesc(a.meta_desc||"");
    setMetaKeywords(a.meta_keywords||"");
    setPublished(a.published!==false);
    setEditing(a);
  };

  const cancelEdit=()=>{
    setEditing(null);
    resetForm();
  };

  const handleCoverFile=(e)=>{
    const f=e.target.files[0];
    if(f){
      setCoverFile(f);
      setCoverPreview(URL.createObjectURL(f));
    }
  };

  const save=async()=>{
    if(!title||!content||!slug){
      setMs("Title, slug, and content are required");
      return;
    }
    setLoading(true);
    setMs("");
    try{
      // Upload cover image if new file
      let imgUrl=coverImage;
      if(coverFile){
        const uploaded=await api.img(coverFile,token);
        if(uploaded)imgUrl=uploaded;
        else{setMs("Image upload failed");setLoading(false);return}
      }

      const data={
        slug,
        title,
        subtitle:subtitle||null,
        excerpt:excerpt||null,
        content,
        cover_image:imgUrl||null,
        category,
        tags:tags||null,
        read_time:parseInt(readTime)||5,
        meta_title:metaTitle||null,
        meta_desc:metaDesc||null,
        meta_keywords:metaKeywords||null,
        published,
      };

      if(editing==='new'){
        await api.add("Articles",data,token);
        setMs("Article published!");
      }else{
        await api.patch("Articles",editing.id,data,token);
        setMs("Article updated!");
      }

      cancelEdit();
      loadArticles();
    }catch(e){
      setMs(e.message||"Save failed");
    }
    setLoading(false);
  };

  const del=async(id)=>{
    if(!confirm("Delete this article? This cannot be undone."))return;
    try{
      await api.del("Articles",id,token);
      setMs("Article deleted");
      loadArticles();
    }catch(e){setMs(e.message)}
  };

  // ═══ EDIT FORM ═══
  if(editing){
    return(
      <div className="fi">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:700}}>
            {editing==='new'?"New Article":"Edit Article"}
          </div>
          <div onClick={cancelEdit} style={{cursor:"pointer",color:"var(--mu)",fontSize:12,fontWeight:600}}>← Cancel</div>
        </div>

        {ms&&<div style={{
          background:ms.includes("!")?"color-mix(in srgb,var(--G) 8%,transparent)":"color-mix(in srgb,var(--R) 8%,transparent)",
          border:`1px solid ${ms.includes("!")?"color-mix(in srgb,var(--G) 15%,transparent)":"color-mix(in srgb,var(--R) 15%,transparent)"}`,
          borderRadius:10,padding:10,marginBottom:10,fontSize:13,
          color:ms.includes("!")?"var(--G)":"var(--R)"
        }}>{ms}</div>}

        {/* Cover image upload */}
        <div onClick={()=>document.getElementById("articleCoverFu").click()} style={{
          border:"1.5px dashed var(--brd2)",borderRadius:14,padding:24,textAlign:"center",
          marginBottom:10,background:"var(--bg2)",cursor:"pointer",overflow:"hidden"
        }}>
          {coverPreview
            ? <img src={coverPreview} style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:10}} alt=""/>
            : <div style={{fontSize:13,color:"var(--dm)"}}>Tap to upload cover image (16:9 recommended)</div>
          }
        </div>
        <input id="articleCoverFu" type="file" accept="image/*" onChange={handleCoverFile} style={{display:"none"}}/>

        {/* Title */}
        <input className="ip" placeholder="Article title" value={title} onChange={e=>setTitle(e.target.value)}/>

        {/* Slug */}
        <input className="ip" placeholder="URL slug (auto-generated)" value={slug} onChange={e=>setSlug(slugify(e.target.value))}/>
        <div style={{fontSize:11,color:"var(--dm)",marginBottom:8,marginTop:-4}}>
          URL: /blog/article.html?slug={slug||"..."}
        </div>

        {/* Subtitle */}
        <input className="ip" placeholder="Subtitle (optional)" value={subtitle} onChange={e=>setSubtitle(e.target.value)}/>

        {/* Excerpt */}
        <textarea
          className="ip"
          placeholder="Short excerpt (shown on blog index, ~150 chars)"
          value={excerpt}
          onChange={e=>setExcerpt(e.target.value)}
          rows={2}
          style={{resize:"vertical"}}
        />

        {/* Category */}
        <div style={{fontSize:11,fontWeight:600,marginBottom:6,color:"var(--tx2)"}}>Category</div>
        <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
          {CATEGORIES.map(c=>
            <div key={c.k} onClick={()=>setCategory(c.k)} style={{
              padding:"7px 14px",borderRadius:10,cursor:"pointer",
              background:category===c.k?"color-mix(in srgb,var(--R) 10%,transparent)":"transparent",
              border:`1px solid ${category===c.k?"color-mix(in srgb,var(--R) 25%,transparent)":"var(--brd)"}`,
              fontSize:12,fontWeight:600,color:category===c.k?"var(--R)":"var(--mu)"
            }}>{c.l}</div>
          )}
        </div>

        {/* Read time */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,color:"var(--mu)"}}>Read time:</span>
          <input
            className="ip"
            type="number"
            value={readTime}
            onChange={e=>setReadTime(e.target.value)}
            style={{width:80,marginBottom:0}}
            min="1"
            max="60"
          />
          <span style={{fontSize:12,color:"var(--mu)"}}>minutes</span>
        </div>

        {/* Tags */}
        <input className="ip" placeholder="Tags (comma separated)" value={tags} onChange={e=>setTags(e.target.value)}/>

        {/* Content (HTML) */}
        <div style={{fontSize:11,fontWeight:600,marginBottom:6,color:"var(--tx2)"}}>
          Content (HTML — use &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;strong&gt;, etc.)
        </div>
        <textarea
          className="ip"
          placeholder="<p>Your article content here...</p><h2>A heading</h2><p>More text...</p>"
          value={content}
          onChange={e=>setContent(e.target.value)}
          rows={15}
          style={{resize:"vertical",fontFamily:"monospace",fontSize:12}}
        />

        {/* SEO Section */}
        <div style={{
          marginTop:16,padding:14,
          background:"color-mix(in srgb,var(--B) 5%,transparent)",
          border:"1px solid color-mix(in srgb,var(--B) 15%,transparent)",
          borderRadius:12
        }}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8,color:"var(--B)"}}>SEO (Optional but recommended)</div>
          <input
            className="ip"
            placeholder="Meta title (defaults to article title)"
            value={metaTitle}
            onChange={e=>setMetaTitle(e.target.value)}
          />
          <textarea
            className="ip"
            placeholder="Meta description (~160 chars, shown in Google results)"
            value={metaDesc}
            onChange={e=>setMetaDesc(e.target.value)}
            rows={2}
            style={{resize:"vertical"}}
          />
          <input
            className="ip"
            placeholder="Meta keywords (comma separated)"
            value={metaKeywords}
            onChange={e=>setMetaKeywords(e.target.value)}
            style={{marginBottom:0}}
          />
        </div>

        {/* Publish toggle */}
        <div onClick={()=>setPublished(!published)} className="cd" style={{
          padding:12,marginTop:12,marginBottom:8,cursor:"pointer",
          display:"flex",justifyContent:"space-between",alignItems:"center"
        }}>
          <span style={{fontSize:13}}>Published (visible on blog)</span>
          <div style={{
            width:40,height:22,borderRadius:11,
            background:published?"var(--G)":"var(--brd2)",
            position:"relative",transition:".2s"
          }}>
            <div style={{
              width:18,height:18,borderRadius:9,background:"#fff",
              position:"absolute",top:2,left:published?20:2,transition:".2s"
            }}/>
          </div>
        </div>

        {/* Save button */}
        <button
          className="bt"
          style={{background:"var(--R)",opacity:loading?.5:1,marginTop:8}}
          onClick={save}
          disabled={loading}
        >
          {loading?"Saving...":(editing==='new'?"Publish Article":"Save Changes")}
        </button>
      </div>
    );
  }

  // ═══ LIST VIEW ═══
  return(
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600}}>
          Blog Articles ({articles.length})
        </div>
        <button
          onClick={startNew}
          style={{
            padding:"8px 16px",borderRadius:10,
            background:"var(--R)",color:"#fff",
            fontSize:12,fontWeight:600,border:"none",cursor:"pointer"
          }}
        >+ New Article</button>
      </div>

      {ms&&<div style={{
        background:ms.includes("!")||ms.includes("deleted")?"color-mix(in srgb,var(--G) 8%,transparent)":"color-mix(in srgb,var(--R) 8%,transparent)",
        border:`1px solid ${ms.includes("!")||ms.includes("deleted")?"color-mix(in srgb,var(--G) 15%,transparent)":"color-mix(in srgb,var(--R) 15%,transparent)"}`,
        borderRadius:10,padding:10,marginBottom:10,fontSize:13,
        color:ms.includes("!")||ms.includes("deleted")?"var(--G)":"var(--R)"
      }}>{ms}</div>}

      {loading&&articles.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:40,fontSize:13}}>Loading...</div>}

      {!loading&&articles.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:40,fontSize:13}}>
        No articles yet. Click "New Article" to create your first one.
      </div>}

      {articles.map(a=>
        <div key={a.id} className="cd" style={{
          display:"flex",alignItems:"center",gap:10,padding:12,marginBottom:6
        }}>
          {a.cover_image
            ? <img src={a.cover_image} style={{width:52,height:36,borderRadius:6,objectFit:"cover"}} alt=""/>
            : <div style={{width:52,height:36,borderRadius:6,background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📰</div>
          }
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {a.title}
            </div>
            <div style={{fontSize:10,color:"var(--dm)",marginTop:2}}>
              {a.category} · {a.read_time} min · {a.created_at?new Date(a.created_at).toLocaleDateString():""} · {a.views||0} views
            </div>
          </div>
          {!a.published&&<span style={{fontSize:8,fontWeight:700,color:"var(--Y)",padding:"2px 5px",borderRadius:4,background:"color-mix(in srgb,var(--Y) 10%,transparent)"}}>DRAFT</span>}
          <div onClick={()=>startEdit(a)} style={{cursor:"pointer",color:"var(--B)",padding:4}}>{IC.edit}</div>
          <div onClick={()=>del(a.id)} style={{cursor:"pointer",color:"var(--R)",padding:4}}>{IC.del}</div>
        </div>
      )}
    </div>
  );
}

STEP 0.1-COMPLETE — CHAPTER 2: EXACT BAR-BY-BAR CONSTRUCTION RULES

BAR TYPE CLASSIFICATION (must be done FIRST for every bar):

  TYPE 1 — STANDARD BAR (most common):
  • High > prior High AND Low > prior Low → UPWARD monowave continues
  • High < prior High AND Low < prior Low → DOWNWARD monowave continues
  • Simply extend the current monowave by this bar's range

  TYPE 2 — OUTSIDE BAR (current bar engulfs prior bar):
  • Current High > prior High AND Current Low < prior Low
  • BOTH High and Low are exceeded simultaneously
  • RULE: An outside bar TERMINATES the prior monowave AND begins a new one
  • How to handle: 
    - If prior monowave was UP → the outside bar ENDS the up move at its High
      then STARTS a down monowave (the Low of the outside bar is new down pivot)
    - If prior monowave was DOWN → the outside bar ENDS the down move at its Low
      then STARTS an up monowave
  • CRITICAL: The outside bar contributes to BOTH the ending monowave
    AND the beginning monowave (its extreme used twice)
  • Outside bars in strong trending markets: usually just continue the trend
    In this case: add to the current motive monowave if it's larger than 3×
    average bars. Use judgment based on context.

  TYPE 3 — INSIDE BAR (prior bar engulfs current bar):
  • Current High < prior High AND Current Low > prior Low
  • Price range is completely INSIDE the prior bar
  • RULE: An inside bar is NEUTRAL — add its range to BOTH the prior
    monowave AND the following monowave
  • NEUTRALITY PROTOCOL for inside bars:
    Step 1: Do NOT create a new monowave for the inside bar itself
    Step 2: Extend the CURRENT monowave to include the inside bar's close
    Step 3: When the NEXT bar breaks out of the inside bar's range:
      → Breakout UP: the inside bar belonged to the UPWARD monowave
      → Breakout DOWN: the inside bar belonged to the DOWNWARD monowave
    Step 4: If multiple consecutive inside bars → treat as a sideways
      consolidation; the ENTIRE cluster is one neutral zone until breakout

  TYPE 4 — EQUAL HIGH / EQUAL LOW BAR:
  • Current High = prior High → direction ambiguous at that high
  • Current Low = prior Low → direction ambiguous at that low
  • RULE: Treat as continuation of the PRIOR direction
  • If repeated 3× (triple equal): signals a consolidation monowave
    → Mark as "horizontal monowave" (rare but valid NeoWave structure)

DETAILED NEUTRALITY RULES (Chapter 2 — The Rules Most Analysts Miss):

  NEUTRALITY RULE 1 — SINGLE INSIDE BAR:
  • One inside bar: add to prior monowave tentatively
  • Confirm the monowave assignment when the NEXT bar breaks out
  • If next bar is ALSO an inside bar → apply Rule 2

  NEUTRALITY RULE 2 — MULTIPLE CONSECUTIVE INSIDE BARS:
  • Two or more inside bars in sequence: CLUSTER of neutrality
  • The entire cluster = a single "neutral zone"
  • Assignment: entire neutral cluster belongs to whichever direction
    the first breakout bar goes
  • Time of neutral cluster MUST be added to the winner monowave's duration
  • Example: 5 inside bars, then a strong up bar → all 5 inside bars
    are added to the beginning of the up monowave (not the prior down wave)

  NEUTRALITY RULE 3 — OUTSIDE BAR AFTER INSIDE BAR:
  • If an outside bar FOLLOWS a neutral cluster:
    → The outside bar's direction of bigger move determines the cluster assignment
    → If outside bar has larger upward range: cluster → upward monowave
    → If outside bar has larger downward range: cluster → downward monowave

  NEUTRALITY RULE 4 — GAP BARS:
  • Price gap (open far from prior close) = implied monowave
  • Gap UP in an uptrend: the gap IS a monowave in itself (insert it)
  • Gap DOWN in a downtrend: same treatment
  • Gap against the trend: mark as anomaly; may signal wave completion
  • NEVER ignore gaps — they always contain wave structure information
  • How to insert: create a synthetic monowave from prior close to gap-open
    with zero-bar duration (mark as "implied, T=0")

  NEUTRALITY RULE 5 — THE "THRUST AND PAUSE" PATTERN:
  • A bar that advances strongly then gives back < 25% of its range
    within the same bar → this is a single monowave extension bar
  • Do NOT split such bars into two monowaves
  • The full range of such bars belongs to the motive monowave

  NEUTRALITY RULE 6 — DOJI BARS (open ≈ close):
  • A doji bar (close within 10% of open range): treat as inside bar
  • Apply Neutrality Rule 1 protocol
  • Multiple doji in sequence: same as consecutive inside bars (Rule 2)

STEP 0.1-OBSERVATION — RULE OF OBSERVATION (Complete Chapter 2 System):

  After classifying all bars, apply the Rule of Observation to determine
  the STRUCTURAL CONTEXT of each monowave before labeling:

  OBSERVATION A — PRIOR WAVE RELATIONSHIP:
  Compare m(n) to m(n-1) (immediately preceding monowave):
  → If m(n) > 161.8% of m(n-1): m(n) is LIKELY EXTENDED wave
    → In motive context: this is the extended sub-wave (W3 of a W or sub-W3)
    → In corrective context: this is an irregular/expanded pattern
  → If m(n) ≈ 61.8% of m(n-1) (within 5%): classic Fibonacci relationship
    → Confirms the two waves are at the SAME degree and pattern-related
  → If m(n) < 38.2% of m(n-1): m(n) is a sub-wave of lower degree
    → Compact m(n-1) and m(n) before labeling — they are not same degree

  OBSERVATION B — FOLLOWING WAVE RELATIONSHIP:
  Compare m(n) to m(n+1):
  → If m(n+1) > m(n): trend continuation OR new counter-trend wave starting
  → If m(n+1) < m(n) AND m(n+1) < m(n-1): likely a corrective sub-wave
    within a larger corrective structure
  → If m(n+1) ≈ m(n): Rule of Equality applies — same type and degree

  OBSERVATION C — THREE-BAR OBSERVATION (most powerful):
  Look at three consecutive monowaves: m(n-1), m(n), m(n+1):
  → Pattern 1: Short-Long-Short: 
    m(n-1) short, m(n) long, m(n+1) short
    → Typical W1, W2, W3 start OR A, B, C of zigzag
    → MOST LIKELY: beginning of motive sequence
  
  → Pattern 2: Long-Short-Long:
    m(n-1) long, m(n) short, m(n+1) long
    → Typical corrective structure (A bigger than B, C bigger than B)
    → OR: W3, W4, W5 of an impulse near completion
  
  → Pattern 3: Equal-Equal-Equal:
    Three consecutive monowaves approximately equal
    → Triangle forming OR Diametric forming
    → Apply Diametric rules: time equality is key diagnostic
  
  → Pattern 4: Decreasing sequence:
    m(n-1) > m(n) > m(n+1) (each shorter than prior)
    → Contracting Triangle legs forming OR Terminal wave compressing
    → If all 3-wave structures: Terminal; if price range contracting: Triangle
  
  → Pattern 5: Increasing sequence:
    m(n-1) < m(n) < m(n+1) (each longer than prior)
    → Expanding Terminal OR Expanding Triangle
    → Check W4/W1 overlap to confirm Terminal character

  OBSERVATION D — CONTEXT CHECK (Where in the larger structure?):
  Before assigning any label, answer:
  1. Where does this sequence sit in the LARGER picture?
     → After a completed 5-wave impulse? → Expect corrective sequence
     → After a completed A-B-C correction? → Expect new motive sequence
     → In the middle of an unclear structure? → Label provisionally
  2. Is the data sufficient? (Neely requires minimum 10-15 monowaves to
     identify a pattern with confidence)
  3. Is there a higher-degree channel that constrains this analysis?

STEP 0.2 — COMPACTION RULES
• If 3 monowaves form a pattern, compact to 1 labeled wave
• If 5 monowaves form a pattern, compact to 1 labeled wave

COMPACTION PROTOCOL (Chapter 2 — Detail):
  Step 1: Identify the SMALLEST complete pattern (3 or 5 monowaves)
  Step 2: Replace it with a single "polywave" label at next degree up
  Step 3: The polywave's High = highest point of the sub-pattern
           The polywave's Low = lowest point of the sub-pattern
           The polywave's Time = sum of all sub-wave times
  Step 4: Re-apply retracement rules at the NEW (higher) degree level
  Step 5: Continue compacting until the structure at desired degree is clear
  
  COMPACTION VALIDATION:
  ✦ After each compaction: verify the result makes sense at the higher degree
  ✦ If a "compacted wave" is > 261.8% of the adjacent wave → degree error
  ✦ Retracement of the compacted wave must match its structural position
  ✦ Time of compacted wave MUST be longer than any single component sub-wave

MISSING WAVE DETECTION PROTOCOL (Chapter 2 Advanced):
  When does a missing wave exist?
  → Two adjacent same-direction waves with NO intervening correction
  → The supposed "big monowave" is actually two waves with a hidden correction
  
  How to detect:
  Step 1: If two adjacent same-direction monowaves are both labeled :5

  Step 2: Drop to the next lower timeframe
  Step 3: Look for any counter-direction movement, no matter how small
  Step 4: If found: that is the "missing wave" — label it as :3 corrective
  Step 5: Re-run retracement analysis with the missing wave now included
  
  If missing wave NOT found even on lower timeframe:
  → Label as "implied corrective wave" (T=0, P=0 approximately)
  → Note: "MISSING WAVE HYPOTHESIS — requires confirmation on lower TF"

VOLUME LAWS FOR MOTIVE WAVES:
  ✦ W1 volume: should be average or slightly above average
  ✦ W3 volume: MUST be highest of all five motive waves

  ✦ W5 volume: typically LOWER than W3; if W5 volume > W3 → suspect x5 extension
  ✦ W4 volume: must be LOWER than W3 volume
    → If W4 volume ≥ W3 volume → corrective pattern at higher degree likely

VOLUME LAWS FOR CORRECTIVE WAVES:
  ✦ ZigZag: C-wave volume > A-wave volume (strong continuation character)
  ✦ Flat: B-wave volume should approximate A-wave volume; C-wave highest
  ✦ Running Flat: B-wave volume > A-wave volume (market absorbs selling quickly)
  ✦ Triangle: volume CONTRACTS with each successive leg (A > B > C > D > E)
    → If volume expands in a supposed triangle → re-evaluate, may be impulse
  ✦ Diametric: relatively equal volume across all 7 legs (±30%)

VOLUME CHANNEL LAWS (Supplementary Neely Rule):
  ✦ Draw a volume channel just as you draw a price channel:
    Upper line = peaks of volume bars during motive sub-waves
    Lower line = troughs of volume bars during corrective sub-waves
  ✦ If volume consistently RISES within the channel → strong trending impulse
  ✦ If volume consistently FALLS within the channel → Terminal warning
  ✦ Volume divergence (price makes new high but volume makes lower high):
    → W5 is ending OR W3 is not the extended wave
  ✦ Volume expansion on corrective waves > motive waves → trend reversal signal

STEP 0.5A — RETRACEMENT CLASSIFICATION (Chapter 3 — Heart of NeoWave)
After identifying monowaves, classify each retracement between consecutive
monowaves m(n) and m(n+1). This determines Structure Labels BEFORE you
even try to identify patterns.

  Retrace ratio = |m(n+1) price| / |m(n) price|

  ✦ CATEGORY 1 — Retrace < 38.2%:
    m(n) is very likely MOTIVE (:5 label). Strong trending character.
    If < 25%: almost certainly inside a W3 extension.
    The smaller the retrace, the stronger the motive evidence.

  ✦ CATEGORY 2 — Retrace 38.2% to 61.8%:
    AMBIGUOUS — m(n) could be motive OR corrective.
    Lean motive if closer to 38.2%. Lean corrective if closer to 61.8%.
    MUST check adjacent waves to resolve.

  ✦ CATEGORY 3 — Retrace 61.8% to 100%:
    m(n) is MOST LIKELY CORRECTIVE (:3, :c3, :F3 label).
    If exactly 61.8%: borderline (could be W1 of weak impulse).
    If 80-100%: very corrective — likely B-wave or triangle leg.

  ✦ CATEGORY 4 — Retrace > 100%:
    m(n) is DEFINITELY corrective. Cannot be motive at current degree.
    100-138%: Irregular/Expanded Flat likely (B exceeds A).
    > 138%: Running correction likely. > 261.8%: wrong degree.

    → m(n) = :5 (confirmed motive, part of an ongoing impulse)
    → m(n+1) = :3 (minor correction within the impulse)

  ► Rule (b): m(n+1) retraces < 38.2% of m(n) AND m(n+2) does NOT

    → m(n+1) may be the START of a new correction at higher degree
    → Assign m(n) = :5 tentatively, but FLAG for W5-end possibility
    → Check if m(n+2) forms a deeper retrace — if yes, confirms W5 end

  ► Rule (c): m(n+1) retraces < 38.2% of m(n) AND m(n) is SHORTER

    → m(n) = :s3 or :5 depending on internal structure

    → If m(n) shows 5 sub-waves: :5 (smaller degree impulse)

FOR CATEGORY 2 (retrace 38.2% - 61.8%):

  ► Rule (d): m(n+1) retraces 38.2-61.8% of m(n) AND m(n+2) exceeds
    the end of m(n):
    → m(n) = :5 (motive confirmed by continuation)
    → The deeper the retrace (closer to 61.8%), the weaker the trend
    → m(n) is likely W1 of an impulse (W2 retrace is normal depth)
    → If m(n-1) was also partially retraced: m(n) is mid-impulse

  ► Rule (e): m(n+1) retraces 38.2-61.8% of m(n) AND m(n+2) does NOT

    → Must examine m(n+3) and m(n+4) for further context
    → FLAG: do NOT commit to a label until more data resolves

  ► Rule (f): m(n+1) retraces 38.2-61.8% AND m(n) is approximately

    → If m(n-2) was labeled :5, then m(n) = :5
    → If m(n-2) was labeled :3, then m(n) = :3
    → This is Neely's Rule of Equality — equal waves = same function

FOR CATEGORY 4 (retrace > 100%):

    → m(n) is almost certainly Wave A of a Flat pattern
    → m(n+1) is Wave B exceeding A's origin
    → If 100-138.2%: Regular or Irregular Flat forming
    → If > 138.2%: Running Flat forming (C will fail)
    → If > 261.8%: WRONG DEGREE — m(n) is at lower degree than assumed

SPECIAL CONDITIONS:

  ► Rule (x) — Fibonacci Equality Test:
    When m(n+1) retraces EXACTLY a key Fibonacci level of m(n)
    (precisely 38.2%, 50.0%, 61.8%, or 100%):
    → This is a SIGNIFICANT structural marker
    → The exact Fibonacci level determines the pattern type:
      Exactly 38.2%: strong motive character, likely x1 impulse territory
      Exactly 50.0%: typical W2 retrace in x3 impulse
      Exactly 61.8%: boundary between ZigZag and Flat (ZZ/Flat dividing line)
      Exactly 100%: Elongated Flat (B = A exactly)
    → When the retrace hits a Fibonacci level precisely, give MORE WEIGHT
      to that level in determining the Structure Label

  ► Rule of Proportion:
    Compare m(n) to m(n-2) (the wave two positions back):
    → If m(n) ≈ m(n-2) in price (within 61.8%-161.8%): same degree, same type
    → If m(n) >> m(n-2) (more than 161.8%): m(n) is at higher degree
    → If m(n) << m(n-2) (less than 61.8%): m(n) is at lower degree
    → This rule helps resolve ambiguous Category 2 labels

  ► Rule of Equality:
    If two non-adjacent waves are approximately equal in BOTH price AND time:
    → They are the same type (both motive or both corrective)
    → They are at the same degree
    → Apply the same Structure Label to both
    → Common example: W1 ≈ W5 in price and time → both :5 at same degree

  ► "Next Most Active Segment" Test (Extension Identifier):
    After compacting monowaves, the LONGEST wave in price is the
    "most active segment." The wave that is next-longest (excluding
    corrections) is the "next most active." Compare them:
    → If most active > 161.8% of next most active: extension confirmed
    → If most active = 100-161.8% of next most active: borderline
    → If most active < 100% of next most active: no extension

STEP 0.5B — STRUCTURE LABELS (Chapter 3 — The Labeling System)
Assign a Structure Label to each monowave based on the decision tree above:

  :5   = Confirmed 5-wave motive. ONLY in W1, W3, W5, WA, WC positions.
  :3   = Confirmed 3-wave corrective. Can be in any position.
  :s3  = Special 3-wave in a motive position → PRIMARY SIGNAL of TERMINAL.
         If you see :s3 in W1, W3, W5 → the pattern is 3-3-3-3-3 Terminal.
  :c3  = Corrective 3-wave with deep (>61.8%) retracement context.
         Assigned when Rule (g) or (h) applies.
  :F3  = Flat-related 3-wave (B > 61.8% of A).
         Assigned when Rule (i) applies with 100-138.2% retrace.
  :L3  = Large 3-wave (disproportionately big vs surroundings).
         Assigned when Rule of Proportion shows m(n) >> m(n-2).
  :sL3 = Special large 3-wave. Very rare.
         Assigned when :s3 conditions + :L3 conditions both apply.

  CRITICAL STRUCTURE LABEL RULES:
  ✦ :5 in W2, W4, or WB position → YOUR COUNT IS WRONG
  ✦ :s3 in W1, W3, W5 → pattern is Terminal, not Trending
  ✦ ALL Triangle legs must be :3 or :s3. Any :5 leg → NOT a Triangle
  ✦ ALL Diametric legs must be :3
  ✦ Assign the MOST RESTRICTIVE label that fits (don't guess :5)
  ✦ If ambiguous after all rules: use :5/:3 dual label and FLAG

STEP 0.5C — POWER RATINGS (Chapter 6 — Correction Strength)
Each corrective pattern has inherent "power" that PREDICTS the strength
of the subsequent motive wave. Assess EVERY correction:

  HIGHEST POWER: Running Flat | Strong ZigZag (B < 38.2%)
    → Expect EXPLOSIVE next motive wave. W2=Running → W3 will be massive.
  HIGH POWER: Normal ZigZag | Irregular/Expanded Flat
    → Strong next motive wave.
  MODERATE POWER: Regular Flat | Simple Contracting Triangle
    → Standard-strength next wave.
  LOW POWER: Combinations (W-X-Y) | Diametric | Elongated corrections
    → Trend weakening. Next wave may be final (W5). Terminal possible.
  LOWEST POWER: Expanding Triangle | Triple Combination
    → Market exhausted. Next wave often truncated or last in sequence.

  ✦ W2 power PREDICTS W3 character (high-power W2 → explosive W3)
  ✦ W4 power PREDICTS W5 character (low-power W4 → weak/Terminal W5)
  ✦ Power should ALTERNATE between W2 and W4

STEP 0.5D — SIMILARITY, BALANCE & MISSING WAVES (Chapter 5)

  RULE OF SIMILARITY:
  ✦ Adjacent waves at same degree should have similar complexity.
  ✦ If W1 is a monowave and W3 is a complex macrowave → NOT same degree.
  ✦ Exception: the extended wave IS expected to be more complex.

  RULE OF BALANCE:
  ✦ Non-extended motive waves should be proportional (61.8%-161.8%).
  ✦ Corrective wave time = typically 1.0-2.618× the prior motive duration.
  ✦ If one wave is 5×+ longer than expected → wrong degree or missing wave.

  RULE OF EQUALITY (detailed):
  ✦ If two non-adjacent waves are ≈ equal in BOTH price AND time:
    they are the SAME type and SAME degree. Label them identically.
  ✦ Common: W1 ≈ W5 (price and time) in x3 impulse → both :5, same degree.
  ✦ Common: Legs A ≈ C ≈ E in contracting triangle → all :3, each 61.8% of prior.

  MISSING WAVES (hidden structure):
  ✦ Two adjacent waves both look motive? → small correction hidden between them.
  ✦ Correction seems disproportionately long? → may contain hidden motive wave.
  ✦ Pattern has exactly 4 legs? → missing wave or misidentified boundary.
  ✦ Price gap in trend direction? → may conceal an entire motive wave.
  ✦ Time ratios fail but structure looks right? → missing wave may explain it.
  → Drop to lower timeframe to find hidden waves. Re-run retracement analysis.

  W2 PREDICTS W4 — NEOWAVE EXCLUSIVE FORMULA [Q&A confirmed]:
  ★ Formula: W4_retrace% ≈ 100% − W2_retrace%
  ★ Derivation: The retracements of W2 and W4 are COMPLEMENTARY, summing to 100%.
  ★ Examples:
    → W2 retraces 30% of W1 → W4 should retrace ~70% of W3
      (likely to produce 5th Extension or W5 failure)
    → W2 retraces 61.8% of W1 → W4 should retrace ~38.2% of W3
      (standard Fibonacci alternation)
    → W2 retraces 90% of W1 (Terminal only) → W4 ≈ 10% of W3
      (even though tiny, W4 MUST still overlap W2 price range in Terminal)
    → W2 retraces 50% of W1 → W4 ≈ 50% of W3 (equal retracements)
  ★ This formula is NOT in orthodox Elliott Wave — NeoWave exclusive.
  ★ Application: immediately after W2 completes, CALCULATE expected W4 target.
    → Compare to Fibonacci retracement of W3 later as confirmation.

STEP 0.5E — POSITION LOGIC & DEGREE RULES (Chapter 4-5)

  HARD POSITION CONSTRAINTS:
  ✦ :5 wave ONLY in motive positions: W1, W3, W5, WA, WC
  ✦ Triangle ONLY in: W4, WB, WX. NEVER in W1, W3, W5, WA, WC
  ✦ Terminal ONLY at end-of-sequence: W5, WC. NEVER in W1 or W3
  ✦ Adjacent motive waves (W1-W3, W3-W5) must move in SAME direction
  ✦ If a :5 wave is >100% retraced → it's at LOWER degree than assumed

  TIME HIERARCHY (absolute):
  ✦ Higher-degree waves take MORE TIME than lower-degree. Always.
  ✦ T(W2) > T(W1). T(W4) > T(W3). Always.
  ✦ T(W4) < T(W1+W2+W3). Always.
  ✦ X-wave complexity ≤ most complex leg of prior pattern

  DEGREE NESTING RULES:
  ✦ A completed pattern at one degree must FIT as a single wave at the
    next higher degree. If it doesn't fit → wrong degree assignment.
  ✦ When a lower-degree pattern completes, check: does it function as
    W1, W2, W3, W4, or W5 of the higher-degree pattern? It MUST fill
    one of these roles. If it fills none → degree is wrong.
  ✦ The internal complexity of a wave DETERMINES its degree:
    Monowave = lowest degree. Polywave = one degree higher.
    Macrowave = two degrees higher. And so on.
  ✦ DEGREE VIOLATION: if a supposed W2 at Intermediate degree takes
    MORE time than W1 at Primary degree → the degree labels are wrong.

  CONFIRMATION vs DENIAL LOGIC:
  ✦ HARD INVALIDATION: price crosses a level that breaks a non-negotiable
    rule (e.g., W4 enters W1 territory in Trending → count is dead).
  ✦ SOFT INVALIDATION: a guideline is violated but no rule breaks
    (e.g., time ratio is unusual but not impossible → count weakened).
  ✦ After post-test FAILS: the pattern may still be valid IF it is part
    of a larger combination (post-test failure = x-wave warning, CX-01).
  ✦ When transitioning between scenarios: specify WHICH rule forced the
    change and at WHAT price level it triggered.

STEP 0.5F — WAVE PSYCHOLOGY (Chapter 5-6 — Pattern Psychology)
Understanding WHY each wave behaves as it does improves identification.
Apply this psychological framework when confirming or doubting a count:

  W1 PSYCHOLOGY — DISBELIEF:
  ✦ Market participants still believe the old trend is intact
  ✦ Volume is low; conviction is weak; move is often small
  ✦ Most traders see W1 as "just a bounce" or "dead cat bounce"
  ✦ Signal: If sentiment is overwhelmingly against the new direction,
    W1 is likely correctly identified

  W2 PSYCHOLOGY — FEAR / HOPE OF OLD TREND:
  ✦ Participants think the old trend is resuming → panic selling/buying
  ✦ W2 can be sharp and scary — "it was just a bounce after all"
  ✦ Volume increases during W2 as old-trend traders re-enter
  ✦ Signal: extreme bearish sentiment at W2 bottom (in uptrend) confirms W2

  W3 PSYCHOLOGY — RECOGNITION / MOMENTUM:
  ✦ Market realizes new trend is real → aggressive entry by institutions
  ✦ Highest volume and momentum of entire impulse
  ✦ Price breaks through major resistance/support levels
  ✦ News becomes supportive of the new trend direction
  ✦ Signal: breakout of W1's extreme with increasing volume = W3 confirmed

  W4 PSYCHOLOGY — DOUBT / PROFIT-TAKING:
  ✦ After strong W3, traders begin to doubt: "has the move gone too far?"
  ✦ Profit-taking creates complex, frustrating sideways action
  ✦ Volume decreases; multiple false breakouts in both directions
  ✦ Signal: if traders are frustrated and bored → W4 is doing its job

  W5 PSYCHOLOGY — EUPHORIA (bull) / CAPITULATION (bear):
  ✦ Late-entry traders jump in based on extrapolation of W3
  ✦ Divergence between price and momentum (RSI, MACD make lower highs)
  ✦ Media coverage peaks; "everyone knows" the trend
  ✦ Volume may be lower than W3 despite new price extremes
  ✦ Signal: if retail is aggressively entering while smart money exits → W5

  TERMINAL PSYCHOLOGY — FALSE CONFIDENCE:
  ✦ Looks like an impulse from a distance but "feels wrong" — sluggish
  ✦ Each sub-wave is only 3-wave → lack of impulsive conviction
  ✦ Market is "going through the motions" without genuine momentum
  ✦ The more convincing it looks (tight convergence), the harder the reversal

  CORRECTION PSYCHOLOGY:
  ✦ ZigZag: sharp, painful — feels like the trend reversed entirely
  ✦ Flat: frustrating — price seems stuck but doesn't break decisively
  ✦ Triangle: boring — volume dries up, traders give up and leave
  ✦ Running Flat: bullish trap — B-wave creates false hope of new highs
    before C-wave drops, but C fails because momentum is too strong

STEP 0.5G — EXCEPTIONS OF EXCEPTIONS (Chapter 5-6 Special Cases)
These are rare conditions where standard rules have documented exceptions.
Apply with EXTREME CAUTION — only when evidence is overwhelming.

  ✦ EXCEPTION 1 — Leveraged/Derivative Markets W4 Overlap:
    In highly leveraged markets (futures, options, crypto), W4 may
    BRIEFLY pierce W1's extreme by a few ticks during volatile sessions.
    This does NOT automatically invalidate the Trending count IF:
    - The penetration is < 5% of W1's price range
    - It occurs on a spike (intrabar) that immediately reverses
    - The close remains outside W1's territory
    - All other Trending rules pass cleanly
    Still FLAG this as a weakness in the count.

  ✦ EXCEPTION 2 — W3 "Appears" Shortest but Isn't:
    W3 may appear shortest when measured on current degree, but is actually
    part of a larger structure where the degree is wrong. If:
    - W3 looks shortest → FIRST check: is this the right degree?
    - Often the "short W3" is actually W1 of a larger pattern
    - Re-examine whether what you labeled W1-W2 is actually a single
      corrective wave at higher degree
    → NEVER accept W3 as shortest. Always find the degree error first.

  ✦ EXCEPTION 3 — Time Rule "Failures" in Commodities:
    Commodity markets (gold, oil, grains) sometimes show time ratios
    that violate standard rules due to seasonal patterns and supply shocks.
    If T(W2) < T(W1) in a commodity but all other rules pass:
    - Check if W2 is a "fast" correction (violent gap correction)
    - If W2 had very high momentum despite short time → may still be valid
    - Give time rules 70% weight instead of 100% in commodities
    → Still FLAG the time violation.

  ✦ EXCEPTION 4 — 24-Hour Market Adjustments:
    Forex and crypto trade 24 hours. Neely's rules were designed for
    exchange-traded instruments with Regular Trading Hours (RTH).
    Adjustments for 24-hour markets:
    - Use RTH data when possible (e.g., cash session for forex)
    - If using 24h data: allow slightly wider tolerance on time ratios
    - Overnight/weekend gaps may create false "missing waves"
    - Asian session low-volume movements may appear as monowaves but
      are actually noise → apply MW-5 (noise filter) more aggressively

  ✦ EXCEPTION 5 — C-Wave Exceeds Expected Zone:
    When C-wave of a Flat exceeds the expected target zone significantly:
    - If C > 161.8% of A: the Flat may be mutating into a ZigZag at
      higher degree (re-examine: is "B" actually an x-wave?)
    - If C = 100% of A exactly: "Elongated Flat" — valid but rare
    - If C < 61.8% of A and reverses: Running Flat confirmed

STEP 0.5H — DATA PREPARATION RULES (Chapter 1-2)

  ✦ MINIMUM DATA REQUIREMENT:
    At least 50-100 bars are needed for reliable monowave identification.
    At least 200-300 bars for pattern identification at one degree.
    At least 500+ bars for multi-degree analysis.

  ✦ PREFERRED DATA TYPES (in order):
    1. Cash/Spot market data (best for NeoWave)
    2. Continuous futures (acceptable with gap adjustments)
    3. Index data (acceptable)
    4. CFD data (acceptable but check for artificial spikes)

  ✦ DATA CLEANING:
    - Remove obvious bad ticks (spikes that exceed 5σ of normal range)
    - Adjust for stock splits and dividends
    - Note holidays and trading halts — gaps around these may be artificial
    - For weekly/monthly data: use close prices, not arbitrary highs/lows

  ✦ TIMEFRAME SELECTION:
    Choose a timeframe where waves are CLEARLY visible.
    If waves are too small to distinguish → go to higher timeframe.
    If waves are too large and take up entire screen → go to lower timeframe.
    Ideal: each monowave spans at least 5-10 bars.

STEP 0.5I — WAVE SPEED AND MOMENTUM (Chapter 5)

  WAVE SPEED = Price distance / Time duration (points per bar)
  ✦ Calculate wave speed for each motive wave (W1, W3, W5)
  ✦ In Trending x3: W3 speed > W1 speed AND W3 speed > W5 speed
  ✦ In Trending x1: W1 speed > W3 speed
  ✦ In Terminal: all waves have SIMILAR speed (no acceleration)
  ✦ If W5 speed > W3 speed significantly → x5 extension likely
  ✦ Declining wave speed across W1→W3→W5 → trend exhaustion (Terminal?)
  ✦ Wave speed can help resolve ambiguous counts:
    Higher speed = more motive character. Lower speed = more corrective.

  MOMENTUM CONFIRMATION (supplementary — not core Neely but useful):
  ✦ RSI divergence at W5 peak (price new high, RSI lower high) → W5 ending
  ✦ Volume increasing into W3, decreasing into W5 → confirms extension type
  ✦ MACD crossing during W4 → W4 correction in progress
  ✦ These are SUPPLEMENTARY indicators — never override NeoWave rules
    with indicator readings. They CONFIRM or ADD uncertainty, nothing more.

  ✦ W3 < 2.618× W1 in price
  ✦ W5 is the longest wave

  ✦ All wave relationships are smaller than Trending equivalents
  ✦ Terminal appears ONLY at END of larger patterns (not in middles)

  • Strong ZZ: B < 38.2%; C is very powerful
  • Elongated ZZ: C = 161.8% or more of A (C extension)

▶ FLAT VARIANTS:
  • Regular Flat: B ends between 61.8%-100% of A's start
    → C ends near A's end (typical flat)
  • Irregular / Expanded Flat: B exceeds A's origin (B > 100% of A)
    → C often = 138.2% or 161.8% of A
    → Most common flat variant in strong markets
  • Running Flat: B far exceeds A; C FAILS to reach A's end
    → Extremely bullish/bearish signal (market too strong to complete C)
    → C typically retraces only 61.8%-80% of B
    → Follows or precedes very powerful motive waves
  • Elongated Flat: B = 100% of A exactly; C = 100% of B

═══════════════════════════════════════════════
[E] TRIANGLE  ◆  Structure: 3-3-3-3-3 (5 legs: A-B-C-D-E)
═══════════════════════════════════════════════

▶ RULES:
  ✦ Leg B must NOT exceed 2.618× Leg A (hard limit)
  ✦ Time of Leg A < Time of Leg C
    (Exception: if A is the most complex/violent leg)
  ✦ If B > 61.8% of A → B must ALSO take more TIME than A
  ✦ At LEAST 3 legs must retrace > 38.2% of preceding leg
  ✦ Channel contact points = exactly 4
  ✦ Leg C is NEVER the smallest among A, C, and E
  ✦ Wave A and Wave B are NEVER exactly equal in price
  ✦ Alternation between B and D legs (different type/depth)
  ✦ Alternation between C and E legs (different type/depth)
  ✦ All legs are 3-wave structures
  ✦ Triangles appear ONLY in: W4 position, WB position, or 
    just before final wave of parent pattern

▶ TRIANGLE FINAL LEG LIMITS [Q&A confirmed — CRITICAL]:
  ★ TIME limit for Wave E:
    T(E) must NEVER exceed T(B) + T(C) + T(D) combined
    → If E is taking longer than B+C+D combined → re-evaluate count
  ★ PRICE limit for Wave E:
    E must NOT exceed 161.8% of the total distance from
    the START of Wave A to the END of Wave C
    → Formula: max_E_price = 1.618 × |A_start − C_end|
    → If E exceeds this → NOT a standard triangle; likely new impulse

▶ SUPPLEMENTAL PRICE AND TIME [Q&A confirmed — TRAP RULE]:
  ★ Triangles and Terminals are the ONLY patterns that allow the final
    leg to push BEYOND standard Fibonacci price AND time targets.
  ★ This "Supplemental" behavior is by design — it causes analysts to
    GIVE UP on their correct forecast right as it is about to be proven.
  ★ How it manifests:
    → PRICE supplement: final leg (E in triangle, W5 in terminal) moves
      SLIGHTLY beyond the maximum expected Fibonacci price target
    → TIME supplement: final leg PUSHES past the ideal time target
      imposed by prior 3 waves (or T(C)+T(D) / 2 type calculations)
  ★ Recognition tip: if your count is all rules-compliant BUT the final
    leg exceeds targets by a small amount → this is Supplemental behavior
    → DO NOT switch your count; the pattern is completing
  ★ Impact: creates false breakouts, causes premature position exit

▶ TRIANGLE REVERSE ALTERNATION [Q&A confirmed — RARE but IMPORTANT]:
  ★ Normal alternation: B is large, D is small (or B shallow, D deep)
  ★ Reverse alternation: B is ABNORMALLY SMALL (≈ 38.2% of A)
    → To maintain proper alternation: D must be LARGER than C
    → This creates a contracting triangle where channel lines are PARALLEL
      instead of converging (the expected visual shape is gone)
    → The triangle is still valid — all rules met — but CHANNELING is deceptive
  ★ For Expanding Triangle with reverse alternation:
    → B ≈ 138%+ of A (abnormally large)
    → D can then be MUCH SMALLER than C
    → Creates expanding triangle with parallel or converging channel
  ★ PRACTICAL IMPACT: If you see parallel channeling in a supposed
    contracting triangle → check for reverse alternation (B ≈ 38.2% of A)
    If confirmed → triangle is still valid; thrust direction unchanged

▶ TRIANGLE TYPES:
  • Contracting Symmetrical: both lines converge; B-D and A-C-E lines
    → Most common; 5th wave (E) often falls short of A-C-E line
    → Thrust after E = minimum 75% of widest part
  • Ascending: upper line horizontal; lower line rises
    → Bullish bias; usually in W4 of uptrend
  • Descending: lower line horizontal; upper line falls
    → Bearish bias; usually in W4 of downtrend
  • Expanding (Reverse Symmetrical): both lines diverge
    → Rarest; in W4 or terminal position only
    → Thrust after E = only ~50% of E's length

  POST-TEST 1 (Contracting): Break of B-D trendline after E completes
    → E must retrace in time LESS THAN its own duration
  POST-TEST 2:
    → Contracting: Post-thrust retraces ≥ 75% of longest leg
    → Expanding: Post-thrust barely retraces 50% of Wave E

▶ NON-LIMITING vs LIMITING TRIANGLES:
  • Non-Limiting Triangle: appears in W4 of impulse (before W5)
    → Followed by thrust equal to widest part
    → More common, less explosive
  • Limiting Triangle: appears as WAVE B of zigzag, or just 
    before final pattern termination
    → Very explosive post-triangle thrust

[F] DIAMETRIC  ◆  Structure: 3-3-3-3-3-3-3 (7 legs: A-B-C-D-E-F-G)
═══════════════════════════════════════════════

▶ RULES:
  ✦ TIME EQUALITY between all legs (maximum 2 legs may differ)
  ✦ Wave A cannot be SIMULTANEOUSLY larger than both B AND C
  ✦ Leg G must NOT exceed 1.618× Leg E in price
  ✦ If B and D overlap → D and F MUST also overlap (and vice versa)
  ✦ After Diametric with imperfect G → NO x-wave follows
  ✦ All 7 legs are 3-wave structures
  ✦ Resembles a "bow-tie" or "figure-8" shape
  ✦ B, D, F all point in same direction (alternating with A, C, E, G)

▶ DIAMETRIC FINAL LEG LIMITS [Q&A confirmed]:
  ★ TIME limit for Wave G:
    T(G) must NEVER exceed T(D) + T(E) + T(F) combined
    → If G takes more time than D+E+F → count is wrong or G has not ended
  ★ PRICE limit for Wave G:
    G must NOT exceed 1.618× E (already stated above — HARD limit)

  POST-PATTERN: Strong thrust in SAME direction as B, D, F
    → Stronger than ALL THREE of B, D, F combined

▶ DIAMETRIC VARIANTS:
  • Contracting Diametric: first 4 legs contract, last 3 expand
    → D is smaller than B; F is larger than D
  • Expanding Diametric: first 4 legs expand, last 3 contract
  • Neutral Diametric: relatively equal leg sizes throughout

[G] SYMMETRICAL  ◆  Structure: 9 legs (EXTREMELY RARE)
═══════════════════════════════════════════════

▶ RULES:
  ✦ Same rules as Diametric but 9 legs (A through I)
  ✦ Perfect symmetry in time between ALL 9 legs
  ✦ Only confirm after 7 legs fail to complete a Diametric
  ✦ Takes very long to form; only appears on large timeframes
  ✦ Price symmetry: G ≈ A, H ≈ B, I ≈ C in terms of ratios

▶ SYMMETRICAL FINAL LEG LIMITS [Q&A confirmed]:
  ★ TIME limit for Wave I:
    T(I) should NOT exceed T(F) + T(G) + T(H) combined
  ★ PRICE limit for Wave I:
    I must NOT exceed 1.618× G in price

[H] COMPLEX CORRECTIONS  ◆  Structure: 3-3-3 or 3-3-3-3-3
  (Two or three corrective patterns joined by x-waves)
═══════════════════════════════════════════════════════

▶ X-WAVE RULES:
  ✦ If post-test of corrective pattern is NOT given → strong signal 
    of SMALL x-wave forming
  ✦ Specifically: if price retraces < 61.8% of prior full pattern 
    → WARNING: small x-wave is forming, not the post-test
  ✦ Time of small x-wave: between 1/3 and 2/3 of prior structure's time
  ✦ Complexity of small x-wave ≤ complexity of most complex leg 
    in the prior pattern
  ✦ If ZigZag had CLEAN channeling → 99% probability small x-wave forming
  ✦ Small x-waves are usually: simple zigzag or flat

▶ X-WAVE HARD LIMITS [Q&A confirmed — CRITICAL]:
  ★ PRICE: x-wave retraces 61.8% or LESS of the prior correction (standard)
  ★ TIME: x-wave CANNOT consume MORE time than the correction before it
           (or the correction after it)
           → Normal range: 1/3 to 2/3 of adjacent correction's time
  ★ COMPLEXITY: x-wave CANNOT be MORE complex than the correction before it
           or the correction after it
           → Normal complexity: ≈ 1/3 to 2/3 of adjacent correction's complexity
  ★ EXPANDING X-WAVE (Large X): can reach 161.8%–261.8% of prior correction
           → Must still obey time and complexity limits above

▶ X-WAVE IN RUNNING CORRECTIONS [Q&A confirmed — EXCEPTION]:
  ★ In a RUNNING correction (where price barely retraces prior wave),
    the x-wave CAN be LARGER IN PRICE than the Flat or Triangle before it
  ★ However it MUST still:
    → NOT take more TIME than the prior correction
    → be LESS COMPLEX than the prior correction
  ★ This running-correction x-wave rule does NOT apply to ZigZag-led combinations

▶ LARGE X-WAVE RULES:
  ✦ Large X-wave exists if 2nd corrective pattern travels to 
    161.8% of first corrective pattern's price length
  ✦ Large X must be < 261.8% of first correction
  ✦ Large X is typically a zigzag itself

▶ DOUBLE COMBINATION (W-X-Y):
  ✦ First correction (W) + small x-wave + second correction (Y)
  POST-TEST: Second pattern (Y) gives its OWN post-test → combination complete

▶ TRIPLE COMBINATION (W-X-Y-X-Z):
  ✦ After Z completes → combination is DEFINITELY complete
  ✦ Third correction (Z) is usually a triangle
  POST-TEST: After Z's post-test, combination is 100% confirmed

▶ COMPLEXITY RULE FOR COMBINATIONS:
  ✦ Second pattern typically MORE complex than first
  ✦ If second pattern is less complex → likely a different structure
  ✦ Pattern types mix: ZZ+Flat, Flat+Triangle, ZZ+ZZ (rare)

[I] ADDITIONAL PATTERN VARIANTS (Often Missed)
═══════════════════════════════════════════════════════════

▶ DOUBLE ZIGZAG (5-3-5-x-5-3-5):
  ✦ Two zigzags connected by a small x-wave
  ✦ Much deeper correction than single zigzag
  ✦ Each zigzag follows standard ZZ rules independently
  ✦ The x-wave between them follows CX-01 through CX-05
  ✦ Common in W2 of strong impulses where deep correction needed

▶ TRIPLE ZIGZAG (extremely rare):
  ✦ Three zigzags connected by two x-waves
  ✦ Only appears in very powerful corrective moves
  ✦ Each zigzag + each x-wave must pass its own rules

▶ RUNNING TRIANGLE:
  ✦ A triangle where most legs trend in the same direction as the main trend
  ✦ Wave E terminates beyond Wave A's end (in the direction of the trend)
  ✦ Strong continuation signal after breakout
  ✦ Appears in W4 when W5 is expected to be powerful

▶ IRREGULAR TRIANGLE:
  ✦ Wave B exceeds Wave A's starting point
  ✦ Still contracts — C, D, E continue to contract
  ✦ B-D line and A-C-E line still converge, but B creates an overshoot
  ✦ More common than pure contracting in volatile markets

▶ C-WAVE FAILURE (Truncated C):
  ✦ In a ZigZag: C fails to reach A's end → NOT a valid ZigZag
    Instead: consider Running Flat or wrong pattern identification
  ✦ In a Flat: C fails to reach A's end → Running Flat confirmed
    (only if B > 100% of A, see Running Flat rules)
  ✦ In a Triangle: E fails to reach the A-C-E trendline
    → Normal behavior for contracting triangles (E truncation is expected)
  ✦ W5 Failure/Truncation: W5 fails to exceed W3's extreme
    → Valid only in very specific conditions (usually after extreme W3)
    → Must still travel at least 38.2% of W4's range

▶ FLAT TRANSITIONING RULES:
  ✦ A Flat starts as Regular (B within 61.8-100% of A)
  ✦ If B extends past A's origin (> 100%): becomes Irregular/Expanded
  ✦ If B extends far past (> ~138%): becomes Running Flat candidate
  ✦ The type is NOT determined until B completes — don't label early
  ✦ C-wave behavior CONFIRMS the flat type:
    C reaches A's end → Regular or Irregular confirmed
    C fails to reach A's end → Running Flat confirmed

▶ DOUBLE FLAT:
  ✦ Two flat patterns connected by an x-wave
  ✦ Very time-consuming correction
  ✦ Usually appears in W4 of large impulses
  ✦ Each flat must independently satisfy all Flat rules

▶ PATTERN INTEGRATION RULES (Chapter 9-11):
  ✦ A completed pattern at one degree MUST function as a single wave
    at the next higher degree. Test this after every pattern completion.
  ✦ If a completed pattern doesn't fit any higher-degree position →
    the degree assignment is wrong, or the pattern is not complete.
  ✦ When nesting: the internal complexity of a wave determines its degree.
    A monowave = lowest degree. Polywave = one up. Macrowave = two up.
  ✦ The extended wave's internal complexity should be 1-2 levels HIGHER
    than the non-extended motive waves.

▌ PHASE 3 — CHANNELING MASTERY (Neely's Channel System)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

IMPULSE CHANNEL CONSTRUCTION:
  Step 1: Connect W0 (start) and W2 (end) → draw parallel through W1 peak
           This is the BASE CHANNEL
  Step 2: When W3 completes: connect W2 end and W4 end 
           → draw parallel through W3 peak = ACTION CHANNEL
  Step 3: W5 should terminate NEAR or AT the upper action channel line
  Step 4: If W5 exceeds the upper channel → x5 extension probable
  Step 5: If W5 falls well short → terminal or weak pattern

ADVANCED CHANNEL RULES:
  ✦ FALSE CHANNEL BREAK: If W5 briefly pierces the action channel but
    immediately reverses within 1-3 bars → this is a false break ("throw-over").
    It CONFIRMS the pattern (W5 is complete) rather than denying it.
  ✦ CHANNEL BREAK CONFIRMATION: A TRUE channel break (trendline 2-4 broken
    after W5) must occur in TIME < W5's duration to confirm the impulse.
    If it takes longer → the pattern may not be a standard impulse.
  ✦ ACCELERATION CHANNEL: If W3 is the extended wave, the base channel
    (0-2 line) becomes almost flat relative to the steep W3 movement.
    Build a secondary "acceleration channel" using W2-W4 line + parallel
    through W3 peak. This is more useful for W5 targets in x3 patterns.
  ✦ EARLY TERMINATION SIGNAL: If W5 reaches only 38.2%-50% of the
    channel width and starts reversing → Terminal W5 is likely forming.
    Look for 3-wave internal structure in W5 (Terminal signal).
  ✦ CHANNEL OVERSHOOT: If W3 significantly overshoots the base channel
    (by > 138.2% of channel width) → x3 extension is almost certain.
    Recalculate the action channel after W4 for W5 targets.

CORRECTIVE CHANNELS:
  ZigZag: Very tight, clean parallel channel
    → A and C terminate on one line (lower/upper)  
    → B terminates on opposite line
    → If channel is "perfect" → complex correction (x-wave) likely follows
  
  Flat: Wider, more horizontal channel
    → A, B, C all roughly stay within horizontal range
    → Expanded flat breaks above/below temporarily

  Triangle: Converging or diverging trendlines
    → Connect W0-B-D on one trendline
    → Connect A-C-E on other trendline
    → E typically falls short of A-C-E line in contracting

ACTION/REACTION PRINCIPLE (Critical for targets):
  • After impulse channel is drawn: project target = channel width × 1.618
    above/below the breakout point
  • For corrections: the depth of correction = proportion of prior impulse
  • After triangle: thrust = at minimum the widest part of the triangle

Wave Speed = Price Distance ÷ Time Duration (points per bar or per day)
Compare speeds ALWAYS for motive waves. Speed differential reveals extension.

WAVE SPEED RULES (Neely):
  ✦ In a standard x3 impulse: Speed(W3) > Speed(W1) > Speed(W5)
  ✦ In an x1 impulse: Speed(W1) > Speed(W3) > Speed(W5)
  ✦ In an x5 impulse: Speed(W5) > Speed(W3) > Speed(W1)
  ✦ Speed(W4) ALWAYS < Speed(W3) — if not → re-evaluate degree
  ✦ Speed(W2) < Speed(W1) — if W2 is faster than W1 → not a valid W2

SPEED TABLE BY VARIANT:

  │ Variant      │ Extended Wave  │ Speed Hierarchy                      │

  Then state: "Speed hierarchy = W3 >> W1 > W5 → CONFIRMS x3 extension"

SPEED ANOMALY FLAGS:
