    <div onClick={()=>setShowChat(true)} className="cd" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:14,marginBottom:6,cursor:"pointer",background:"color-mix(in srgb,var(--B) 4%,transparent)",borderColor:"color-mix(in srgb,var(--B) 15%,transparent)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:"var(--B)"}}>{IC.chat}</span>
        <div>
          <span style={{fontSize:13,fontWeight:600,color:"var(--B)"}}>{t.support||"Support"}</span>
          <div style={{fontSize:10,color:"var(--dm)",marginTop:1}}>{t.supportDesc||"Chat with our support team"}</div>
        </div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dm)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <a href="https://t.me/FxScalpRoom" target="_blank" rel="noopener" className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginBottom:6,cursor:"pointer"}}><span style={{color:"#0088cc"}}>{IC.tg}</span><span style={{flex:1,fontSize:13,fontWeight:500}}>Telegram</span></a>
    <a href="https://www.instagram.com/forexscalproom" target="_blank" rel="noopener" className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginBottom:6,cursor:"pointer"}}><span style={{color:"#E1306C"}}>{IC.ig}</span><span style={{flex:1,fontSize:13,fontWeight:500}}>Instagram</span></a>
    <div onClick={onOut} className="cd" style={{display:"flex",alignItems:"center",gap:12,padding:14,marginTop:12,cursor:"pointer",background:"color-mix(in srgb,var(--R) 5%,transparent)",borderColor:"color-mix(in srgb,var(--R) 12%,transparent)"}}><span style={{fontSize:13,color:"var(--R)",fontWeight:600}}>{t.signOut}</span></div>
    {showChat&&<SupportChat userId={user?.id} token={token} onClose={()=>setShowChat(false)}/>}
  </div>);
}

/* ─── Main App ─── */
function App(){
  const[tk,setTk]=useState(()=>{try{return localStorage.getItem("fx_tk")||null}catch(e){return null}});
  const[usr,setUsr]=useState(()=>{try{const u=localStorage.getItem("fx_usr");return u?JSON.parse(u):null}catch(e){return null}});
  const[up,setUp]=useState(null),[adm,setAdm]=useState(false);
  const[tab,setTab]=useState(0),[posts,setP]=useState([]),[sigs,setS]=useState([]),[msgs,setMsgs]=useState([]),[stories,setStories]=useState([]);
  const[openSupport,setOpenSupport]=useState(false);
  const[lang,setLangState]=useState(()=>{try{return localStorage.getItem("fxlang")||"en"}catch(e){return"en"}});
  const[showSplash,setShowSplash]=useState(()=>{try{return!sessionStorage.getItem("fx_splash")}catch(e){return true}});
  const[showOnb,setShowOnb]=useState(()=>{try{return!localStorage.getItem("fx_onb")}catch(e){return true}});
  const[lastPostCount,setLastPostCount]=useState(()=>{try{return parseInt(localStorage.getItem("fx_pc")||"0")}catch(e){return 0}});
  const[lastSigCount,setLastSigCount]=useState(()=>{try{return parseInt(localStorage.getItem("fx_sc")||"0")}catch(e){return 0}});
  const{P,ok,lastUpdate}=usePrices();const{dark,toggle}=useTheme();const online=useOnlineStatus();
  const t=T[lang]||T.en;
  const handleAuth=(token,user,refreshToken)=>{setTk(token);setUsr(user);try{localStorage.setItem("fx_tk",token);localStorage.setItem("fx_usr",JSON.stringify(user));if(refreshToken)localStorage.setItem("fx_rt",refreshToken)}catch(e){}};
  const handleLogout=()=>{setTk(null);setUsr(null);setAdm(false);setUp(null);setTab(0);try{localStorage.removeItem("fx_tk");localStorage.removeItem("fx_usr");localStorage.removeItem("fx_rt")}catch(e){}};
  // Auto-refresh token on load and every 30 minutes — NEVER auto-logout
  const refreshSession=useCallback(async()=>{
    try{
      const rt=localStorage.getItem("fx_rt");
      if(!rt)return;
      const r=await fetch(`${SB}/auth/v1/token?grant_type=refresh_token`,{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:rt})});
      const d=await r.json();
      if(d.access_token){
        setTk(d.access_token);
        try{localStorage.setItem("fx_tk",d.access_token);if(d.refresh_token)localStorage.setItem("fx_rt",d.refresh_token)}catch(e){}
      }
      // If refresh fails, keep existing token — don't logout
    }catch(e){}
  },[]);
  useEffect(()=>{refreshSession();const i=setInterval(refreshSession,30*60*1000);return()=>clearInterval(i)},[refreshSession]);
  const setLang=(l)=>{setLangState(l);try{localStorage.setItem("fxlang",l)}catch(e){};document.documentElement.setAttribute("lang",l)};
  useEffect(()=>{document.documentElement.setAttribute("lang",lang)},[]);
  useEffect(()=>{if(!showSplash)document.body.classList.add("app-ready")},[]);
  const load=useCallback(async()=>{try{const p=await api.get("Posts",tk);if(Array.isArray(p)){setP(p);try{localStorage.setItem("fx_pc",String(p.length))}catch(e){}}const s=await api.get("Signals",tk);if(Array.isArray(s)){setS(s);try{localStorage.setItem("fx_sc",String(s.length))}catch(e){}}const m=await api.get("Messages",tk);if(Array.isArray(m))setMsgs(m);try{const st=await fetch(`${SB}/rest/v1/Stories?order=created_at.desc`,{headers:H(tk)});const stD=await st.json();if(Array.isArray(stD)){const now=new Date();setStories(stD.filter(x=>new Date(x.expires_at)>now))}}catch(e){}}catch(e){}},[tk]);
  const chk=useCallback(async(u,t)=>{try{const r=await fetch(`${SB}/rest/v1/Users?id=eq.${u.id}`,{headers:H(t)});const d=await r.json();if(Array.isArray(d)&&d[0]){setUp(d[0]);if(d[0].role==="admin")setAdm(true)}}catch(e){}},[]);
  useEffect(()=>{if(tk)load()},[tk,load]);
  useEffect(()=>{if(tk&&usr)chk(usr,tk)},[tk,usr,chk]);
  useEffect(()=>{if(tk){const i=setInterval(load,30000);return()=>clearInterval(i)}},[tk,load]);
  const{PTR}=usePullToRefresh(load);
  useActivityTracker(usr?.id,tk);
  // Tab bar scroll: dock to bottom when scrolling down, float when scrolling up
  useEffect(()=>{
    let lastY=0;
    const onScroll=()=>{
      const tb=document.getElementById('fxtb');
      if(!tb)return;
      const y=window.scrollY;
      if(y>80&&y>lastY){tb.classList.add('tb-shrink')}
      else if(y<lastY||y<40){tb.classList.remove('tb-shrink')}
      lastY=y;
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  // Notification badges
  const newPosts=posts.length>lastPostCount?posts.length-lastPostCount:0;
  const newSigs=sigs.length>lastSigCount?sigs.length-lastSigCount:0;
  const clearBadge=(key)=>{
    if(key==="analysis"&&newPosts>0){setLastPostCount(posts.length);try{localStorage.setItem("fx_pc",String(posts.length))}catch(e){}}
    if(key==="signals"&&newSigs>0){setLastSigCount(sigs.length);try{localStorage.setItem("fx_sc",String(sigs.length))}catch(e){}}
  };
  const splashDone=()=>{setShowSplash(false);try{sessionStorage.setItem("fx_splash","1")}catch(e){};document.body.classList.add("app-ready")};
  const onbDone=()=>{setShowOnb(false);try{localStorage.setItem("fx_onb","1")}catch(e){}};
  if(showSplash)return<SplashScreen onDone={splashDone}/>;
  if(!tk){
    return<>{showOnb&&<Onboarding onDone={onbDone} lang={lang}/>}<Auth onAuth={handleAuth} lang={lang} setLang={setLang}/></>;
  }
  const AT=[
    {l:t.home,k:"home",i:IC.home},
    {l:t.analysis,k:"analysis",i:IC.analysis,badge:newPosts},
    {l:t.signals,k:"signals",i:IC.sig,badge:newSigs},
    {l:t.plans,k:"plans",i:IC.pla},
    {l:t.admin,k:"admin",i:IC.adm,ao:true},
    {l:t.profile,k:"profile",i:IC.usr}
  ];
  const VT=AT.filter(tab=>!tab.ao||adm);
  const st=Math.min(tab,VT.length-1);
  const cur=VT[st];
  const goTab=i=>{setTab(i);clearBadge(VT[i]?.k)};
  const goToTabByKey=(k)=>{const idx=VT.findIndex(t=>t.k===k);if(idx>=0)goTab(idx)};
  const scr=()=>{switch(cur?.k){
    case"home":return<Home posts={posts} signals={sigs} msgs={msgs} stories={stories} go={goTab} goToPlans={()=>goToTabByKey("plans")} P={P} ok={ok} lastUpdate={lastUpdate} dark={dark} toggle={toggle} userProfile={up} token={tk} onR={load} online={online}/>;
    case"analysis":return<Analysis posts={posts} userProfile={up} msgs={msgs} token={tk} onR={load} goToPlans={()=>goToTabByKey("plans")}/>;
    case"signals":return<Sigs signals={sigs} userProfile={up} goToPlans={()=>goToTabByKey("plans")}/>;
    case"plans":return<Plans userProfile={up} goToSupport={()=>{goToTabByKey("profile");setOpenSupport(true)}} token={tk}/>;
    case"admin":return<Adm token={tk} posts={posts} signals={sigs} onR={load}/>;
    case"profile":return<Prof user={usr} up={up} onOut={handleLogout} dark={dark} toggle={toggle} lang={lang} setLang={setLang} token={tk} onNameChange={(name)=>{setUp(prev=>prev?{...prev,full_name:name}:prev)}} openSupport={openSupport} onSupportOpened={()=>setOpenSupport(false)}/>;
    default:return null;
  }};
  return(
    <LangCtx.Provider value={{t,lang}}>
      <div className={`offline-bar${!online?" show":""}`}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.56 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        {t.offline}
      </div>
      <div className="app" style={{paddingTop:!online?28:0,transition:"padding-top .3s ease"}}>
        <div className="hd">
          <div className="lg">Fxscalproom<b>.</b></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {adm&&<span style={{fontSize:9,fontWeight:600,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"3px 8px",borderRadius:6}}>ADMIN</span>}
            <span style={{fontSize:12,color:"var(--mu)",fontWeight:500}}>{cur?.l}</span>
          </div>
        </div>
        <div className="ct">
          <PTR/>
          {scr()}
        </div>
        <div className="tb" id="fxtb">{VT.map((tab,i)=>
          <div key={i} className={`ti${st===i?" ti-active":""}`} onClick={()=>goTab(i)} style={{color:st===i?"var(--B)":"var(--dm)"}}>
            <div style={{position:"relative"}}>
              {tab.i}
              {tab.badge>0&&st!==i&&<div className="nb"/>}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:st===i?"var(--B)":"var(--dm)"}}>{tab.l}</span>
          </div>
        )}</div>
      </div>
    </LangCtx.Provider>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',async function(){
    try{
      if(!localStorage.getItem('sw_v8')){
        var regs=await navigator.serviceWorker.getRegistrations();
        for(var i=0;i<regs.length;i++){await regs[i].unregister()}
        var keys=await caches.keys();
        for(var j=0;j<keys.length;j++){await caches.delete(keys[j])}
        localStorage.setItem('sw_v8','1');
      }
      navigator.serviceWorker.register('/sw.js');
    }catch(e){}
  });
}
</script>
</body>
</html>
