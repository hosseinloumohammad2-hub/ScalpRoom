<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fxscalproom — Updating</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#08080c">
<style>
  :root{
    --bg:#08080c; --bg2:#0e0e16;
    --ink:#f4f4f8; --mut:#8a8a99; --dim:#56566a;
    --red:#ff453a; --redGlow:rgba(255,69,58,.55);
    --green:#30d158; --purple:#9b5cff;
    --line:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Vazirmatn',system-ui,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    position:relative;
    padding:calc(env(safe-area-inset-top,0px) + 54px) 22px calc(env(safe-area-inset-bottom,0px) + 32px);
    overflow-x:hidden; overflow-y:auto;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; top:-32%; left:50%;
    width:160vw; height:92vh; transform:translateX(-50%);
    background:radial-gradient(ellipse at center,rgba(255,69,58,.14),transparent 60%);
    filter:blur(46px); pointer-events:none; z-index:0;
  }
  body::after{
    content:""; position:fixed; bottom:-30%; left:20%;
    width:80vw; height:60vh;
    background:radial-gradient(ellipse at center,rgba(155,92,255,.08),transparent 62%);
    filter:blur(50px); pointer-events:none; z-index:0;
  }
  #chart{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; opacity:.36; pointer-events:none;
    -webkit-mask-image:linear-gradient(to bottom,transparent,#000 20%,#000 82%,transparent);
    mask-image:linear-gradient(to bottom,transparent,#000 20%,#000 82%,transparent);
  }

  /* language toggle - centered inside card */
  .lang-toggle{
    display:inline-flex; gap:3px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--line);
    border-radius:100px; padding:4px;
    margin:0 auto 22px;
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  }
  .lang-toggle button{
    border:0; background:transparent; cursor:pointer;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13.5px;
    color:var(--mut); padding:9px 22px; border-radius:100px;
    transition:all .25s ease; min-width:84px;
  }
  .lang-toggle button[data-lang="fa"]{ font-family:'Vazirmatn',sans-serif; }
  .lang-toggle button.on{ background:var(--ink); color:#0a0a0f; }

  .wrap{ position:relative; z-index:2; width:100%; max-width:560px; text-align:center; }

  .card{
    position:relative;
    background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:1px solid var(--line); border-radius:30px;
    padding:42px 30px 32px;
    backdrop-filter:blur(28px) saturate(155%); -webkit-backdrop-filter:blur(28px) saturate(155%);
    box-shadow:0 34px 90px -22px rgba(0,0,0,.72), inset 0 1px 0 rgba(255,255,255,.1);
    overflow:hidden;
  }
  .card::after{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  }

  .brand{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px;
    letter-spacing:-.5px; direction:ltr; display:inline-flex; align-items:baseline; gap:1px;
    margin-bottom:24px;
  }
  .brand .dot{ color:var(--red); font-size:30px; line-height:0; }

  .status{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12.5px; font-weight:600; color:var(--red);
    background:rgba(255,69,58,.1); border:1px solid rgba(255,69,58,.25);
    border-radius:100px; padding:7px 15px; margin-bottom:24px;
  }
  .pulse{
    width:8px; height:8px; border-radius:50%; background:var(--red);
    box-shadow:0 0 0 0 var(--redGlow); animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 var(--redGlow)}
    70%{box-shadow:0 0 0 9px rgba(255,69,58,0)}
    100%{box-shadow:0 0 0 0 rgba(255,69,58,0)}
  }

  h1{ font-size:clamp(26px,7vw,37px); font-weight:800; line-height:1.32; letter-spacing:-.3px; margin-bottom:12px; }
  h1 .accent{
    background:linear-gradient(180deg,#fff,var(--red));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{ color:var(--mut); font-size:14.5px; font-weight:400; line-height:1.9; max-width:410px; margin:0 auto 30px; }

  .timer-label{ font-size:11px; font-weight:600; letter-spacing:1.2px; color:var(--dim); margin-bottom:13px; text-transform:uppercase; }
  .timer{ display:flex; justify-content:center; gap:9px; direction:ltr; margin-bottom:8px; }
  .unit{
    flex:1; max-width:96px; background:rgba(0,0,0,.38);
    border:1px solid var(--line); border-radius:16px; padding:15px 6px 11px;
    position:relative; overflow:hidden;
  }
  .unit::before{
    content:""; position:absolute; top:0; left:0; right:0; height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,.06),transparent); pointer-events:none;
  }
  .num{
    font-family:'JetBrains Mono',monospace; font-size:clamp(29px,8vw,41px); font-weight:700;
    line-height:1; letter-spacing:-1px;
    background:linear-gradient(180deg,#fff,#c5c5d2);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    font-variant-numeric:tabular-nums; transition:transform .18s ease;
  }
  .num.flip{ transform:translateY(-3px) scale(1.04); }
  .cap{ margin-top:9px; font-size:10px; font-weight:600; letter-spacing:.5px; color:var(--dim); text-transform:uppercase; }
  .eta{ font-size:12.5px; color:var(--mut); margin-top:18px; font-weight:500; }
  .eta b{ color:var(--ink); font-weight:700; }

  .bar{ height:5px; background:rgba(255,255,255,.07); border-radius:100px; overflow:hidden; margin:24px auto 0; max-width:280px; position:relative; }
  .fill{
    height:100%; width:0%; border-radius:100px;
    background:linear-gradient(90deg,var(--red),#ff8a80); box-shadow:0 0 12px var(--redGlow);
    transition:width 1s ease; position:relative; overflow:hidden;
  }
  .fill::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
    animation:sheen 2.4s infinite;
  }
  @keyframes sheen{ 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  .premium{
    margin-top:30px; padding:15px 18px; border-radius:16px;
    background:linear-gradient(135deg,rgba(255,69,58,.07),rgba(155,92,255,.07));
    border:1px solid rgba(255,255,255,.07);
    display:flex; align-items:center; gap:12px;
  }
  .premium .crown{ font-size:22px; flex-shrink:0; filter:drop-shadow(0 2px 6px rgba(255,69,58,.4)); }
  .premium .ptext{ font-size:12.5px; line-height:1.75; color:var(--mut); text-align:start; }
  .premium .ptext b{ color:var(--ink); font-weight:700; }
  .premium a{
    color:var(--red); font-weight:700; text-decoration:none; direction:ltr; display:inline-block;
    border-bottom:1px dashed rgba(255,69,58,.4);
  }
  .premium a:hover{ border-bottom-style:solid; }

  .contact{ margin-top:20px; font-size:12.5px; color:var(--mut); font-weight:500; line-height:1.7; }
  .contact a{
    color:var(--ink); font-weight:700; text-decoration:none; direction:ltr; display:inline-block;
    border-bottom:1px solid rgba(255,255,255,.18);
  }
  .contact a:hover{ border-bottom-color:var(--red); color:var(--red); }

  .foot{ margin-top:18px; font-size:11px; color:var(--dim); direction:ltr; font-family:'Space Grotesk',sans-serif; letter-spacing:.3px; }

  /* EN mode */
  html[lang="en"]{ direction:ltr; }
  html[lang="en"] body{ font-family:'Space Grotesk','Vazirmatn',sans-serif; }
  html[lang="en"] .premium .ptext{ text-align:start; }

  @media (max-width:420px){
    .card{ padding:34px 20px 26px; border-radius:26px; }
    .unit{ border-radius:13px; padding:13px 4px 9px; }
    .timer{ gap:6px; }
    .lang-toggle{ top:16px; inset-inline-end:16px; }
  }
  @media (prefers-reduced-motion:reduce){
    .pulse,.fill::after{ animation:none }
    #chart{ display:none }
  }
</style>
</head>
<body>
<canvas id="chart"></canvas>

<div class="wrap">
  <div class="card">
    <div class="lang-toggle">
      <button data-lang="fa" class="on">فارسی</button>
      <button data-lang="en">English</button>
    </div>
    <div class="brand">Fxscalproom<span class="dot">.</span></div>
    <div class="status"><span class="pulse"></span><span data-t="status"></span></div>
    <h1 data-t="title"></h1>
    <p class="sub" data-t="sub"></p>

    <div class="timer-label" data-t="returnIn"></div>
    <div class="timer">
      <div class="unit"><div class="num" id="d">00</div><div class="cap" data-t="days"></div></div>
      <div class="unit"><div class="num" id="h">00</div><div class="cap" data-t="hours"></div></div>
      <div class="unit"><div class="num" id="m">00</div><div class="cap" data-t="mins"></div></div>
      <div class="unit"><div class="num" id="s">00</div><div class="cap" data-t="secs"></div></div>
    </div>
    <div class="eta"><span data-t="etaLabel"></span> <b id="etaText"></b></div>

    <div class="bar"><div class="fill" id="fill"></div></div>

    <div class="premium">
      <span class="crown">👑</span>
      <span class="ptext" data-t="premium"></span>
    </div>

    <div class="contact" data-t="contact"></div>

    <div class="foot">© Fxscalproom — Live trading analysis</div>
  </div>
</div>

<script>
const TG = "https://t.me/Fxscalproom";
const ADMIN = "https://t.me/Hosenlou";
const I18N = {
  fa:{
    dir:"rtl", lang:"fa",
    status:"در حال بروزرسانی",
    title:'یه چیز <span class="accent">بهتر</span><br>داره ساخته میشه',
    titleDone:'تقریباً <span class="accent">آماده‌ست</span>',
    sub:"اپلیکیشن موقتاً برای ارتقای زیرساخت و سرعت‌بخشی به بارگذاری تحلیل‌ها آفلاینه. خیلی زود و سریع‌تر از قبل برمی‌گردیم.",
    returnIn:"بازگشت تا",
    days:"روز", hours:"ساعت", mins:"دقیقه", secs:"ثانیه",
    etaLabel:"زمان تخمینی بازگشت:", eta:"۲۱ ژوئن ۲۰۲۶", soon:"به‌زودی…",
    premium:'اعضای <b>پرمیوم</b> در این مدت همچنان تحلیل‌ها رو در کانال تلگرام <a href="'+TG+'" target="_blank" rel="noopener">Fx.Premium</a> دریافت می‌کنن.',
    contact:'جهت ارتباط، در تلگرام به ادمین <a href="'+ADMIN+'" target="_blank" rel="noopener">@Hosenlou</a> پیام بدید.'
  },
  en:{
    dir:"ltr", lang:"en",
    status:"Updating",
    title:'Building something <span class="accent">better</span>',
    titleDone:'Almost <span class="accent">ready</span>',
    sub:"The app is temporarily offline while we upgrade the infrastructure and make analysis load faster. We'll be back very soon — quicker than before.",
    returnIn:"Back in",
    days:"days", hours:"hours", mins:"mins", secs:"secs",
    etaLabel:"Estimated return:", eta:"June 21, 2026", soon:"Soon…",
    premium:'<b>Premium</b> members still receive all analysis on the <a href="'+TG+'" target="_blank" rel="noopener">Fx.Premium</a> Telegram channel during this time.',
    contact:'For contact, message admin <a href="'+ADMIN+'" target="_blank" rel="noopener">@Hosenlou</a> on Telegram.'
  }
};

let LANG = (localStorage.getItem("fx_maint_lang")) || "fa";
const enDigits = n => String(n).padStart(2,'0');
const faDigits = n => enDigits(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);

function apply(lang){
  LANG = lang;
  try{ localStorage.setItem("fx_maint_lang",lang); }catch(e){}
  const t = I18N[lang];
  document.documentElement.lang = t.lang;
  document.documentElement.dir = t.dir;
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k = el.getAttribute('data-t');
    if(t[k]!==undefined) el.innerHTML = t[k];
  });
  document.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('data-lang')===lang);
  });
  tick(true);
}
document.querySelectorAll('.lang-toggle button').forEach(b=>{
  b.addEventListener('click',()=>apply(b.getAttribute('data-lang')));
});

// ---- Countdown: June 21, 2026 00:00 local ----
const TARGET = new Date(2026,5,21,0,0,0).getTime();
const START  = new Date(2026,5,14,0,0,0).getTime();
const el = id => document.getElementById(id);
let prev = {};

function setNum(id,val){
  const node = el(id);
  const fmt = (LANG==="fa"?faDigits:enDigits)(val);
  if(node.textContent!==fmt){
    node.textContent = fmt;
    node.classList.add('flip');
    setTimeout(()=>node.classList.remove('flip'),180);
  }
}

function tick(force){
  const t = I18N[LANG];
  const now = Date.now();
  let diff = TARGET - now;
  if(diff<=0){
    ['d','h','m','s'].forEach(id=>el(id).textContent=(LANG==="fa"?"۰۰":"00"));
    el('etaText').textContent = t.soon;
    el('fill').style.width = '100%';
    document.querySelector('h1').innerHTML = t.titleDone;
    return;
  }
  const dd=Math.floor(diff/86400000); diff-=dd*86400000;
  const hh=Math.floor(diff/3600000);  diff-=hh*3600000;
  const mm=Math.floor(diff/60000);    diff-=mm*60000;
  const ss=Math.floor(diff/1000);
  setNum('d',dd); setNum('h',hh); setNum('m',mm); setNum('s',ss);
  el('etaText').textContent = t.eta;
  const pct=Math.max(0,Math.min(100,((now-START)/(TARGET-START))*100));
  el('fill').style.width = pct.toFixed(1)+'%';
}

apply(LANG);
setInterval(()=>tick(),1000);

// ---- Ambient live candlestick chart with price line ----
(function(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const cv=document.getElementById('chart'), ctx=cv.getContext('2d');
  let W,H,dpr,candles=[],lastT=0,price=100;
  const RED='#ff453a', GREEN='#30d158';
  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();
  const CW=14, GAP=8, STEP=CW+GAP;
  function make(){
    const open=price;
    const vol=(Math.random()-0.48)*7;
    const close=Math.max(20,Math.min(180,open+vol));
    const high=Math.max(open,close)+Math.random()*4;
    const low=Math.min(open,close)-Math.random()*4;
    price=close; return {open,close,high,low};
  }
  function seed(){ candles=[]; const n=Math.ceil(W/STEP)+2; for(let i=0;i<n;i++) candles.push(make()); }
  seed();
  function scaleY(p){ const top=H*0.18,bot=H*0.82; return bot-((p-10)/180)*(bot-top); }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    if(t-lastT>1100){ candles.push(make()); if(candles.length>Math.ceil(W/STEP)+2) candles.shift(); lastT=t; }
    const offset=((t-lastT)/1100)*STEP;
    let lastX=0,lastY=0;
    // price line trail
    ctx.beginPath();
    for(let i=0;i<candles.length;i++){
      const c=candles[i];
      const x=W-(candles.length-i)*STEP+offset+CW/2;
      const y=scaleY(c.close);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      lastX=x; lastY=y;
    }
    ctx.strokeStyle='rgba(255,69,58,.25)'; ctx.lineWidth=1.5; ctx.stroke();
    // candles
    for(let i=0;i<candles.length;i++){
      const c=candles[i];
      const x=W-(candles.length-i)*STEP+offset;
      if(x<-STEP||x>W+STEP) continue;
      const up=c.close>=c.open, col=up?GREEN:RED;
      ctx.strokeStyle=col; ctx.fillStyle=col;
      ctx.globalAlpha=.85; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x+CW/2,scaleY(c.high)); ctx.lineTo(x+CW/2,scaleY(c.low)); ctx.stroke();
      const yo=scaleY(c.open),yc=scaleY(c.close);
      ctx.globalAlpha=up?.5:.58;
      ctx.fillRect(x,Math.min(yo,yc),CW,Math.max(2,Math.abs(yc-yo)));
    }
    // live dot
    ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(lastX,lastY,3,0,Math.PI*2);
    ctx.fillStyle='#ff453a'; ctx.fill();
    ctx.beginPath(); ctx.arc(lastX,lastY,7,0,Math.PI*2);
    ctx.fillStyle='rgba(255,69,58,.18)'; ctx.fill();
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
