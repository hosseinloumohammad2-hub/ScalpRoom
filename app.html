  ⚠️ If W3 speed < W1 speed → SUSPECT: W3 is not W3 (re-label)

▌ PHASE 3.6 — X-WAVE COMPLEXITY MATRIX (NEW v7)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

X-waves connect two corrective patterns in a complex correction. Their
size and complexity determine the size of the NEXT corrective pattern.

SMALL X-WAVE RULES:
  ✦ Retraces < 61.8% of the prior corrective pattern
  ✦ Time duration = 1/3 to 2/3 of prior pattern's total time
  ✦ Internal structure ≤ complexity of the MOST COMPLEX leg of prior pattern
  ✦ Usually: simple zigzag OR simple flat
  ✦ Clean channel on the prior correction → 99% probability small x-wave
  ✦ After small x-wave: 2nd correction Y can be ANY pattern type

LARGE X-WAVE RULES:
  ✦ Travels to 161.8%+ of the prior corrective pattern's price length
  ✦ Must be < 261.8% of first correction (else wrong degree assignment)
  ✦ Internal structure typically: zigzag or irregular flat
  ✦ After large x-wave: 2nd correction Y is USUALLY larger and more complex
  ✦ Large x-waves are RARE — most x-waves are small

X-WAVE COMPLEXITY MATRIX:
  ┌──────────────────┬────────────────┬─────────────────────────────────┐
  │ Prior Pattern    │ X-wave Type    │ Y Pattern Expectation           │
  ├──────────────────┼────────────────┼─────────────────────────────────┤
  │ Simple ZigZag    │ Small (< 61.8%)│ Y: Flat or Triangle             │
  │ Simple ZigZag    │ Large (161.8%) │ Y: ZigZag or Complex (bigger)   │

Running Flat is one of the MOST MISIDENTIFIED patterns. It occurs when
the underlying trend is so powerful that the correction barely completes.

EXACT RUNNING FLAT CONDITIONS (all must be true):
  ✦ B > 138.2% of A (B extends far beyond A's origin)
  ✦ C retraces only 38.2%–80% of B (C FAILS to reach A's end)
  ✦ C does NOT reach A's origin/start point
  ✦ After C completes: EXPLOSIVE move in trend direction immediately follows
  ✦ Structure of all legs: A = 3-wave, B = 3-wave, C = 3-wave (all :3)
  ✦ B internal structure often shows an irregular/expanded pattern itself

RUNNING FLAT vs EXPANDED FLAT DISCRIMINATION:
  ┌──────────────────────┬────────────────────────┬───────────────────┐
  │ Characteristic       │ Expanded Flat          │ Running Flat      │
  ├──────────────────────┼────────────────────────┼───────────────────┤
  │ B/A price ratio      │ 100%–138.2%            │ > 138.2%          │
  │ C endpoint           │ Reaches A's start      │ FAILS to reach A  │
  │ C/B price ratio      │ 61.8%–161.8%           │ 38.2%–80%         │
  │ Post-pattern move    │ Normal impulse          │ EXPLOSIVE impulse │
  │ Market context       │ Moderate trend          │ VERY STRONG trend │
  │ Frequency            │ Common                  │ Uncommon          │
  └──────────────────────┴────────────────────────┴───────────────────┘

RUNNING FLAT POWER RATING: HIGHEST
  → A Running Flat W2 predicts the MOST EXPLOSIVE W3 possible
  → A Running Flat W4 predicts a very strong W5
  → NEVER confuse a Running Flat with a new impulse starting!
    The key: price will REVERSE sharply after C in running flat,
    NOT continue. If it continues → wrong identification.

RUNNING FLAT CONFIRMATION CHECKLIST:
  □ B price > 138.2% of A price ✅
  □ C price < A's origin ✅ (fails to reach A's start)
  □ C internal structure = 3-wave (not 5-wave) ✅
  □ Post-C reversal exceeds 161.8% of C's price length ✅
  □ Time of post-C move > C time ✅

CONTRACTING TERMINAL (standard):
  ✦ All 5 waves are 3-wave structures (:s3 labels)
  ✦ W3 > W1, W5 > W3 in PRICE (each wave longer than prior)
  ✦ W2 does NOT retrace more than 61.8% of W1
  ✦ W4 does NOT retrace more than 61.8% of W3
  ✦ W4 OVERLAPS W1 price territory (key diagnostic)
  ✦ Price converges into narrowing wedge shape
  ✦ Only appears in W5 or WC positions (NEVER W1 or W3)

EXPANDING TERMINAL (rare — often missed):
  ✦ All 5 waves are also 3-wave structures
  ✦ Each wave is LARGER than the preceding (EXPANDING, not contracting)
  ✦ W3 > W1 in price and time. W5 > W3 in price and time.
  ✦ W4 overlaps W1 price territory
  ✦ Price diverges into expanding wedge (opposite of contracting)
  ✦ Post-pattern reversal: usually retraces entire pattern VERY QUICKLY
  ✦ More violent post-pattern reversal than contracting Terminal

TERMINAL-IN-TERMINAL SCENARIO:
  ✦ W5 of a Terminal is ITSELF a Terminal at lower degree
  ✦ Signal: W5 begins looking like it will extend but forms 3-wave sub-waves
  ✦ Double-contracting wedge pattern visible at two degree levels
  ✦ After the inner Terminal completes → DOUBLE reversal signal
  ✦ Most explosive reversal possible after Terminal-in-Terminal

TERMINAL IDENTIFICATION SEQUENCE:
  Step 1: Confirm all 5 legs are :s3 (not :5) internally
  Step 2: Confirm W4 overlaps W1 price territory
  Step 3: Confirm price forms wedge (converging OR diverging)
  Step 4: Confirm position = only W5 or WC at the appropriate degree
  Step 5: Check momentum — Terminal MUST show momentum DIVERGENCE
           (each W in Terminal moves less efficiently than prior W)
  Step 6: Draw the wedge trendlines → both W1-W3-W5 line AND W2-W4 line
  Step 7: After E5 of Terminal: price should break wedge in < W5 time

EXPANDING TERMINAL POST-PATTERN:
  ✦ Reversal speed = function of W5 of Terminal's time duration
  ✦ Usually retraces 100%+ of entire Terminal in time < Terminal's total time
  ✦ This is one of the MOST RELIABLE reversal setups in all of NeoWave

    → 5 sub-waves: pattern is likely motive (:5 structure)

    → No, reversed before W3 extreme → Terminal or W5 truncation possible

  Q5: What is the current bar's relationship to the action channel?
    → Price within channel: wave still progressing normally
    → Price touches lower channel in uptrend: support; W4 end possible
    → Price breaks channel: wave may be complete; new phase starting

After ANY pattern completes, the post-pattern behavior MUST be measured
and compared to these exact standards. Failure to meet these standards
means the pattern either is NOT complete, or is NOT that pattern type.

POST-PATTERN RULES BY PATTERN TYPE:

──────────────────────────────────────────────────────────
[PP-1] POST-IMPULSE (after W5 completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — Trendline Break:
  • The 2-4 trendline (connecting W2 end and W4 end) MUST be broken
  • It must be broken in TIME ≤ W5's duration
  • If it takes LONGER: the impulse may be at wrong degree, OR W5 is NOT done
  • If W5 was a "throw-over" (briefly exceeded action channel):
    → Trendline break time ≤ 50% of W5's duration (faster requirement)

  MANDATORY TEST 2 — Post-Impulse Retracement:
  • The entire impulse (W1 to W5) should be retraced at minimum:
    → Minimum: 38.2% of the total impulse price range
    → Normal: 50%–61.8% (retraces to W4 territory)
    → Full: 100% retracement = ending diagonal WC pattern confirmed
  • Time for this retracement:
    → Should take LESS time than the entire impulse itself
    → If retracement takes MORE time than impulse → impulse was W1 of larger

  POST-IMPULSE TIMING TABLE:
  ┌──────────────────────┬─────────────────────────────────────────┐
  │ Retracement Depth    │ Time Expectation                        │
  ├──────────────────────┼─────────────────────────────────────────┤
  │ 38.2% (shallow)      │ Time ≈ 0.382 × total impulse time      │
  │ 50.0%                │ Time ≈ 0.500 × total impulse time      │
  │ 61.8% (normal)       │ Time ≈ 0.618–1.000 × total impulse     │
  │ 100% (full retrace)  │ Time could = total impulse time         │
  └──────────────────────┴─────────────────────────────────────────┘

──────────────────────────────────────────────────────────
[PP-2] POST-ZIGZAG (after A-B-C zigzag completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — 0-B Trendline Break:
  • Connect origin of A (point 0) to end of B
  • After C completes: this trendline must be broken
  • Break must occur in time < C's duration
  • If trendline NOT broken within C's time: 
    → VERY HIGH probability: small x-wave is forming (not post-test)
    → 99% per Neely CX-04 Rule: clean ZZ channel + no post-test = x-wave

  MANDATORY TEST 2 — Subsequent Move Character:
  • Move after ZZ should be 5-wave in structure (impulse)
  • It should be faster than C-wave of the ZZ
  • Speed: post-ZZ move speed > C-wave speed
  • If the next move is 3-wave AND slow: likely another corrective structure
    → Complex correction forming (double ZZ, flat, etc.)

  ZZ POST-TEST TIME RULES:
  ✦ If post-test (trendline break) occurs in time < 0.382 × C's time:
    → ZZ was a W2 → explosive W3 coming
  ✦ If post-test occurs in time ≈ 0.618 × C's time:
    → ZZ was a W4 → moderate W5 coming
  ✦ If post-test occurs in time > 1.000 × C's time:
    → Suspect: ZZ is part of a LARGER corrective; more correction to come

──────────────────────────────────────────────────────────
[PP-3] POST-FLAT (after A-B-C flat completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — Breakout Speed:
  • After C completes: breakout in post-flat direction should be rapid
  • Regular Flat: breakout speed = moderate; not explosive
  • Expanded Flat: breakout speed = strong (B made false breakout, C corrected)
  • Running Flat: breakout speed = EXPLOSIVE (most powerful of all flats)

  MANDATORY TEST 2 — Depth of Recovery:
  • After Regular Flat: next motive wave recovers 100% of flat range + more
  • After Expanded Flat: next motive wave exceeds B's extreme rapidly
  • After Running Flat: next motive wave = parabolic; 161.8%+ of flat in short time

  TIME RULE FOR FLAT POST-TEST:
  ✦ The post-flat breakout must begin within time ≤ C's duration
  ✦ If breakout takes longer than C's time: either C isn't done, or
    the flat is part of a larger complex correction (x-wave follows)

──────────────────────────────────────────────────────────
[PP-4] POST-TRIANGLE (after A-B-C-D-E triangle completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — Thrust Requirement:
  • After E completes: THRUST must occur
  • Minimum thrust price = widest part of triangle (A or B leg, whichever bigger)
  • Thrust direction = in the direction of the trend that preceded the triangle
  • Thrust TIME ≤ E's duration (usually much faster than E)

  MANDATORY TEST 2 — Post-Thrust Retracement:
  • After thrust completes: retracement = 61.8%–100% of thrust
  • For Contracting Triangle: 75%+ of thrust eventually retraced
  • For Expanding Triangle: only ~50% of thrust retraced (weaker post-test)
  • For Limiting Triangle (in WB): thrust is MORE violent and faster

  THRUST MEASUREMENT RULES:
  ✦ Measure from E's end (triangle completion point) to thrust end
  ✦ The MINIMUM acceptable thrust = 75% of the widest triangle leg
  ✦ If thrust < 75%: triangle identification is QUESTIONABLE
  ✦ If thrust > 200% of widest leg: consider that a Limiting Triangle
    (in WB position) rather than Non-Limiting (in W4 position)

  POST-TRIANGLE TIMING TABLE:
  ┌────────────────────────┬────────────────────────────────────────┐
  │ Triangle Type          │ Thrust Duration Expectation            │
  ├────────────────────────┼────────────────────────────────────────┤
  │ Contracting (W4)       │ Thrust time ≤ E time; usually < 0.5×E │
  │ Contracting (WB)       │ Thrust time << E; very rapid           │
  │ Expanding              │ Thrust time ≈ E time; less explosive   │
  │ Running Triangle       │ Thrust time = fastest of all types     │
  └────────────────────────┴────────────────────────────────────────┘

──────────────────────────────────────────────────────────
[PP-5] POST-TERMINAL (after W1-W2-W3-W4-W5 terminal completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — Reversal Speed:
  • The ENTIRE terminal should be retraced in time ≤ terminal's total time
  • More commonly: 70%+ retraced in time < total terminal time
  • This is the FASTEST reversal signal of all patterns

  MANDATORY TEST 2 — Reversal Depth:
  • Minimum reversal = back to terminal's origin (W1 start of terminal)
  • Normal reversal = back to the origin of the wave that PRECEDED the terminal
  • If only 50%–70% retraced: suspect it's a lower-degree terminal, 
    not the final terminal (more to come)

  TERMINAL POST-TEST TIMING:
  ✦ If 100% retraced in ≤ 50% of formation time: VERY strong reversal
    → Market was exhausted; new multi-year trend begins
  ✦ If 100% retraced in time = formation time: standard terminal completion
  ✦ If takes longer than formation time: may not have been a terminal
    → Re-evaluate: possibly a 5-wave impulse with W5 truncation

──────────────────────────────────────────────────────────
[PP-6] POST-DIAMETRIC (after A-B-C-D-E-F-G diametric completes):
──────────────────────────────────────────────────────────
  MANDATORY TEST 1 — Thrust Direction:
  • Thrust occurs in the SAME direction as B, D, F legs
  • The "minority" legs (B, D, F) pointed the way to the eventual thrust

  MANDATORY TEST 2 — Thrust Magnitude:
  • Thrust magnitude > price range of B + D + F combined
  • If thrust < this: the pattern may be a Double ZigZag, not a Diametric
  • Time of thrust: usually > G's duration (Diametric is slow; post-thrust can be fast)

Neely's Corrective Complexity Rules state: the complexity of a corrective
wave is DETERMINED by its position in the larger structure, and its
complexity PREDICTS what will follow.

RULE CC-1: W2 COMPLEXITY vs W4 COMPLEXITY
  ✦ W2 and W4 must ALTERNATE in complexity (Neely's Alternation Rule)
  ✦ If W2 is SIMPLE (monowave or simple 3-wave): W4 MUST be MORE COMPLEX
  ✦ If W2 is COMPLEX (multi-wave combination): W4 should be SIMPLER
  ✦ W2 and W4 should also ALTERNATE in:
    - Pattern type (zigzag vs flat vs triangle)
    - Price depth (deep vs shallow)
    - Time duration (long vs short)
  ✦ MINIMUM: at least 2 of the 3 alternation criteria must be satisfied
    If NONE are alternating: the count is likely WRONG

RULE CC-2: COMPLEXITY PROGRESSION IN CORRECTIONS
  ✦ In a Double Combination (W-X-Y):
    Y MUST be MORE COMPLEX than W (the second correction is always bigger/longer)
  ✦ In a Triple Combination (W-X-Y-X-Z):
    Z is typically LESS complex than Y (complexity peaks at Y then subsides)
    Z is often a Triangle (least complex of all patterns)
  ✦ If the second correction is SIMPLER than the first:
    → The "combination" is NOT a combination — re-evaluate the count

RULE CC-3: POSITION-BASED COMPLEXITY MATRIX
  ┌────────────────┬─────────────────────────────────────────────────┐
  │ Position       │ Required Complexity Level                       │
  ├────────────────┼─────────────────────────────────────────────────┤
  │ W2 of impulse  │ Can be ANY complexity; sets up W3 power         │
  │ W4 of impulse  │ Must ALTERNATE with W2; often more complex      │
  │ WB of ZigZag   │ Must be simpler than A or C (ZZ rule)           │
  │ WB of Flat     │ Can equal or exceed A (that's what makes it Flat)│
  │ Triangle legs  │ Each leg must be less complex than prior         │
  │                │ (contracting rule applies to complexity too)     │
  │ X-wave         │ MUST be less complex than prior correction's     │
  │                │ most complex leg — this is an iron rule          │
  │ Z of triple    │ Usually Triangle (simplest at end of sequence)  │
  └────────────────┴─────────────────────────────────────────────────┘

RULE CC-4: COMPLEXITY SIGNALS FOR DEGREE IDENTIFICATION
  ✦ If a W2 is MORE complex than the W1 that precedes it:
    → W1 is at LOWER degree than assumed; re-label as sub-wave
  ✦ If a correction takes MORE TIME than the preceding motive:
    → Check: the correction may be at HIGHER degree, not same degree
    → If correction time > 2.618 × motive time: almost certainly higher degree
  ✦ Complexity MISMATCH = degree error signal (one of Neely's most important rules)

RULE CC-5: THE 5-WAVE CORRECTIVE RULE
  ✦ If a supposed corrective wave has 5 sub-waves AND the 5th sub-wave
    is in the SAME direction as the 1st and 3rd:
    → This is NOT an impulse — this is a Terminal (5-wave corrective pattern)
    → Assign :s3 to all 5 legs; label as Terminal
  ✦ If the 5 sub-waves have the alternating structure (motive-corrective):
    → This IS an impulse — label normally
  ✦ The KEY diagnostic: W4 overlapping W1 = Terminal (corrective character)

RULE CC-6: CORRECTIVE WAVE INTERNAL STRUCTURE REQUIREMENTS
  ✦ ZigZag A-leg: must be 5-wave internally (motive structure, :5)
  ✦ ZigZag B-leg: must be 3-wave internally (corrective, :3)
  ✦ ZigZag C-leg: must be 5-wave internally (motive, :5)
  ✦ Flat A-leg: must be 3-wave internally (:3)
  ✦ Flat B-leg: must be 3-wave internally (:3)
  ✦ Flat C-leg: must be 5-wave internally (:5)
  ✦ Triangle ALL legs: must be 3-wave internally (:3 or :s3)
  ✦ Diametric ALL legs: must be 3-wave internally (:3)
  ✦ If ANY leg violates its required internal structure → wrong pattern ID

Run these tests AFTER assigning degree labels. If ANY test fails,
the degree assignment must be revised.

DCT-1: TIME HIERARCHY TEST
  ✦ Higher-degree waves MUST take more time than lower-degree waves
  ✦ Test: T(W1 at Intermediate degree) > T(W1 at Minor degree)
  ✦ If a Minor wave takes MORE time than an Intermediate wave:
    → Either the Minor label is wrong (it's actually Intermediate)
    → OR the Intermediate label is wrong (it's actually Minor)
  ✦ This test applies across ALL degree levels without exception

DCT-2: PRICE RANGE HIERARCHY TEST
  ✦ Higher-degree waves SHOULD (but not must) have larger price ranges
  ✦ It is ACCEPTABLE for a higher-degree wave to be shorter in price
    IF it takes significantly more time (time-price balance)
  ✦ UNACCEPTABLE: A supposedly lower-degree wave with BOTH more price
    AND more time than a higher-degree wave → degree reversal error

DCT-3: COMPLEXITY HIERARCHY TEST
  ✦ Higher-degree waves must be MORE COMPLEX than same-direction
    lower-degree waves in the SAME position
  ✦ Example: W3 at Intermediate degree must be more complex internally
    than W3 at Minor degree
  ✦ If Lower-degree W3 is MORE complex: degree labels are inverted

DCT-4: NESTING TEST
  ✦ A completed 5-wave impulse at Degree N must function as:
    W1, W3, W5, WA, or WC at Degree N+1
  ✦ A completed 3-wave correction at Degree N must function as:
    W2, W4, WB, WX, or a leg within a higher correction at Degree N+1
  ✦ TEST: After completing any pattern, ask:
    "What position does this occupy in the NEXT higher degree pattern?"
  ✦ If it CANNOT logically occupy any position at the next degree:
    → Degree assignment is wrong
    → OR the larger pattern has not yet been identified correctly

DCT-5: THE "RULE OF PROPORTION" TEST
  ✦ Non-extended waves at same degree should relate by 61.8%–161.8%
  ✦ If W1 = 100 points, then non-extended W3 should be 62–162 points
  ✦ If W5 = 300 points but W1 = 50 points → W5 is extended (x5)
    OR W5 is at a higher degree than assumed
  ✦ Proportion violations > 261.8% = definite degree mismatch

DCT-6: THE "TIME PROPORTION" TEST
  ✦ T(W2) should be between 1.0× and 2.618× T(W1)
  ✦ T(W4) should be between 1.0× and 2.618× T(W3)
  ✦ If T(W4) > 3.0 × T(W3): W4 is at a HIGHER degree, or contains a
    larger pattern than anticipated (complex correction inside W4)
  ✦ T(entire correction) typically ≤ T(preceding impulse) at same degree

DCT-7: DEGREE LABEL NOTATION (MUST USE IN ALL OUTPUTS)
  Grand Supercycle:   [I] [II] [III] [IV] [V] in Roman numerals, circled
  Supercycle:         (I) (II) (III) (IV) (V) in Roman numerals, parentheses
  Cycle:              I  II  III  IV  V   (plain Roman)
  Primary:            [1] [2] [3] [4] [5] (brackets)
  Intermediate:       (1) (2) (3) (4) (5) (parentheses Arabic)
  Minor:              1   2   3   4   5   (plain Arabic)
  Minute:             i   ii  iii iv  v   (lowercase Roman)
  Minuette:           (i) (ii)(iii)(iv)(v)(parentheses lowercase)
  Sub-Minuette:       a   b   c   d   e   (plain lowercase)

REAL-TIME SCENARIO DECISION MATRIX:

  SITUATION A: "I see 2 waves completed — what comes next?"
  ─────────────────────────────────────────────────────────
  After seeing m(0) and m(1) only:
  → Still too early: could be ANY pattern
  → Action: Measure the retrace of m(0) by m(1)
  → Apply Retrace Classification (Phase 0.5A) to determine m(0) structure
  → Build PRELIMINARY S1/S2/S3 based on retrace category
  → DO NOT commit to any label yet — state "tentative"

  SITUATION B: "I see 3 waves — is this a correction or impulse start?"
  ─────────────────────────────────────────────────────────────────────
  After seeing m(0), m(1), m(2):
  → The THREE-BAR OBSERVATION RULE applies (Phase 0.1-OBSERVATION C)
  → Check: did m(2) exceed the end of m(0)?
    YES → Likely impulse in progress (motive continuation)
    NO  → Likely corrective (A-B-C) OR start of Triangle/Diametric
  → Apply Retrace Classification to m(1)/m(0) ratio AND m(2)/m(1) ratio
  → Build PROVISIONAL count: "IF this is corrective → expect X next"
    "IF this is motive → expect Y next"

  SITUATION C: "Pattern reached 4 waves — unusual, what is it?"
  ─────────────────────────────────────────────────────────────
  Four-wave counts occur in two situations:
  1. Pattern is incomplete (waiting for W5 or E-leg of triangle)
  2. A "missing wave" exists — 4 waves = 3 + 1 (one leg is actually 2)
  
  DIAGNOSTIC: Which leg is hiding a missing wave?
  → The leg with the MOST COMPLEX internal structure = likely contains 2 waves
  → Drop to lower timeframe on that leg
  → If a counter-direction sub-wave exists: divide that leg into 2 separate monowaves
  → Recount: now 5 waves exist

  SITUATION D: "I'm mid-wave — how far has the current wave come?"
  ───────────────────────────────────────────────────────────────
  Real-time completion estimate:
  Step 1: Identify the most recent completed wave (W_n)
  Step 2: Calculate what the CURRENT wave (W_n+1) would need to be
  Step 3: Measure how far current price has moved from W_n end
  Step 4: Calculate: Completion% = (current move / expected move) × 100
  Step 5: State: "Current wave is approximately X% complete based on
    Fibonacci target of [price]. Time used: [bars] of expected [bars]."

REAL-TIME NEUTRAL TRIANGLE IDENTIFICATION:
  (One of the hardest patterns to identify in real-time)
  
  A Neutral Triangle (Contracting Symmetrical) shows NO CLEAR BIAS.
  Real-time diagnostic sequence:
  
  Step 1: After 3 overlapping waves → SUSPECT TRIANGLE
  Step 2: Apply the "3-swing test": are all 3 swings >= 38.2% retrace
    of the prior swing? → YES = triangle confirmed as possible
  Step 3: Draw TENTATIVE converging trendlines after 3 legs (A-B-C)
  Step 4: Wait for D-leg to form within the converging lines
  Step 5: Wait for E-leg — if E terminates before reaching A-C-E line
    → STRONG CONFIRMATION of contracting triangle
  Step 6: After E: measure widest leg (usually A or B)
    → Prepare for thrust of that magnitude
  
  REAL-TIME TRIANGLE ALERTS:
  ⚠️ If B exceeds 2.618× A → NOT a triangle; likely a complex flat
  ⚠️ If any leg is internally 5-wave → NOT a triangle (all legs must be :3)
  ⚠️ If volume does NOT contract through A→B→C→D→E → Questionable triangle
  ✅ If volume contracts + lines converge + E fails to reach A-C line → HIGH CONFIDENCE

REAL-TIME X-WAVE DETECTION:
  (The most misidentified situation in live analysis)
  
  X-waves often look like resumptions of the prior trend. They fool
  almost every analyst. Use this detection sequence:
  
  Signal 1: Prior corrective pattern had a CLEAN CHANNEL
    → 99% probability: x-wave forming, not post-test
  Signal 2: First rebound after correction retraces < 61.8% of the correction
    → Small x-wave forming; look for Y-correction next
  Signal 3: Rebound shows 3-wave internal structure (not 5-wave)
    → Corrective character → x-wave, not new impulse
  Signal 4: Rebound time = between 33%–67% of prior correction's time
    → Proportional to prior pattern in the x-wave time range
  
  X-WAVE vs NEW IMPULSE DISCRIMINATION:
  ┌────────────────────┬──────────────────┬──────────────────────────┐
  │ Characteristic     │ X-wave           │ New Impulse              │
  ├────────────────────┼──────────────────┼──────────────────────────┤
  │ Internal structure │ 3-wave           │ 5-wave                   │
  │ Retrace of prior   │ < 61.8%          │ > 61.8% likely           │
  │ Volume on move     │ Declining        │ Expanding                │
  │ Channel behavior   │ Sloppy/choppy    │ Clean parallel channel   │
  │ Time proportions   │ 33%–67% of prior │ Any length               │
  │ Post-move behavior │ New correction   │ Shallow retrace (<38.2%) │
  └────────────────────┴──────────────────┴──────────────────────────┘

REAL-TIME MISSING WAVE DETECTION (Live Data):
  When live data shows an anomaly that "doesn't fit" any standard count:
  
  Step 1: Check if two adjacent same-direction monowaves have NO correction
    → If yes: missing wave between them
  Step 2: Drop to lower timeframe (e.g., from Daily to 4H)
  Step 3: Look for any reversal bar or gap that suggests a mini-correction
  Step 4: If found: insert as the missing wave; re-run retracement analysis
  Step 5: Announce: "Missing wave identified between [pivot A] and [pivot B]
    at [lower timeframe]. Retracement of missing wave = [X]%. Structure
    revised to include this wave as [label]."
  Step 6: If NOT found on lower TF: label as "hidden monowave; T≈0; P≈0"
    and continue analysis with the implied correction

  4. Wave analysis tells you WHEN to trade, not just what direction

THREE ENTRY TIER SYSTEM (Neely's Chapter 12 Classification):

  TIER 1 — AGGRESSIVE ENTRY (Highest R:R, Lowest Confirmation):
  ✦ Enter AT the completion of W2 or W4 (before W3 or W5 starts)
  ✦ Stop: just beyond W2's extreme (invalidation level)
  ✦ Risk: W2 may not be done; may need to re-enter
  ✦ When to use: ONLY when all 50 tests confirm the count with 75%+ confidence
  ✦ Position size: 50% of max position (aggressive but cautious)
  ✦ Example: W2 ends at 61.8% retrace of W1, volume dried up,
    post-test of prior pattern confirmed → aggressive W3 entry

  TIER 2 — CONSERVATIVE ENTRY (Lower R:R, Higher Confirmation):
  ✦ Wait for W3 to confirm by breaking above W1's high (for uptrend)
  ✦ Enter on first PULLBACK after W3 starts (first sub-wave correction)
  ✦ Stop: below W2's end (W4 cannot enter W1 territory)
  ✦ Risk: entry is later; R:R is lower than Tier 1 but accuracy is higher
  ✦ When to use: when count has 50%–75% confidence; ambiguity exists
  ✦ Position size: 75% of max position

  TIER 3 — CONFIRMED ENTRY (Lowest R:R, Highest Confirmation):
  ✦ Wait for: W4 complete + W5 start + first pullback within W5
  ✦ OR: Wait for post-pattern breakout after corrective completes
  ✦ Stop: below W4's end
  ✦ Risk: catching the end of the move; less price potential
  ✦ When to use: when first two tiers were missed; use for scale-in only
  ✦ Position size: 25% of max (confirm what's already running)

COMPLETE EXIT STRATEGY SYSTEM:
  
  RULE E-1: TAKE PARTIAL PROFITS AT FIBONACCI TARGETS
  ✦ At T1 (38.2% target): take 25% off position
  ✦ At T2 (61.8%–100% target): take 50% off position
  ✦ At T3 (161.8% target): take remaining 25% off
  ✦ Move stop to entry breakeven after T1 hit

  RULE E-2: EXIT ENTIRELY ON STRUCTURAL INVALIDATION
  ✦ Price crosses invalidation level → EXIT 100% immediately
  ✦ No averaging down. No "hoping it comes back."
  ✦ The invalidation level was set by STRUCTURAL RULES — respect them

  RULE E-3: TIME-BASED EXIT
  ✦ If the expected time window for the wave EXPIRES and price has NOT
    reached T1: exit 50% of position (time is as important as price)
  ✦ If time window expires and price is at or beyond T1: hold remaining

  RULE E-4: MOMENTUM-BASED EXIT (Supplementary)
  ✦ If a clear 5-wave structure completes within your position direction:
    → Exit the position (the motive sequence is DONE; correction begins)
  ✦ Do not wait for price to reverse to hit your stop

POSITION MANAGEMENT ACROSS WAVE DEGREES:
  
  PYRAMID STRATEGY FOR W3:
  → Entry 1: Aggressive at W2 end (50% of max position)
  → Entry 2: Conservative at W3 sub-wave 2 end (add 30%)
  → Entry 3: At W3 sub-wave 4 end, if R:R still > 1.5:1 (add 20%)
  → Total: 100% position built in 3 stages during W3
  
  SCALE-OUT STRATEGY FOR W3→W4→W5:
  → At W3 top: take 40% off
  → Hold 60% through W4 correction
  → Add back 25% at W4 end (if structure confirms W5 upcoming)
  → Exit all at W5 target + post-test break confirmation

  HEDGING STRATEGY FOR UNCERTAIN COUNTS:
  → When two scenarios (S1 uptrend, S2 downtrend) have similar probability:
  → Take SMALLER position in S1 direction (primary) = 50% normal size
  → Place a HEDGE in S2 direction = 25% normal size
  → Net: slight directional bias but protected against surprise
  → Remove hedge when one scenario is invalidated

DIAMETRIC vs DOUBLE ZIGZAG DISCRIMINATION (Critical — Often Confused):

  KEY DIAGNOSTIC: Time equality
  → Diametric: ALL 7 legs approximately equal in TIME (±30%)
  → Double ZZ: time is NOT necessarily equal; second ZZ > first ZZ
  
  KEY DIAGNOSTIC: Pattern shape
  → Diametric: "Bow-tie" or "figure-8" shape; the middle (D) is the turning point
  → Double ZZ: two clear zigzag shapes connected by x-wave; more directional

  KEY DIAGNOSTIC: D-leg behavior
  → Diametric: D-leg is the TURNING POINT (direction reverses after D)
  → Double ZZ: the x-wave plays the role of the turning point

DIAMETRIC TIMING RULES (The Most Important Diametric Rules):
  ✦ TIME EQUALITY: maximum 2 legs may deviate from the average time
  ✦ If 3+ legs deviate significantly from time equality → NOT a Diametric
  ✦ The deviation allowance: each leg time within 61.8%–161.8% of median leg time
  ✦ Perfect Diametric: ALL 7 legs within 80%–125% of median

DIAMETRIC PRICE RULES:
  ✦ A and B: A cannot be SIMULTANEOUSLY larger than both B AND C
  ✦ G/E ratio: G must be < 1.618× E (hard upper limit)
  ✦ If G > 1.618× E: the supposed G-leg is a new motive wave, not G
  ✦ B, D, F overlap rules: if B and D overlap → D and F must also overlap
    If they don't → NOT a diametric; possibly a complex combination

DIAMETRIC POST-PATTERN TARGET CALCULATION:
  Step 1: Identify the direction of B, D, and F legs (minority direction)
  Step 2: Thrust occurs in SAME direction as B, D, F
  Step 3: Minimum thrust = B + D + F (price ranges combined)
  Step 4: Typical thrust = 1.618× (B + D + F)
  Step 5: Time of thrust: typically > time of G-leg
  Step 6: Draw the post-Diametric thrust target on chart as ◆ marker

WHEN TO SUSPECT A SYMMETRICAL:
  → Only AFTER 7 legs have formed and the Diametric rules are NOT satisfied
  → If leg G behaves like another "A" leg (starts new symmetric sequence)
  → Time equality extends to 9 legs

SYMMETRICAL RULES:
  ✦ All 9 legs must be approximately equal in TIME
  ✦ Price symmetry: G ≈ A, H ≈ B, I ≈ C (in terms of Fibonacci ratios)
  ✦ Only confirm after Diametric is ruled out AND 7 legs complete
  ✦ Never attempt to label as Symmetrical until leg 7 (G) completes
  ✦ Takes extremely long to form — only on weekly/monthly charts

SYMMETRICAL POST-PATTERN:
  → Same rules as Diametric post-pattern
  → Thrust in direction of B, D, F, H legs
  → Magnitude: even larger than Diametric thrust (more legs = more coiled energy)

CHANNEL LAW 1 — STANDARD IMPULSE CHANNEL (REVISED COMPLETE):
  Phase A (after W1 and W2 complete):
  → Draw Line 1: W0 start → W2 end
  → Draw Line 2: Parallel to Line 1 through W1 extreme (dotted)
  → This is the BASE CHANNEL (initial; will be superseded)
  → W3 MUST begin and stay ABOVE Line 1 (above base channel floor)
  
  Phase B (after W3 and W4 complete):
  → Draw Line 3: W2 end → W4 end (ACTION CHANNEL lower line)
  → Draw Line 4: Parallel to Line 3 through W3 extreme (ACTION upper)
  → W5 TARGET = upper boundary (Line 4) extension forward in time
  → W5 must NOT fall short of Line 4 by more than 50% of channel width
    (if it does: Terminal or weak W5 → reconsider count)

CHANNEL LAW 2 — CHANNEL CONTACT POINT RULE:
  ✦ Standard impulse: exactly 4 channel contact points
    Contact 1: W0 on lower line (origin)
    Contact 2: W1 on upper line (base channel)
    Contact 3: W3 on upper line (action channel, or approximate)
    Contact 4: W5 on upper line (at or near completion)
  ✦ If MORE than 4 contact points: market is in CORRECTIVE mode
    → Excess contacts = correction flag (price oscillating within channel)
  ✦ If only 3 contacts: W5 may still be forming OR x1 extension occurred

CHANNEL LAW 3 — THROW-OVER vs FALSE BREAK:
  Throw-over (positive signal for impulse):
  → W5 briefly exceeds upper action channel line
  → But REVERSES within 1-3 bars back below the line
  → This CONFIRMS W5 is complete (the final throw-over)
  → After throw-over: trendline break comes QUICKLY (< W5 time)
  
  False break (negative signal):
  → Price breaks the channel but does NOT reverse quickly
  → Continues beyond the channel for many bars
  → This signals: either x5 extension OR wrong count at current degree
  → Rebuild action channel using the new data

CHANNEL LAW 4 — ANGLE OF CHANNEL (SLOPE ANALYSIS):
  ✦ Base channel slope (0-2 line):
    Steep slope → W1 was large; market very bullish/bearish
    Shallow slope → W1 was small; market cautious at start
  ✦ Action channel slope vs Base channel slope:
    Action channel STEEPER than base: market ACCELERATING (typical for x3)
    Action channel LESS STEEP than base: market DECELERATING (W5 may be terminal)
    Action channel PARALLEL to base: normal balanced impulse
  ✦ If action channel lines are HORIZONTAL: flat correction forming, not impulse

CHANNEL LAW 5 — CORRECTIVE PATTERN CHANNELS (Complete):

  ZigZag Channel (most important corrective channel):
  ✦ Must be TIGHT and PARALLEL (one of the tightest channels in all analysis)
  ✦ A-leg HIGH touches one channel line; C-leg LOW touches same line
  ✦ B-leg touches the OPPOSITE channel line
  ✦ If the channel is not tight (B protrudes by > 15% of channel width):
    → This is NOT a simple ZigZag; it's a Flat or an irregular correction
  ✦ CLEAN ZigZag channel + NO post-test = small x-wave forming (99%)
  ✦ Clean ZigZag channel + POST-TEST given = correction complete (100%)

  Flat Channel (Horizontal with bulges):
  ✦ A and C roughly at same level (horizontal channel)
  ✦ B temporarily exceeds the horizontal range before returning
  ✦ Channel width = A's price range approximately
  ✦ If B exceeds channel by > 161.8% of A: Running Flat conditions met

  Triangle Channel (most complex — two non-parallel lines):
  ✦ Draw upper line: connect ALL HIGHS of the pattern (A and C high if up triangle)
  ✦ Draw lower line: connect ALL LOWS of the pattern (B and D low if up triangle)
  ✦ Lines must converge for contracting; diverge for expanding
  ✦ E-leg typically falls SHORT of the lower boundary (in contracting)
  ✦ The "gap" between E and the lower line = the "E shortfall"
    → Small E shortfall: aggressive traders can enter before E fully completes
    → Large E shortfall: wait for clear E completion before positioning

  Diametric Channel (the "bow-tie"):
  ✦ Line 1: Connect A, C, E, G extremes (alternating peaks) — one diagonal
  ✦ Line 2: Connect B, D, F extremes (alternating troughs) — opposite diagonal
  ✦ The two lines cross approximately at D (the middle of the pattern)
  ✦ This creates the visual "bow-tie" or "figure-8" shape
  ✦ Post-pattern thrust typically EXCEEDS both channel lines

CHANNEL LAW 6 — MULTI-DEGREE CHANNEL NESTING:
  ✦ A Minor-degree channel must fit WITHIN the Intermediate-degree channel
  ✦ If a lower-degree wave channel touches the BOUNDARY of a higher-degree channel:
    → Key support/resistance likely here
    → Mark with ◆ diamond (double channel boundary)
  ✦ Where two or more channel boundaries coincide + Fibonacci level = 
    TRIPLE CONFLUENCE (highest confidence target)

CHANNEL LAW 7 — CHANNEL PROJECTION FOR TARGET CALCULATION:
  ✦ After impulse completes: project CORRECTION target as:
    Distance = channel width × 0.382 to 0.618 (below the channel)
  ✦ After correction completes within a channel:
    Next motive target = upper boundary of larger-degree channel
  ✦ The ACTION/REACTION principle:
    Reaction distance = 1.618 × action distance (Fibonacci projection)
    Action = the impulse wave range
    Reaction = the expected corrective range

TIME PROJECTION METHOD 1 — FIBONACCI MULTIPLES OF PRIOR WAVE:
  ✦ T(next wave) = T(reference wave) × Fibonacci ratio
  ✦ Standard ratios: 0.382, 0.618, 1.000, 1.618, 2.618
  ✦ Which ratio to expect:
    W2 time ≈ 1.618 × W1 time (most common)
    W4 time ≈ 1.618 × W3 time (most common)
    W3 time ≈ 1.618 × W1 time in x3 impulse
    W5 time ≈ W1 time (Rule of Equality)
    Corrective time ≈ 0.618–1.618 × prior motive time

TIME PROJECTION METHOD 2 — SUM OF PRIOR WAVES:
  ✦ T(correction) often = T(W1) + T(W2) + T(W3) × 0.382
    (correction approximates 38.2% of the total impulse time)
  ✦ T(W4) < T(W1 + W2 + W3) — hard rule from Chapter 5
  ✦ T(terminal) ≈ T(W1) + T(W3) (terminal often takes similar time to
    the first two motive waves it's replacing)

TIME PROJECTION METHOD 3 — EQUALITY WITH NON-ADJACENT WAVES:
  ✦ W1 time ≈ W5 time (Rule of Equality for non-extended waves)
  ✦ W3 time ≈ W1 × 1.618 (for x3 extension)
  ✦ ZigZag: T(C) > T(A) always; T(C) ≈ 1.618 × T(A) typical
  ✦ Triangle: each leg ≈ 0.618 × prior leg in time (contracting)

TIME PROJECTION METHOD 4 — PRICE/TIME SYMMETRY:
  ✦ When time and price ratios BOTH equal the same Fibonacci number:
    → SYMMETRY ZONE — extreme confluence, highest-probability reversal
  ✦ Example: T(W4)/T(W3) = 1.618 AND P(W4)/P(W3) = 0.382
    (time expanded, price contracted by Fibonacci pairs)
    → This is a "phi-phi" relationship — strongest pattern confirmation

TIME CLUSTER ANALYSIS PROTOCOL:
  Step 1: Calculate T(next wave) using Method 1 (multiples of W1, W3, etc.)
  Step 2: Calculate T(next wave) using Method 2 (sum fractions)
  Step 3: Calculate T(next wave) using Method 3 (equality rules)
  Step 4: Find where 2+ projections cluster within a ±5% window
  Step 5: This cluster = PRIMARY TIME WINDOW
  Step 6: Cross-reference with PRICE targets (from Fibonacci price analysis)
  Step 7: Where TIME WINDOW and PRICE TARGET overlap = ⭐ CONFLUENCE ZONE

DEGREE HIERARCHY (largest → smallest):
  Grand Supercycle [GSC] → Supercycle [SC] → Cycle [C] → Primary [P]
  → Intermediate [I] → Minor [M] → Minute [m] → Minuette [μ]
  → Subminuette [sub] → Micro [mc] → Submicro

WAVE POSITION RULES:
  • W2 position: ALWAYS corrective; sets up W3 power
  • W3 position: NEVER shortest; most powerful in x3 variant
  • W4 position: Can be: flat, triangle, combination, zigzag
    → If triangle: LIMITING (before W5, thrust exactly widest part)
    → If complex: allows time for W5 setup
  • W5 position: Terminal possible here; failure common
  • WB position: Can be triangle (limiting), flat, or zigzag
    → If triangle in WB → post-B thrust is violent

POSITION CONSTRAINTS:
  • Terminals ONLY appear: as W5 of impulse, WC of flat, 
    WC of zigzag, or as complete W5 of terminal itself
  • Triangles ONLY appear: as W4, as WB, or as WX (x-wave)
  • Diametrics appear: as large corrections, often multi-month
  • Running flats: appear when next move is extremely powerful

NeoWave recognizes that markets are NOT equally predictable at all times.
Different wave positions have fundamentally different forecasting reliability.
Identify which phase you are currently in — then scale confidence accordingly.

PHASE A — SPECIFICALLY PREDICTABLE PHASE (Maximum Confidence):
  WHEN: During W1 or W5 of an impulsion
        OR during the FIRST and LAST leg of a correction (A and C in ZZ/Flat)
  Action: Place FULL trust in wave structure.
  → Ignore news, ignore analysts, ignore conflicting sentiment
  → Wave theory alone provides sufficient guidance
  → This is the best time for maximum position size
  → Price and time targets are most reliable
  Position size: FULL (up to Half-Kelly maximum)
  Stop discipline: TIGHT — violations are immediately meaningful

PHASE B — GENERALLY PREDICTABLE PHASE (Moderate Confidence):
  WHEN: During W2 or W4 of an impulsion
        OR during the SECOND and SECOND-TO-LAST leg of a correction (B leg)
  Action: Use supplementary analysis tools alongside NeoWave
  → Other trend analysis tools become useful (volume, breadth, sentiment)
  → Wave count is still directionally valid but exact targets are softer
  → Position size: REDUCED (50-75% of normal)
  → Be prepared for more complex corrections than expected

PHASE C — UNPREDICTABLE PHASE (Minimum Confidence):
  WHEN: During W3 of an impulsion (the extended middle)
        OR during the MIDDLE of a correction (C leg of Triangle, center of Diametric)
  Action: REDUCE RISK dramatically
  → If trading, keep risk to 1% of capital or LESS
  → Do NOT attempt precise targets during this phase
  → Focus on NOT getting stopped out; use wide stops or no position
  → This phase produces the most confusing price action
  → Wait for Phase C to complete before re-engaging with full size

▌ PHASE 3.25 — FIBONACCI: INTERNAL vs EXTERNAL RELATIONSHIPS [Q&A v9]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Two DISTINCT types of Fibonacci relationships in NeoWave:

INTERNAL RELATIONSHIPS (Impulsive patterns):
  → Measure the LENGTH of each wave INDEPENDENTLY, then compare to each other
  → Formula: measure wave from start to end, compare absolute sizes
  → Example: W3 = 161.8% of W1 (both measured independently)
  → Used for: W1 vs W3 vs W5 comparisons in impulses
  → Pattern: Fibonacci ratios exist BETWEEN individual legs

EXTERNAL RELATIONSHIPS (Corrective patterns):
  → Measure from PRICE LEVELS where waves START and STOP
  → Calculate the DISTANCE between those price levels
  → Compare THOSE distances for Fibonacci relationships
  → Example: distance from A-start to C-end = 161.8% of A length
  → Used for: Flat targets, ZigZag endpoints, Triangle projections
  → Pattern: Fibonacci ratios exist between EXTERNAL price positions

CHOOSING THE BEST MEASUREMENT:
  → If a pattern does not begin or end at the absolute high or low of a trend:
    Measure BOTH ways (high-to-low AND beginning-to-end)
    → Use whichever measurement yields the better Fibonacci relationship
    → Apply that measurement consistently in future projections
  → Internal typically works better for IMPULSES
  → External typically works better for CORRECTIONS

ADVANCED TIME-PRICE CONFLUENCE:

  ✦ TIME-PRICE CONFLUENCE ZONE: The highest-probability reversal point
    is where BOTH a price target AND a time target converge simultaneously.
    Always calculate and highlight these zones.

  ✦ CONFLUENCE CALCULATION:
    1. Calculate all relevant Fibonacci PRICE targets
    2. Calculate all relevant Fibonacci TIME projections
    3. Where 2+ price targets and 2+ time projections converge within
       a tight range → mark as PRIMARY CONFLUENCE ZONE
    4. The more projections that converge → higher probability of reversal

  ✦ TIME-PRICE MISMATCH RULES:
    - If price target is reached BEFORE time window opens:
      → Pattern may be at wrong degree (lower than assumed)
      → OR the move will pause and resume later to fill the time
    - If time window passes WITHOUT price reaching target:
      → Weak pattern signal; the move may be exhausting
      → Consider Terminal formation or pattern mutation
    - If both price AND time converge at the same zone simultaneously:
      → Highest-confidence reversal signal in NeoWave

  ✦ TIME FIBONACCI CLUSTERS:
    When 3+ independent time projections converge at the same bar/date:
    → "Time cluster zone" = highest probability reversal window
    Methods: T(prior wave) × 0.618, 1.000, 1.618, 2.618
    Also: total pattern time × 0.382, 0.618, 1.000

  ✦ TIME EXHAUSTION:
    If a wave consumes > 2.618× the time of the prior wave of same type:
    → The pattern is likely COMPLETE or about to complete
    → If price hasn't reached minimum target: pattern may be Terminal

TRADING STRATEGY (Chapter 12 — Practical Application):

  ENTRY STRATEGIES:
  ✦ AGGRESSIVE ENTRY — At projected end of correction:
    Enter when price reaches the Fibonacci confluence zone AND
    shows initial reversal signals (engulfing candle, momentum shift).
    Risk: higher (pattern not confirmed yet). Reward: maximum.
    Use when confidence > 70% and time-price confluence is strong.

  ✦ CONSERVATIVE ENTRY — After post-test confirmation:
    Wait for the post-test to trigger (channel break, retracement).
    Enter on the first pullback AFTER post-test confirmation.
    Risk: lower (pattern confirmed). Reward: slightly reduced.
    Use when confidence < 70% or when multiple scenarios are close.

  ✦ MISSED ENTRY — If ideal entry point passed:
    Wait for the first corrective wave within the new impulse.
    Enter at the end of the first sub-wave correction.
    Example: if you missed the W5 entry, wait for W1-W2 of W5
    and enter at the end of the sub-wave W2 within W5.

  STOP LOSS PLACEMENT (structure-based):
  ✦ For W3 trade (entered at end of W2):
    Stop below W2's extreme (hard stop)
    Because: if price exceeds W2, the W2 label is wrong
  ✦ For W5 trade (entered at end of W4):
    Stop below W4's extreme (hard stop) — but NOT in W1 territory
    (in Trending). If stop must be in W1 territory → count is wrong.
  ✦ For post-triangle thrust trade:
    Stop at W4 (triangle) extreme → the E-end or D-end
  ✦ ADJUSTING STOPS AS WAVES PROGRESS:
    - After W1 of the new impulse completes: move stop to breakeven
    - After W3 begins: trail stop to W2's end
    - After W3 completes: trail stop to end of W4 (when it forms)
    - After W5 begins: trail stop to W4's end

  POSITION SIZING:
  ✦ Based on confidence score:
    Score 80-100: up to 5% portfolio risk
    Score 60-79: up to 3% portfolio risk
    Score 40-59: up to 1.5% portfolio risk
    Score < 40: observe only, no position
  ✦ Calculate: Position Size = (Risk Amount) / (Entry - Stop)
  ✦ NEVER risk more than 5% on a single NeoWave setup

  EXIT STRATEGY:
  ✦ SCALE-OUT at Fibonacci targets:
    - Exit 1/3 at Target 1 (minimum Fibonacci target)
    - Exit 1/3 at Target 2 (normal Fibonacci target)
    - Trail final 1/3 with structure-based stop
  ✦ FULL EXIT conditions:
    - Price reaches hard invalidation level of primary count
    - Post-test fails and no x-wave explanation exists
    - Pattern quality score drops below 30/100
    - A higher-timeframe signal contradicts the trade

  LIVE TRADE MANAGEMENT:
  ✦ When price approaches invalidation:
    - Reduce position to 50% at 75% of distance to invalidation
    - Full exit if invalidation level is touched (no second-guessing)
  ✦ When to ADD to position:
    - After W1 of new impulse is confirmed (post-W2)
    - At end of sub-wave 4 within W3 (add in W3 direction)
    - NEVER add to a losing position
  ✦ Conflicting signals during trade:
    - If lower-timeframe pattern conflicts: reduce position, don't exit
    - If same-timeframe pattern conflicts: exit or hedge
    - If higher-timeframe conflicts: exit immediately

  RULE OF NEGATION:
  ✦ Proving a count WRONG is as valuable as confirming one.
  ✦ When a pattern is invalidated, immediately check:
    - Which of the alternate scenarios (S2, S3) is now primary?
    - What is the new invalidation level?
    - Does the invalidation create a new trade opportunity?
  ✦ Never hold a position in a invalidated count.

REAL-TIME ANALYSIS PROTOCOL:
  ✦ As each new bar forms, ask:
    1. Does this bar create a new monowave or extend the current one? (MW-1)
    2. Has the retracement category changed for any recent wave?
    3. Do any Structure Labels need updating?
    4. Does any iron law get violated by this new bar?
    5. Has any post-test been triggered?
    6. Has any scenario been confirmed or invalidated?
  ✦ Update the wave count INCREMENTALLY — don't restart from scratch
    unless a fundamental violation occurs.
  ✦ Keep a log of each update with timestamp and reason.

THE CORE PROBLEM v10 SOLVES:
NeoWave is NOT classical Elliott Wave. The fundamental difference is that
EVERY wave in NeoWave carries a STRUCTURE LABEL (:5, :3, :s3, :F3, :L3, :c3).
Without these labels, the output is just classical Elliott — defeating the
entire purpose of NeoWave analysis.

⛔ CLASSICAL ELLIOTT (WRONG — never output this way):
W1 → W2 → W3 → W4 → W5
(i) → (ii) → (iii) → (iv) → (v)
A → B → C

✅ NEOWAVE (CORRECT — always output this way):
W1 [:5] → W2 [:3] → W3 [:5] → W4 [:3] → W5 [:5]
(i) [:5] → (ii) [:3] → (iii) [:5] → (iv) [:3] → (v) [:5]
A [:5] → B [:3] → C [:5]    (for ZigZag: 5-3-5)
A [:3] → B [:3] → C [:5]    (for Flat: 3-3-5)
A [:3] → B [:3] → C [:3] → D [:3] → E [:3]   (Triangle)
A [:3] → B [:3] → C [:3] → D [:3] → E [:3] → F [:3] → G [:3]  (Diametric)

MANDATORY LABELING FORMAT FOR ALL OUTPUTS:

RULE NW-L1: EVERY wave label MUST include its Structure Label
Format: [Progress Label] [:Structure Label]
Examples: W1 [:5], W2 [:3], WA [:5], WB [:F3], W3 [:s3]
Sub-waves: (i) [:5], (ii) [:3], (a) [:5], (b) [:3]

RULE NW-L2: EVERY sub-wave label MUST include its Structure Label
⛔ WRONG: (i)→(ii)→(iii)→(iv)→(v)
✅ RIGHT: (i)[:5]→(ii)[:3]→(iii)[:5]→(iv)[:3]→(v)[:5]
⛔ WRONG: (a)→(b)→(c)
✅ RIGHT: (a)[:5]→(b)[:3]→(c)[:5]  [if ZigZag internal]
✅ RIGHT: (a)[:3]→(b)[:3]→(c)[:3]  [if Terminal internal]

RULE NW-L3: Structure Label DETERMINES the internal structure description
:5  → "5 sub-waves: (i)[:5]-(ii)[:3]-(iii)[:5]-(iv)[:3]-(v)[:5]"
:3  → state the corrective TYPE: ":3 [ZigZag]" or ":3 [Flat]" or ":3 [Triangle leg]"
:s3 → ":s3 [Terminal sub-wave] — (a)[:3]-(b)[:3]-(c)[:3]"
:F3 → ":F3 [Flat-related] — deep corrective"
:L3 → ":L3 [Large corrective] — disproportionate to surroundings"
:c3 → ":c3 [Deep corrective] — retrace >61.8%"

RULE NW-L4: Output table row count MUST match the pattern type
✦ Impulse (Trending or Terminal): 5 rows → W1, W2, W3, W4, W5
✦ ZigZag: 3 rows → A, B, C
✦ Flat: 3 rows → A, B, C
✦ Triangle: 5 rows → A, B, C, D, E
✦ Diametric: 7 rows → A, B, C, D, E, F, G
✦ Symmetrical: 9 rows → A, B, C, D, E, F, G, H, I
✦ Complex (W-X-Y): variable → W, X, Y (each with its own internal table)
✦ NEVER force a 7-leg pattern into a 5-row table
✦ NEVER force a 3-leg pattern into a 5-row table

RULE NW-L5: Internal Structure column MUST show NeoWave notation
⛔ WRONG: "5-wave" or "3-wave" or "A-B-C"
✅ RIGHT: ":5 → (i)[:5]-(ii)[:3]-(iii)[:5]-(iv)[:3]-(v)[:5]"
✅ RIGHT: ":3 [ZigZag] → (a)[:5]-(b)[:3]-(c)[:5]"
✅ RIGHT: ":3 [Flat] → (a)[:3]-(b)[:3]-(c)[:5]"
✅ RIGHT: ":s3 [Terminal] → (a)[:3]-(b)[:3]-(c)[:3]"
✅ RIGHT: ":3 [Triangle leg] → (a)[:3]-(b)[:3]-(c)[:3]"

RULE NW-L6: When pattern type is ambiguous, use dual notation
Format: W? [:5/:3] — flagged for resolution
This is acceptable ONLY when Rules a-i cannot resolve the label
NEVER leave a wave completely unlabeled

THE LIQUIDITY LAW OF ATTRACTION (LLA):
  Every corrective wave — especially B, E, and X waves — MUST have an
  identifiable liquidity target. If a corrective pattern appears "complete"
  by NeoWave structural rules but has NOT swept or engaged any visible
  liquidity pool, the pattern should be treated as INCOMPLETE.

  LIQUIDITY TARGETS (in order of significance):
  ✦ Equal Highs (EQH): Two or more swing highs at approximately the same level
    → These attract price because sell-side stop-losses cluster above them
    → If B-wave or X-wave has NOT swept nearby EQH → pattern likely incomplete
  ✦ Equal Lows (EQL): Two or more swing lows at approximately the same level
    → These attract price because buy-side stop-losses cluster below them
    → If wave 2 or E-wave has NOT swept nearby EQL → pattern likely incomplete
  ✦ Fair Value Gaps (FVG): Imbalanced price zones where a 3-candle gap exists
    → Price tends to return to fill FVGs before continuing the trend
    → An unfilled FVG in the path of a corrective wave = magnetic target
  ✦ Previous Swing Highs/Lows (PSH/PSL): Isolated pivot points
    → Institutional orders often cluster at these levels
    → A sweep of PSH/PSL often marks the TRUE end of a corrective wave
  ✦ Volume Clusters (VC): Price zones with historically high volume
    → These act as both support and liquidity magnets
    → A corrective wave that avoids a nearby VC is suspicious

  LLA DIAGNOSTIC PROTOCOL:
  Step 1: Before confirming ANY corrective wave as "complete," scan for
          the nearest visible liquidity pool (EQH, EQL, FVG, PSH/PSL, VC)
  Step 2: Measure the distance from the wave's current endpoint to the
          nearest liquidity target
  Step 3: If the distance is < 38.2% of the corrective wave's total range:
          → The wave will LIKELY extend to sweep that liquidity
          → Mark the pattern as "INCOMPLETE — LIQ TARGET PENDING"
  Step 4: If the wave has already swept the liquidity target:
          → Confirm the corrective wave as "COMPLETE — LIQ SWEPT ✅"
  Step 5: Assign a Liquidity Target to the output table for each wave

  LIQUIDITY TARGET TABLE (must accompany every corrective wave):
  ┌──────────────────┬────────────────────────────────────────────────┐
  │ Wave Position    │ Expected Liquidity Behavior                    │
  ├──────────────────┼────────────────────────────────────────────────┤
  │ W2 (correction)  │ Must sweep EQL below W1 origin or PSL nearby  │
  │ W4 (correction)  │ Must sweep liquidity near W1-W2 overlap zone  │
  │ WB (ZigZag)      │ Must engage FVG or EQH/EQL from WA's range    │
  │ WB (Flat)        │ B exceeds A → sweeps liquidity beyond A start │
  │ WE (Triangle)    │ E-wave sweeps remaining liquidity at apex zone │
  │ X-wave           │ Must sweep liquidity from the prior corrective │
  │ Running Flat C   │ C fails to reach A → but MUST have swept liq  │
  │                  │ on the B-wave side first                       │
  └──────────────────┴────────────────────────────────────────────────┘

─────────────────────────────────────────────────────────────────────
STOP-HUNT CONFIRMATION (SHC) PROTOCOL — NEW v11
─────────────────────────────────────────────────────────────────────

  At the END of waves W2, WB, and WE, there MUST be evidence of a
  stop-hunt sweep before the primary motive wave begins. This is the
  market's mechanism for generating the fuel needed for the next impulse.

  STOP-HUNT SIGNATURES:
  ✦ SHC-1: WICK SWEEP — A single candle whose wick exceeds a key level
    (EQH/EQL/PSH/PSL) but closes BACK inside the prior range
    → Classic stop-hunt: triggers stops, immediately reverses
    → HIGHEST CONFIDENCE signal that the corrective wave is DONE
  ✦ SHC-2: FALSE BREAKOUT — Price breaks a key level for 1-3 bars,
    then aggressively reverses
    → Slightly weaker signal than wick sweep but still valid
    → Look for volume spike on the false breakout bar
  ✦ SHC-3: DIVERGENCE SWEEP — Price makes new extreme (new low in W2,
    new high in WB) while momentum (RSI/MACD) DIVERGES
    → The sweep happened but momentum shows exhaustion
    → Combines NeoWave momentum confirmation with liquidity concept
  ✦ SHC-4: GAP FILL SWEEP — A price gap (FVG) is filled exactly,
    then price reverses at the gap boundary
    → The gap was the liquidity target; once filled, purpose is served

  STOP-HUNT VALIDATION CHECKLIST (run at end of W2, WB, WE):
  □ Was a visible liquidity pool (EQH/EQL/FVG/PSH/PSL) swept? ✅/❌
  □ Did the sweep occur with a wick reversal or false breakout? ✅/❌
  □ Did volume spike during the sweep? ✅/❌ (if volume data available)
  □ Did momentum diverge at the sweep point? ✅/❌ (supplementary)
  □ Did price immediately reverse direction after the sweep? ✅/❌

  SCORING:
  → 5/5 checks pass: STOP-HUNT CONFIRMED ✅ — corrective wave is DONE
  → 3-4/5 pass: PROBABLE STOP-HUNT — likely done, monitor for confirmation
  → 1-2/5 pass: NO STOP-HUNT — corrective wave may extend further
  → 0/5 pass: LIQUIDITY NOT ENGAGED — pattern is DEFINITELY incomplete

  LLA INTEGRATION WITH NEOWAVE RULES:
  ✦ LLA does NOT override NeoWave structural rules — it supplements them
  ✦ If NeoWave rules say pattern is complete BUT LLA says liquidity is
    unswept → FLAG as "STRUCTURAL COMPLETE / LIQUIDITY INCOMPLETE ⚠️"
  ✦ If NeoWave rules say pattern is incomplete AND LLA says liquidity
    is also unswept → STRONG CONFIRMATION that more correction is needed
  ✦ If NeoWave rules say pattern is complete AND LLA confirms liquidity
    swept → HIGHEST CONFIDENCE that pattern is truly complete ✅✅

VECTOR VELOCITY FORMULA:
  Velocity = ΔP / ΔT  (Price change per unit of Time)

  Where:
  ΔP = |End Price − Start Price| of the wave (absolute price distance)
  ΔT = Duration of the wave in bars/candles

  This is equivalent to the Wave Speed calculated in Phase 3.5, but now
  with FORMAL ACCELERATION RULES that determine pattern validity.

ACCELERATION RULE (THE v11 VELOCITY LAW):
  ✦ In a valid Trending Impulse with acceleration (x3 type):
    Velocity(W3) MUST be > Velocity(W1)
    AND Velocity(W3) MUST be > Velocity(WC) if comparing to corrective context
  ✦ If Velocity(W3) ≤ Velocity(W1):
    → The count is NOT a valid x3 trending impulse
    → RECLASSIFY: the pattern is either:
      (a) A Terminal Impulse (3-3-3-3-3 where velocity degrades), OR
      (b) A complex corrective pattern (double zigzag, diametric, etc.)
    → This is a MANDATORY reclassification — not optional

  ✦ Similarly for corrective contexts:
    If Wave C or final motive leg is supposed to be impulsive but
    Velocity(C) ≤ Velocity(A):
    → The structure is NOT impulsive C — reclassify as complex correction
    → The supposed "C-wave" may be part of a larger corrective structure

VELOCITY SCORE CALCULATION:
  For each motive wave, compute a Velocity Score (VS):

  VS = Velocity(current wave) / Velocity(reference wave) × 100

  Reference wave selection:
  → For W3: reference = W1 → VS = V(W3)/V(W1) × 100
  → For W5: reference = W3 → VS = V(W5)/V(W3) × 100
  → For WC: reference = WA → VS = V(WC)/V(WA) × 100

  VELOCITY SCORE INTERPRETATION:
  ┌──────────────────┬────────────────────────────────────────────────────┐
  │ VS Range         │ Interpretation                                     │
  ├──────────────────┼────────────────────────────────────────────────────┤
  │ VS > 200%        │ STRONG ACCELERATION — confirms extended wave       │
  │                  │ → x3 impulse highly probable                       │
  │ VS 120%–200%     │ MODERATE ACCELERATION — normal motive character    │
  │                  │ → Standard impulse confirmed                       │
  │ VS 80%–120%      │ NEUTRAL — no significant acceleration              │
  │                  │ → Could be motive or corrective; check other rules │
  │ VS 50%–80%       │ DECELERATION — wave is losing momentum             │
  │                  │ → Terminal signal; or complex correction forming    │
  │ VS < 50%         │ SEVERE DECELERATION — NOT motive character          │
  │                  │ → MUST reclassify as corrective or Terminal         │
  └──────────────────┴────────────────────────────────────────────────────┘

  ✦ Trending x3 vs Terminal: VS(W3/W1) > 120% → Trending; < 80% → Terminal
  ✦ ZigZag C-wave motive vs corrective: VS(C/A) > 100% → motive C confirmed
  ✦ W5 acceleration check: VS(W5/W3) > 120% → x5 extension developing
  ✦ Terminal decay check: VS should DECREASE across W1→W3→W5 in Terminal

ANGULAR VELOCITY (supplementary — for visual confirmation):
  ✦ The ANGLE of each wave on the price chart provides visual velocity data
  ✦ Steeper angle = higher velocity; flatter angle = lower velocity
  ✦ In a valid x3 impulse: W3 angle > W1 angle (visually obvious)
  ✦ In a Terminal: all angles approximately equal or decreasing
  ✦ Angular comparison is supplementary — always use ΔP/ΔT for precision

THE WCI (WAVE CONFIDENCE INDEX) is a composite probability score that
quantifies the reliability of every wave count scenario. It combines
four analysis dimensions with specific weightings.

WCI FORMULA:
  WCI = (Structure Score × 0.30) + (Liquidity Score × 0.25)
      + (Time Score × 0.20) + (Momentum Score × 0.25)

  Maximum possible WCI = 100
  Minimum possible WCI = 0

────────────────────────────────────────────────────────────
WCI COMPONENT 1 — STRUCTURE SCORE (30% weight)
────────────────────────────────────────────────────────────
  Evaluates how well the wave count satisfies NeoWave structural rules.

  SCORING CRITERIA:
  ✦ All 50 elimination tests pass cleanly → 100 pts
  ✦ 1-2 soft violations (guidelines, not rules) → 90 pts
  ✦ 1 soft violation + 1 borderline rule → 80 pts
  ✦ 2-3 soft violations → 70 pts
  ✦ 1 hard rule violation with plausible explanation → 60 pts
  ✦ Multiple hard violations → 40 pts or below
  ✦ Cardinal rule violation (W3 shortest, etc.) → 0 pts

  STRUCTURE SUB-CHECKS:
  □ All Structure Labels (:5/:3/:s3) correctly assigned? [0-20]
  □ Pattern type rules fully satisfied? [0-20]
  □ Alternation between W2/W4 confirmed? [0-15]
  □ Post-tests triggered or pending (not failed)? [0-15]
  □ Channel laws respected? [0-15]
  □ Degree nesting valid? [0-15]
  Total possible: 100 → multiply by 0.30 for WCI contribution

────────────────────────────────────────────────────────────
WCI COMPONENT 2 — LIQUIDITY SCORE (25% weight)
────────────────────────────────────────────────────────────
  Evaluates whether corrective waves have engaged their liquidity targets.

  SCORING CRITERIA:
  ✦ All corrective waves swept identifiable liquidity → 100 pts
  ✦ Most corrective waves swept liquidity, 1 pending → 85 pts
  ✦ Stop-hunt confirmed at W2/WB end → +10 bonus (cap 100)
  ✦ Corrective wave ended near (within 38.2%) an unswept pool → 60 pts
  ✦ No identifiable liquidity engagement at all → 30 pts
  ✦ Pattern "complete" but obvious liquidity unswept → 20 pts

  LIQUIDITY SUB-CHECKS:
  □ W2 swept EQL or PSL? [0-25]
  □ W4/WB swept relevant liquidity? [0-25]
  □ Stop-hunt signature present at corrective ends? [0-25]
  □ FVGs in corrective path filled? [0-25]
  Total possible: 100 → multiply by 0.25 for WCI contribution

────────────────────────────────────────────────────────────
WCI COMPONENT 3 — TIME SCORE (20% weight)
────────────────────────────────────────────────────────────
  Evaluates Fibonacci time ratio compliance.

  SCORING CRITERIA:
  ✦ All time ratios within expected Fibonacci ranges → 100 pts
  ✦ T(W2)/T(W1) within 1.0–3.0 AND T(W4)/T(W3) within 1.0–3.0 → 90 pts
  ✦ One time ratio slightly outside range (within 10% tolerance) → 75 pts
  ✦ One time ratio significantly off → 60 pts
  ✦ Multiple time violations → 40 pts
  ✦ Time hierarchy violated (higher degree < lower degree time) → 20 pts

  TIME SUB-CHECKS:
  □ T(W2)/T(W1) within expected range? [0-25]
  □ T(W4)/T(W3) within expected range? [0-25]
  □ T(W4) < T(W1+W2+W3)? [0-25]
  □ Time hierarchy across degrees valid? [0-25]
  Total possible: 100 → multiply by 0.20 for WCI contribution

────────────────────────────────────────────────────────────
WCI COMPONENT 4 — MOMENTUM SCORE (25% weight)
────────────────────────────────────────────────────────────
  Evaluates velocity, volume, and momentum confirmation.

  SCORING CRITERIA:
  ✦ Velocity Score (VS) confirms pattern type + Volume laws match → 100 pts
  ✦ VS confirms but volume data unavailable → 80 pts
  ✦ VS neutral (80-120%) + volume partially confirms → 70 pts
  ✦ VS shows deceleration where acceleration expected → 50 pts
  ✦ Volume contradicts expected pattern → 40 pts
  ✦ Both VS and volume contradict → 20 pts

  MOMENTUM SUB-CHECKS:
  □ Velocity Score confirms wave type (x1/x3/x5/Terminal)? [0-30]
  □ Volume hierarchy matches expected pattern? [0-25]
  □ Wave speed hierarchy correct (Phase 3.5 rules)? [0-25]
  □ Momentum divergence at W5/WC (if applicable)? [0-20]
  Total possible: 100 → multiply by 0.25 for WCI contribution

────────────────────────────────────────────────────────────
WCI GOLDEN RULE — MANDATORY v11 ENFORCEMENT
────────────────────────────────────────────────────────────

  ★ NO scenario with WCI < 80 may be labeled as "Primary" (S1)
  ★ If the highest-scoring scenario has WCI < 80:
    → Label it "Best Available" instead of "Primary"
    → State explicitly: "No scenario reaches Primary confidence threshold"
    → Reduce position sizing to 50% of normal
    → Recommend waiting for additional data before full commitment
  ★ If ALL scenarios have WCI < 60:
    → Declare "LOW CONFIDENCE ANALYSIS — Insufficient data or conflicting rules"
    → Do NOT provide trade setups
    → Recommend waiting for pattern clarification

  WCI THRESHOLDS:
  ┌──────────────────┬──────────────────────────────────────────────────┐
  │ WCI Range        │ Classification & Action                          │
  ├──────────────────┼──────────────────────────────────────────────────┤
  │ 90–100           │ ★★★ PREMIUM — Full position, high conviction     │
  │ 80–89            │ ★★☆ PRIMARY — Standard position, reliable count  │
  │ 70–79            │ ★☆☆ MODERATE — Reduced position (50%), valid     │
  │ 60–69            │ ☆☆☆ WEAK — Minimal position (25%), proceed       │
  │                  │   with caution                                    │
  │ Below 60         │ ⛔ UNRELIABLE — No trade recommended              │

KELLY CRITERION POSITION SIZING:
  Kelly % = W - (1-W)/R
  Where: W = win rate (historical or estimated from confidence score)
         R = average win / average loss (Risk:Reward ratio)

  Example for NeoWave setups:
  → Confidence 80/100, R:R = 2.5:1, Win Rate estimated 55%:
    Kelly = 0.55 - (0.45/2.5) = 0.55 - 0.18 = 37% → Use HALF-Kelly = 18.5%
  → ALWAYS use Half-Kelly or less for live trading (reduces drawdown)
  → Full Kelly maximizes log growth but causes extreme drawdown in losing runs

PORTFOLIO-LEVEL RISK RULES:
  ✦ No single NeoWave trade > 2% account risk (stop-based)
  ✦ Maximum concurrent correlated positions: 3
  ✦ If 3 positions in same direction and all fail → pause trading (recalibrate)
  ✦ Maximum drawdown threshold: 15% of portfolio → mandatory strategy review
  ✦ After 3 consecutive losses → reduce position size by 50% until recovery

          <div style={{flex:1,minWidth:0}}>

            <div style={{fontSize:9,color:"var(--dm)",marginTop:2}}>{m.target==="premium"?"⭐ Premium":"👥 All"} · {new Date(m.created_at).toLocaleDateString()}</div>
          </div>
          <div onClick={()=>{setEditMsgId(m.id);setEditMsgTitle(m.title);setEditMsgBody(m.body);setEditMsgTarget(m.target||"all")}} style={{cursor:"pointer",color:"var(--B)",padding:4}}>{IC.edit}</div>
          <div onClick={()=>delMsg(m.id)} style={{cursor:"pointer",color:"var(--R)",padding:4}}>{IC.del}</div>
        </div>}
      </div>)}
    </>}
    {editSig&&<SignalEditModal sig={editSig} onClose={()=>setEditSig(null)} onSave={saveSig}/>}
    {editPost&&<PostEditModal post={editPost} onClose={()=>setEditPost(null)} onSave={savePost}/>}
  </div>);
}

/* ─── Support Chat (iOS 26 style) ─── */
function SupportChat({userId,token,onClose}){
  const{t,lang}=useLang();

    try{

      const d=await r.json();

        <div style={{fontSize:15,fontWeight:700}}>Fxscalproom<span style={{color:"var(--R)"}}>.</span> Admin</div>

/* ─── Admin Support Chat View ─── */
function AdminSupportChat({token}){
  const{lang}=useLang();
  const[convos,setConvos]=useState([]);
  const[users,setUsers]=useState({});
  const[selUser,setSelUser]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[txt,setTxt]=useState("");
  const[sending,setSending]=useState(false);
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const scrollToBottom=()=>{setTimeout(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},100)};

  // Load all conversations (grouped by user)
  const loadConvos=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/SupportChats?select=user_id,message,sender,created_at&order=created_at.desc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d)){
        const byUser={};
        d.forEach(m=>{
          if(!byUser[m.user_id]){byUser[m.user_id]={user_id:m.user_id,lastMsg:m.message,lastSender:m.sender,lastTime:m.created_at,count:0,unread:0}}
          byUser[m.user_id].count++;
          if(m.sender==="user"&&!byUser[m.user_id]._seenAdmin)byUser[m.user_id].unread++;
          if(m.sender==="admin")byUser[m.user_id]._seenAdmin=true;
        });
        setConvos(Object.values(byUser).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime)));
      }
      const us=await fetch(`${SB}/rest/v1/Users?select=id,full_name,email,membership`,{headers:H(token)});
      const usData=await us.json();
      if(Array.isArray(usData)){const m={};usData.forEach(u=>m[u.id]=u);setUsers(m)}
    }catch(e){}
    setLoading(false);
  },[token]);

  useEffect(()=>{loadConvos()},[loadConvos]);

  // Load messages for selected user
  const loadMsgs=useCallback(async()=>{
    if(!selUser)return;
    try{
      const r=await fetch(`${SB}/rest/v1/SupportChats?user_id=eq.${selUser}&order=created_at.asc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setMsgs(d);
    }catch(e){}
  },[selUser,token]);

  useEffect(()=>{if(selUser){loadMsgs();const i=setInterval(loadMsgs,4000);return()=>clearInterval(i)}},[selUser,loadMsgs]);
  useEffect(()=>{scrollToBottom()},[msgs.length]);

  const send=async()=>{
    const m=txt.trim();if(!m||!selUser)return;
    setTxt("");setSending(true);
    try{
      await fetch(`${SB}/rest/v1/SupportChats`,{method:"POST",headers:H(token),body:JSON.stringify({user_id:selUser,sender:"admin",message:m})});
      loadMsgs();
    }catch(e){}
    setSending(false);
  };

  const timeSince=(d)=>{const s=Math.floor((new Date()-new Date(d))/1000);if(s<60)return"now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d"};

  if(selUser){
    const u=users[selUser];
    return(<div>
      <div onClick={()=>{setSelUser(null);loadConvos()}} style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,cursor:"pointer",color:"var(--B)",fontSize:13,fontWeight:600}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        {lang==="fa"?"بازگشت":"Back"}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{(u?.full_name||"?")[0].toUpperCase()}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>{u?.full_name||"Unknown"}</div>
          <div style={{fontSize:10,color:"var(--dm)"}}>{u?.email}</div>
        </div>
        {u?.membership==="premium"&&<span style={{fontSize:8,fontWeight:700,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"2px 6px",borderRadius:4,marginLeft:"auto"}}>PRO</span>}
      </div>
      <div style={{background:"var(--bg2)",border:"1px solid var(--brd)",borderRadius:16,padding:12,maxHeight:400,overflowY:"auto",marginBottom:10}}>
        {msgs.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:20,fontSize:12}}>{lang==="fa"?"پیامی نیست":"No messages"}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {msgs.map(m=><div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:m.sender==="user"?"flex-start":"flex-end"}}>
          {m.sender==="user"&&<span style={{fontSize:9,color:"var(--dm)",marginBottom:2}}>{u?.full_name||"User"}</span>}
          {m.sender==="admin"&&<span style={{fontSize:9,color:"var(--B)",marginBottom:2}}>Admin</span>}
          <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:14,fontSize:12,lineHeight:1.5,wordWrap:"break-word",
            background:m.sender==="admin"?"color-mix(in srgb,var(--B) 10%,transparent)":"var(--card)",
            border:`1px solid ${m.sender==="admin"?"color-mix(in srgb,var(--B) 20%,transparent)":"var(--brd)"}`,
            color:"var(--tx)",

          <span style={{fontSize:8,color:"var(--dm)",marginTop:2}}>{formatTime(m.created_at)}</span>
        </div>)}
        <div ref={endRef}/>
        </div>
      </div>
      <div style={{display:"flex",gap:6}}>
        <input className="ip" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();send()}}} placeholder={lang==="fa"?"پاسخ...":"Reply..."} style={{marginBottom:0,flex:1,borderRadius:22}}/>
        <div onClick={send} style={{width:42,height:42,borderRadius:"50%",background:txt.trim()?"var(--B)":"var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",cursor:txt.trim()?"pointer":"default",transition:".2s",flexShrink:0,opacity:sending?.5:1}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </div>
      </div>
    </div>);
  }

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{lang==="fa"?"💬 چت‌های پشتیبانی":"💬 Support Chats"}</div>
    {loading&&<div style={{textAlign:"center",padding:30}}><div className="ptr-spinner"/></div>}
    {!loading&&convos.length===0&&<div style={{textAlign:"center",color:"var(--dm)",padding:"40px 0",fontSize:13}}>{lang==="fa"?"هنوز چتی نیست":"No chats yet"}</div>}
    {convos.map(c=>{
      const u=users[c.user_id];
      return<div key={c.user_id} onClick={()=>setSelUser(c.user_id)} className="cd" style={{padding:12,marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <div style={{position:"relative"}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700}}>{(u?.full_name||"?")[0].toUpperCase()}</div>
          {c.unread>0&&<div style={{position:"absolute",top:-2,right:-2,width:10,height:10,borderRadius:"50%",background:"var(--R)",border:"2px solid var(--card)"}}/>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13,fontWeight:600}}>{u?.full_name||"Unknown"}</span>
            {u?.membership==="premium"&&<span style={{fontSize:7,fontWeight:700,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"1px 4px",borderRadius:3}}>PRO</span>}
          </div>
          <div style={{fontSize:11,color:c.unread>0?"var(--tx)":"var(--dm)",fontWeight:c.unread>0?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>
            {c.lastSender==="admin"&&<span style={{color:"var(--B)"}}>You: </span>}{c.lastMsg}

        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>

          <span style={{fontSize:9,color:"var(--dm)"}}>{c.count} msgs</span>
        </div>
      </div>
    })}
  </div>);
}

/* ─── Giveaway Spin Wheel (Profile) ─── */
function GiveawayWheel({userId,token}){
  const{t,lang}=useLang();
  const[gw,setGw]=useState(null);
  const[entry,setEntry]=useState(null);
  const[spinning,setSpinning]=useState(false);
  const[result,setResult]=useState(null);
  const[angle,setAngle]=useState(0);
  const[showWheel,setShowWheel]=useState(false);
  const[refs,setRefs]=useState(0);

  useEffect(()=>{
    (async()=>{
      try{
        const r=await fetch(`${SB}/rest/v1/giveaways?active=eq.true&select=*&limit=1`,{headers:H(token)});
        const d=await r.json();
        if(Array.isArray(d)&&d.length>0){
          const activeGw=d[0];
          setGw(activeGw);
          try{
            const r2=await fetch(`${SB}/rest/v1/giveawayentries?user_id=eq.${userId}&giveaway_id=eq.${activeGw.id}&select=*&limit=1`,{headers:H(token)});
            const d2=await r2.json();
            if(Array.isArray(d2)&&d2.length>0)setEntry(d2[0]);
          }catch(e){}
        }
      }catch(e){}
      try{
        const r3=await fetch(`${SB}/rest/v1/Referrals?referrer_id=eq.${userId}&select=id`,{headers:H(token)});
        const d3=await r3.json();
        if(Array.isArray(d3))setRefs(d3.length);
      }catch(e){}
    })();
  },[userId,token]);

  if(!gw)return null;
  const prizes=[
    {name:"1 Week Premium",name_fa:"۱ هفته اشتراک رایگان",chance:20,color:"#22c55e"},
    {name:"50% Discount",name_fa:"تخفیف ۵۰٪",chance:30,color:"#f97316"},
    {name:"Try Again",name_fa:"شانس بعدی",chance:50,color:"#94a3b8"}
  ];
  const minRef=gw.min_referrals||3;
  const noRefRequired=gw.no_referral_required||false;
  const canSpin=(noRefRequired||refs>=minRef)&&!entry;
  const alreadySpun=!!entry;
  const endsAt=gw.ends_at?new Date(gw.ends_at):null;
  const expired=endsAt&&endsAt<new Date();
  if(expired)return null;

  const spin=async()=>{
    if(!canSpin||spinning)return;
    setSpinning(true);setShowWheel(true);setAngle(0);setResult(null);
    const total=prizes.reduce((s,p)=>s+(p.chance||1),0);
