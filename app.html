/* ─── Relative Time (multi-language) ─── */
function relativeTime(dateStr,lang){
  if(!dateStr)return"";
  const diff=Date.now()-new Date(dateStr).getTime();
  const sec=Math.floor(diff/1000);
  const min=Math.floor(sec/60);
  const hr=Math.floor(min/60);
  const day=Math.floor(hr/24);
  const wk=Math.floor(day/7);
  const L={
    fa:{now:"همین الان",m:"دقیقه پیش",h:"ساعت پیش",d:"روز پیش",w:"هفته پیش"},
    ar:{now:"الآن",m:"دقيقة مضت",h:"ساعة مضت",d:"يوم مضى",w:"أسبوع مضى"},
    tr:{now:"Az önce",m:"dk önce",h:"sa önce",d:"gün önce",w:"hf önce"},
    ru:{now:"Только что",m:"мин назад",h:"ч назад",d:"дн назад",w:"нед назад"},
    es:{now:"Ahora",m:"min",h:"h",d:"d",w:"sem"},
    en:{now:"Just now",m:"min ago",h:"h ago",d:"d ago",w:"w ago"}
  };
  const t=L[lang]||L.en;
  if(min<1)return t.now;
  if(min<60)return`${min} ${t.m}`;
  if(hr<24)return`${hr} ${t.h}`;
  if(day<7)return`${day} ${t.d}`;
  if(wk<5)return`${wk} ${t.w}`;
  return new Date(dateStr).toLocaleDateString();
}

/* ─── Prices Hook ─── */
function usePrices(){
  const init=()=>({p:"---",c:"0",u:true});
  const loadCache=()=>{try{const c=JSON.parse(localStorage.getItem("fx_prices"));if(c&&c.P)return{P:c.P,ok:true,lastUpdate:c.ts?new Date(c.ts):null}}catch(e){}return null};
  const cached=loadCache();
  const[P,setP]=useState(cached?cached.P:{usd_sell:init(),eur_sell:init(),sekkeh:init(),gold18:init(),tether:init(),rub:init()});
  const[ok,setOk]=useState(cached?true:false);
  const[lastUpdate,setLastUpdate]=useState(cached?cached.lastUpdate:null);
  const prev=useRef({});
  // mkT = already in Toman (Navasan), mkR = in Rial → convert to Toman (TGJU)
  const mkT=(k,v)=>{const n=parseFloat(String(v).replace(/,/g,""))||0;const o=prev.current[k]||n;prev.current[k]=n;return{p:n>0?Number(n).toLocaleString("en"):"---",c:v,u:n>=o}};
  const mkR=(k,v)=>{const n=parseFloat(String(v).replace(/,/g,""))||0;const toman=Math.round(n/10);const o=prev.current[k]||toman;prev.current[k]=toman;return{p:toman>0?Number(toman).toLocaleString("en"):"---",c:v,u:toman>=o}};
  const saveCache=(prices)=>{try{localStorage.setItem("fx_prices",JSON.stringify({P:prices,ts:Date.now()}))}catch(e){}};

  const f=useCallback(async()=>{
    // === Source 1: Navasan (values in TOMAN) ===
    try{
      const r=await fetch("https://api.navasan.tech/latest/?api_key=freeX42Ju2HlAIfOKINfOLWUZBNC1smi&item=usd_sell,18ayar,sekkeh,usdt,eur,rub");
      const d=await r.json();
      if(d&&!d.message&&d.usd_sell){
        const usdVal=parseFloat(String(d.usd_sell?.value).replace(/,/g,""))||0;
        const tetherVal=parseFloat(String(d.usdt?.value||d.usdt_sell?.value||"0").replace(/,/g,""))||0;
        const tetherFinal=(tetherVal>usdVal*0.5)?tetherVal:usdVal;
        const prices={usd_sell:mkT("usd",d.usd_sell?.value),eur_sell:mkT("eur",d.eur?.value||d.eur_sell?.value||"0"),sekkeh:mkT("coin",d.sekkeh?.value||"0"),gold18:mkT("gold",d["18ayar"]?.value||"0"),tether:mkT("tether",String(tetherFinal)),rub:mkT("rub",d.rub?.value||"0")};
        setP(prices);saveCache(prices);setOk(true);setLastUpdate(new Date());return;
      }
    }catch(e){}
    // === Source 2: TGJU (values in RIAL → ÷10) ===
    try{
      const r=await fetch("https://call4.tgju.org/ajax.json");
      const d=await r.json();
      if(d&&d.current){
        const get=(k)=>{try{return d.current[k]?.p?.replace(/,/g,"")||"0"}catch(e){return"0"}};
        const usdRial=parseFloat(get("price_dollar_rl"))||0;
        const tetherRial=parseFloat(get("crypto-tether"))||0;
        const tetherFix=(tetherRial>usdRial*0.5)?String(tetherRial):String(usdRial);
        const prices={usd_sell:mkR("usd",get("price_dollar_rl")),eur_sell:mkR("eur",get("price_eur")),sekkeh:mkR("coin",get("sekee")),gold18:mkR("gold",get("geram18")),tether:mkR("tether",tetherFix),rub:mkR("rub",get("price_rub"))};
        setP(prices);saveCache(prices);setOk(true);setLastUpdate(new Date());return;
      }
    }catch(e){}
    // === Source 3: TGJU v2 endpoint ===
    try{
      const r=await fetch("https://call5.tgju.org/ajax.json");
      const d=await r.json();
      if(d&&d.current){
        const get=(k)=>{try{return d.current[k]?.p?.replace(/,/g,"")||"0"}catch(e){return"0"}};
        const prices={usd_sell:mkR("usd",get("price_dollar_rl")),eur_sell:mkR("eur",get("price_eur")),sekkeh:mkR("coin",get("sekee")),gold18:mkR("gold",get("geram18")),tether:mkR("tether",get("crypto-tether")),rub:mkR("rub",get("price_rub"))};
        setP(prices);saveCache(prices);setOk(true);setLastUpdate(new Date());return;
      }
    }catch(e){}
    // === Source 4: Bonbast unofficial API ===
    try{
      const r=await fetch("https://bonbast.amirhn.com/latest");
      const d=await r.json();
      if(d&&(d.usd_sell||d.usd)){
        const prices={usd_sell:mkT("usd",d.usd_sell||d.usd||"0"),eur_sell:mkT("eur",d.eur_sell||d.eur||"0"),sekkeh:mkT("coin",d.emami||d.coin||"0"),gold18:mkT("gold",d.gold18||d.gol18||"0"),tether:mkT("tether",d.usd_sell||d.usd||"0"),rub:mkT("rub",d.rub||"0")};
        setP(prices);saveCache(prices);setOk(true);setLastUpdate(new Date());return;
      }
    }catch(e){}
    // === Source 5: Accessban API ===
    try{
      const r=await fetch("https://api.accessban.com/v1/market/currency/usd");
      const d=await r.json();
      if(d&&d.data){
        const usdVal=d.data?.value||d.data?.price||"0";
        const prices={usd_sell:mkT("usd",usdVal),eur_sell:init(),sekkeh:init(),gold18:init(),tether:mkT("tether",usdVal),rub:init()};
        setP(prices);saveCache(prices);setOk(true);setLastUpdate(new Date());return;
      }
    }catch(e){}
  },[]);

  useEffect(()=>{f();const i=setInterval(f,60000);return()=>clearInterval(i)},[f]);
  return{P,ok,lastUpdate};
}

/* ─── Market Sessions ─── */
function MarketSessions(){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setNow(new Date()),10000);return()=>clearInterval(i)},[]);
  const utcH=now.getUTCHours(),utcM=now.getUTCMinutes();
  const t=utcH*60+utcM;
  const day=now.getUTCDay();
  const isWeekend=(day===6)||(day===0&&t<22*60)||(day===5&&t>=22*60);
  const sessions=[
    {name:"Sydney",flag:"🇦🇺",open:22*60,close:7*60,color:"#8b5cf6"},
    {name:"Tokyo",flag:"🇯🇵",open:0*60,close:9*60,color:"#f59e0b"},
    {name:"London",flag:"🇬🇧",open:8*60,close:17*60,color:"#3b82f6"},
    {name:"New York",flag:"🇺🇸",open:13*60,close:22*60,color:"#ef4444"},
  ];
  const isOpen=(s)=>{
    if(isWeekend)return false;
    if(s.open<s.close)return t>=s.open&&t<s.close;
    return t>=s.open||t<s.close;
  };
  const getProgress=(s)=>{
    if(!isOpen(s))return 0;
    let dur,elapsed;
    if(s.open<s.close){dur=s.close-s.open;elapsed=t-s.open}
    else{dur=(24*60-s.open)+s.close;elapsed=t>=s.open?t-s.open:(24*60-s.open)+t}
    return Math.max(0,Math.min(100,(elapsed/dur)*100));
  };
  const toLocal=(utcMin)=>{
    const d=new Date();d.setUTCHours(Math.floor(utcMin/60),utcMin%60,0,0);
    return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  };
  const openCount=sessions.filter(isOpen).length;
  return(<div className="cd" style={{marginBottom:12}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
      <span style={{fontSize:13,fontWeight:700}}>{AE.clock} Market Sessions</span>
      <span style={{marginLeft:"auto",fontSize:10,fontWeight:600,color:isWeekend?"var(--R)":openCount>0?"var(--G)":"var(--dm)"}}>{isWeekend?"WEEKEND — CLOSED":openCount+" open"}</span>
    </div>
    {sessions.map((s,i)=>{
      const open=isOpen(s);
      const prog=open?getProgress(s):0;
      return<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<3?10:0}}>
        <span style={{fontSize:14,width:22}}>{s.flag}</span>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:600,color:open?"var(--tx)":"var(--dm)"}}>{s.name}</span>
            <span style={{fontSize:10,fontWeight:600,color:open?"var(--G)":"var(--dm)"}}>{open?"OPEN":"CLOSED"}</span>
          </div>
          <div style={{height:4,borderRadius:2,background:"var(--brd)",overflow:"hidden"}}>
            {open&&<div style={{height:"100%",borderRadius:2,background:s.color,width:`${prog}%`,transition:"width 10s linear"}}/>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
            <span className="m" style={{fontSize:9,color:"var(--dm)"}}>{toLocal(s.open)}</span>
            <span className="m" style={{fontSize:9,color:"var(--dm)"}}>{toLocal(s.close)}</span>
          </div>
        </div>
      </div>
    })}
  </div>);
}

/* ─── Position Size Calculator ─── */
function PositionCalc({lang}){
  const[show,setShow]=useState(false);
  const[bal,setBal]=useState("10000");
  const[risk,setRisk]=useState("1");
  const[entry,setEntry]=useState("");
  const[sl,setSl]=useState("");
  const[pair,setPair]=useState("XAUUSD");
  // contractSize = units per 1 standard lot
  // tickSize = minimum price movement
  // tickValue = $ value of 1 tickSize movement per 1 lot
  const pairs={
    "XAUUSD":{contractSize:100,tickSize:0.01,tickValue:1,label:"Gold"},
    "EURUSD":{contractSize:100000,tickSize:0.00001,tickValue:1,label:"EUR/USD"},
    "GBPUSD":{contractSize:100000,tickSize:0.00001,tickValue:1,label:"GBP/USD"},
    "USDJPY":{contractSize:100000,tickSize:0.001,tickValue:0.67,label:"USD/JPY"},
    "AUDUSD":{contractSize:100000,tickSize:0.00001,tickValue:1,label:"AUD/USD"},
    "BTCUSD":{contractSize:1,tickSize:0.01,tickValue:0.01,label:"BTC/USD"},
    "XAGUSD":{contractSize:5000,tickSize:0.001,tickValue:5,label:"Silver"},
    "USOIL":{contractSize:1000,tickSize:0.01,tickValue:10,label:"Crude Oil"},
  };
  const p=pairs[pair]||pairs["XAUUSD"];
  const riskAmt=parseFloat(bal||0)*parseFloat(risk||0)/100;
  const priceDiff=entry&&sl?Math.abs(parseFloat(entry)-parseFloat(sl)):0;
  // How many ticks in the stop loss distance
  const ticks=priceDiff>0?priceDiff/p.tickSize:0;
  // Risk per 1 lot = ticks * tickValue
  const riskPerLot=ticks*p.tickValue;
  const lots=riskPerLot>0?(riskAmt/riskPerLot).toFixed(2):"0.00";
  // For display: pips in conventional sense
  const pipDisplay=pair==="XAUUSD"?(priceDiff/0.1).toFixed(1):pair.includes("JPY")?(priceDiff/0.01).toFixed(1):(priceDiff/0.0001).toFixed(1);
  const isFa=lang==="fa";

    <div onClick={()=>setShow(!show)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>

    </div>
    {show&&<div style={{marginTop:14}}>
      <div style={{fontSize:10,color:"var(--dm)",marginBottom:4,fontWeight:600}}>{isFa?"جفت ارز":"Pair"}</div>
      <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
        {Object.entries(pairs).map(([k,v])=><div key={k} onClick={()=>setPair(k)} style={{padding:"6px 10px",borderRadius:8,cursor:"pointer",fontSize:10,fontWeight:600,
          background:pair===k?"color-mix(in srgb,var(--R) 10%,transparent)":"transparent",
          border:`1px solid ${pair===k?"color-mix(in srgb,var(--R) 25%,transparent)":"var(--brd)"}`,
          color:pair===k?"var(--R)":"var(--mu)"
        }}>{v.label}</div>)}
      </div>
      <div className="g2" style={{marginBottom:8}}>
        <div>
          <div style={{fontSize:10,color:"var(--dm)",marginBottom:4,fontWeight:600}}>{isFa?"موجودی ($)":"Balance ($)"}</div>
          <input className="ip" type="number" value={bal} onChange={e=>setBal(e.target.value)} style={{marginBottom:0}}/>
        </div>
        <div>
          <div style={{fontSize:10,color:"var(--dm)",marginBottom:4,fontWeight:600}}>{isFa?"ریسک (%)":"Risk (%)"}</div>
          <input className="ip" type="number" value={risk} onChange={e=>setRisk(e.target.value)} style={{marginBottom:0}}/>
        </div>
      </div>
      <div className="g2" style={{marginBottom:8}}>
        <div>
          <div style={{fontSize:10,color:"var(--dm)",marginBottom:4,fontWeight:600}}>{isFa?"قیمت ورود":"Entry Price"}</div>
          <input className="ip" type="number" value={entry} onChange={e=>setEntry(e.target.value)} style={{marginBottom:0}} placeholder={pair==="XAUUSD"?"e.g. 3050":"e.g. 1.0850"}/>
        </div>
        <div>
          <div style={{fontSize:10,color:"var(--dm)",marginBottom:4,fontWeight:600}}>{isFa?"حد ضرر":"Stop Loss"}</div>
          <input className="ip" type="number" value={sl} onChange={e=>setSl(e.target.value)} style={{marginBottom:0}} placeholder={pair==="XAUUSD"?"e.g. 3040":"e.g. 1.0800"}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>

          <div className="m" style={{fontSize:15,fontWeight:600,color:"var(--R)"}}>${riskAmt.toFixed(0)}</div>
        </div>
        <div style={{background:"var(--bg)",border:"1px solid var(--brd)",borderRadius:10,padding:12,textAlign:"center"}}>
          <div style={{fontSize:9,color:"var(--dm)",marginBottom:4,fontWeight:500}}>{isFa?"پیپ":"Pips"}</div>
          <div className="m" style={{fontSize:15,fontWeight:600,color:"var(--Y)"}}>{priceDiff>0?pipDisplay:"—"}</div>

/* ─── Market Sentiment (Fear & Greed) ─── */
function MarketSentiment(){
  const[vix,setVix]=useState(null);
  const[show,setShow]=useState(false);
  const[label,setLabel]=useState("");
  useEffect(()=>{
    // Fetch real Fear & Greed Index
    fetch("https://api.alternative.me/fng/?limit=1").then(r=>r.json()).then(d=>{
      if(d&&d.data&&d.data[0]){
        const val=parseInt(d.data[0].value);
        setVix(val);
        setLabel(d.data[0].value_classification||"");
      }
    }).catch(()=>{
      // Fallback: use a more realistic calculation based on date + time
      const now=new Date();
      const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/(1000*60*60*24));
      const seed=dayOfYear*7+now.getFullYear();
      const base=35+Math.abs(Math.sin(seed*0.1))*50;
      const hourShift=Math.sin(now.getHours()*0.3)*8;
      setVix(Math.round(Math.max(5,Math.min(95,base+hourShift))));
    });
  },[]);
  if(vix===null)return null;
  const displayLabel=label||(vix<=20?"Extreme Fear":vix<=40?"Fear":vix<=60?"Neutral":vix<=80?"Greed":"Extreme Greed");
  const color=vix<=20?"#ef4444":vix<=40?"#f97316":vix<=60?"#eab308":vix<=80?"#22c55e":"#16a34a";

      </div>

          <path d="M 20 90 A 80 80 0 0 1 180 90" fill="none" stroke="url(#sg)" strokeWidth="12" strokeLinecap="round" strokeDasharray={`${(vix/100)*251.2} 251.2`}/>
          {(()=>{const angle=-180+(vix/100)*180;const rad=angle*Math.PI/180;const nx=100+65*Math.cos(rad);const ny=90+65*Math.sin(rad);return<circle cx={nx} cy={ny} r="6" fill={color} stroke="var(--bg)" strokeWidth="2"/>})()}

function StoryViewer({stories,onClose,onSeen,userId,token}){
  const[idx,setIdx]=useState(0);
  const[paused,setPaused]=useState(false);
  const[liked,setLiked]=useState({});
  const[likeAnim,setLikeAnim]=useState(false);
  const touchStart=useRef({x:0,y:0,time:0});
  const timerRef=useRef(null);
  const holdTimer=useRef(null);
  const isHolding=useRef(false);
  const viewedIds=useRef(new Set());
  const s=stories[idx];
  const dur=s?.duration||6;

  // Load existing likes
  useEffect(()=>{
    if(!userId||!token)return;
    fetch(`${SB}/rest/v1/StoryViews?user_id=eq.${userId}&liked=eq.true&select=story_id`,{headers:H(token)}).then(r=>r.json()).then(d=>{
      if(Array.isArray(d)){const m={};d.forEach(v=>{m[v.story_id]=true});setLiked(m)}
    }).catch(()=>{});
  },[userId,token]);

  // Track view per story
  useEffect(()=>{
    if(!s||!userId||!token||viewedIds.current.has(s.id))return;
    viewedIds.current.add(s.id);
    fetch(`${SB}/rest/v1/StoryViews?story_id=eq.${s.id}&user_id=eq.${userId}`,{headers:H(token)}).then(r=>r.json()).then(d=>{
      if(!Array.isArray(d)||!d.length){
        fetch(`${SB}/rest/v1/StoryViews`,{method:"POST",headers:{...H(token),Prefer:"return=minimal"},body:JSON.stringify({story_id:s.id,user_id:userId,liked:false})}).catch(()=>{});
      }
    }).catch(()=>{});
  },[s?.id,userId,token]);

  useEffect(()=>{if(onSeen)onSeen()},[]);
  useEffect(()=>{
    if(paused)return;
    timerRef.current=setTimeout(()=>{
      if(idx<stories.length-1)setIdx(idx+1);
      else onClose();
    },dur*1000);
    return()=>clearTimeout(timerRef.current);
  },[idx,paused,stories.length,dur]);

  const goNext=()=>{clearTimeout(timerRef.current);if(idx<stories.length-1)setIdx(idx+1);else onClose()};
  const goPrev=()=>{clearTimeout(timerRef.current);if(idx>0)setIdx(idx-1);else setIdx(0)};

  const toggleLike=(e)=>{
    e.stopPropagation();
    if(!s||!userId||!token)return;
    const isLiked=!liked[s.id];
    setLiked(prev=>({...prev,[s.id]:isLiked}));
    if(isLiked){setLikeAnim(true);setTimeout(()=>setLikeAnim(false),600)}
    clearTimeout(timerRef.current);setPaused(true);
    fetch(`${SB}/rest/v1/StoryViews?story_id=eq.${s.id}&user_id=eq.${userId}&select=id`,{headers:H(token)}).then(r=>r.json()).then(d=>{
      if(Array.isArray(d)&&d.length>0){
        fetch(`${SB}/rest/v1/StoryViews?id=eq.${d[0].id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({liked:isLiked})}).catch(()=>{});
      }else{
        fetch(`${SB}/rest/v1/StoryViews`,{method:"POST",headers:H(token),body:JSON.stringify({story_id:s.id,user_id:userId,liked:isLiked})}).catch(()=>{});
      }
    }).catch(()=>{});
    setTimeout(()=>setPaused(false),100);
  };

  const handleTouchStart=(e)=>{
    e.preventDefault();
    touchStart.current={x:e.touches[0].clientX,y:e.touches[0].clientY,time:Date.now()};
    isHolding.current=false;
    holdTimer.current=setTimeout(()=>{isHolding.current=true;setPaused(true);clearTimeout(timerRef.current)},200);
  };
  const handleTouchMove=(e)=>{
    e.preventDefault();
    const dx=Math.abs(e.touches[0].clientX-touchStart.current.x);
    const dy=Math.abs(e.touches[0].clientY-touchStart.current.y);
    if(dx>10||dy>10)clearTimeout(holdTimer.current);
  };
  const handleTouchEnd=(e)=>{
    e.preventDefault();
    clearTimeout(holdTimer.current);
    if(isHolding.current){isHolding.current=false;setPaused(false);return}
    const dx=e.changedTouches[0].clientX-touchStart.current.x;
    const dy=e.changedTouches[0].clientY-touchStart.current.y;
    const dt=Date.now()-touchStart.current.time;
    if(dy>100&&Math.abs(dx)<80){onClose();return}
    if(dt<300&&Math.abs(dx)<30&&Math.abs(dy)<30){const w=window.innerWidth;const x=e.changedTouches[0].clientX;if(x<w*0.3)goPrev();else goNext();return}
    if(Math.abs(dx)>50){if(dx<0)goNext();else goPrev()}
  };
  const handleClick=(e)=>{const w=window.innerWidth;const x=e.clientX;if(x<w*0.3)goPrev();else goNext()};

  const timeAgo=(d)=>{const diff=Date.now()-new Date(d).getTime();const mins=Math.floor(diff/60000);if(mins<1)return"Just now";if(mins<60)return`${mins}m`;const hrs=Math.floor(mins/60);if(hrs<24)return`${hrs}h`;return`${Math.floor(hrs/24)}d`};
  const isLiked=liked[s?.id];

  return(
    <div className="story-viewer" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onClick={handleClick}>
      <div className="story-progress-bar">
        {stories.map((_,i)=><div key={i} className="story-progress-seg"><div className={`fill ${i<idx?"done":i===idx&&!paused?"active":""}`} style={i===idx?{"--dur":`${dur}s`}:{}}/></div>)}
      </div>

      <div onTouchStart={(e)=>e.stopPropagation()} onTouchEnd={(e)=>e.stopPropagation()} onClick={(e)=>e.stopPropagation()} style={{position:"absolute",top:22,left:0,right:0,zIndex:10,display:"flex",alignItems:"center",gap:10,padding:"8px 14px",animation:"storySlideUp .3s ease"}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.12)",border:"2px solid rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:9,fontWeight:800,color:"#fff",lineHeight:1}}>Fx<span style={{color:"#FF4136"}}>.</span></span>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Fxscalproom<span style={{color:"#FF4136"}}>.</span></div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>{s?.created_at?timeAgo(s.created_at):""}</div>
        </div>
        {s?.target==="premium"&&<span style={{fontSize:8,fontWeight:700,color:"#ffd60a",background:"rgba(255,215,0,.15)",padding:"3px 8px",borderRadius:6}}>VIP</span>}
        <div onClick={(e)=>{e.stopPropagation();onClose()}} style={{cursor:"pointer",padding:4}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>

      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
        {s?.image_url&&<img key={s.id} src={s.image_url} style={{animation:"storyFadeIn .2s ease"}} alt=""/>}
        {likeAnim&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%) scale(0)",fontSize:80,animation:"storyLikePop .6s ease forwards",pointerEvents:"none",zIndex:20}}>❤️</div>}
      </div>

      <div onTouchStart={(e)=>e.stopPropagation()} onTouchEnd={(e)=>e.stopPropagation()} onTouchMove={(e)=>e.stopPropagation()} onClick={(e)=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,padding:"50px 16px calc(env(safe-area-inset-bottom,12px) + 16px)",background:"linear-gradient(transparent,rgba(0,0,0,.65))",zIndex:10,display:"flex",alignItems:"flex-end",gap:12,touchAction:"auto"}}>
        <div style={{flex:1}}>
          {s?.caption&&<div style={{fontSize:14,fontWeight:600,color:"#fff",lineHeight:1.6,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>{s.caption}</div>}
        </div>

          <svg width="28" height="28" viewBox="0 0 24 24" fill={isLiked?"#FF4136":"none"} stroke={isLiked?"#FF4136":"#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transition:"transform .15s",transform:isLiked?"scale(1.15)":"scale(1)"}}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>

/* ─── Admin Story Manager ─── */
function AdminStoryManager({token}){
  const{lang}=useLang();
  const[stories,setStories]=useState([]);
  const[img,setImg]=useState(null);
  const[pv,setPv]=useState(null);
  const[caption,setCaption]=useState("");
  const[target,setTarget]=useState("all");
  const[durHrs,setDurHrs]=useState("24");
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState("");

  const loadStories=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/Stories?order=created_at.desc`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d))setStories(d);
    }catch(e){}
  },[token]);

  useEffect(()=>{loadStories()},[loadStories]);

  const publish=async()=>{
    if(!img){setMsg(lang==="fa"?"عکس انتخاب کنید":"Select an image");return}
    setLoading(true);setMsg("");
    try{
      const imgUrl=await api.img(img,token);
      if(!imgUrl){setMsg(lang==="fa"?"آپلود ناموفق":"Upload failed");setLoading(false);return}
      const expiresAt=new Date();
      expiresAt.setHours(expiresAt.getHours()+parseInt(durHrs||24));
      await api.add("Stories",{
        image_url:imgUrl,
        caption:caption||null,
        target:target,
        expires_at:expiresAt.toISOString(),
        duration:6
      },token);
      setMsg(lang==="fa"?"استوری منتشر شد!":"Story published!");
      setImg(null);setPv(null);setCaption("");
      loadStories();
    }catch(e){setMsg(e.message)}
    setLoading(false);
  };

  const delStory=async(id)=>{
    if(!confirm(lang==="fa"?"حذف شود؟":"Delete?"))return;
    await api.del("Stories",id,token);
    loadStories();
  };

  const timeLeft=(expiresAt)=>{
    const diff=new Date(expiresAt)-new Date();
    if(diff<=0)return lang==="fa"?"منقضی شده":"Expired";
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    return h>0?`${h}h ${m}m`:`${m}m`;
  };

  return(<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{lang==="fa"?"مدیریت استوری":"Story Manager"}</div>

    <div onClick={()=>document.getElementById("story-fu").click()} style={{border:"1.5px dashed var(--brd2)",borderRadius:14,padding:pv?0:32,textAlign:"center",marginBottom:10,background:"var(--bg2)",cursor:"pointer",overflow:"hidden"}}>

      </div>
      :<div style={{fontSize:13,color:"var(--dm)"}}>{lang==="fa"?"📷 عکس استوری رو انتخاب کنید":"📷 Select story image"}</div>}
    </div>

    <textarea placeholder={lang==="fa"?"کپشن (اختیاری)":"Caption (optional)"} value={caption} onChange={e=>setCaption(e.target.value)} rows={2}/>

    {/* Target */}
    <div style={{fontSize:11,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{lang==="fa"?"نمایش برای:":"Show to:"}</div>
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      {["all","premium"].map(tgt=>
        <div key={tgt} onClick={()=>setTarget(tgt)} style={{flex:1,padding:10,borderRadius:10,textAlign:"center",cursor:"pointer",
          background:target===tgt?(tgt==="all"?"color-mix(in srgb,var(--B) 10%,transparent)":"color-mix(in srgb,var(--R) 10%,transparent)"):"transparent",
          border:`1px solid ${target===tgt?(tgt==="all"?"color-mix(in srgb,var(--B) 25%,transparent)":"color-mix(in srgb,var(--R) 25%,transparent)"):"var(--brd)"}`,

    <div style={{display:"flex",gap:6,marginBottom:14}}>

}

/* ─── Signal Scoreboard ─── */
function SignalScoreboard({signals}){
  const sigs=signals||[];
  const total=sigs.length;
  const tpHit=sigs.filter(s=>s.status==="tp_hit").length;
  const slHit=sigs.filter(s=>s.status==="sl_hit").length;
  const active=sigs.filter(s=>s.status==="active").length;
  const closed=tpHit+slHit;
  const winRate=closed>0?((tpHit/closed)*100).toFixed(0):0;
  let totalPips=0;
  sigs.forEach(s=>{if(s.pnl){const n=parseFloat(s.pnl.replace(/[^0-9.\-+]/g,""));if(!isNaN(n))totalPips+=n}});
  // Build equity curve data from closed signals
  const equityData=useMemo(()=>{
    const closedSigs=sigs.filter(s=>s.status==="tp_hit"||s.status==="sl_hit").sort((a,b)=>new Date(a.closed_at||a.created_at)-new Date(b.closed_at||b.created_at));
    let cumPips=0;const data=[];
    closedSigs.forEach((s,i)=>{
      const n=s.pnl?parseFloat(s.pnl.replace(/[^0-9.\-+]/g,"")):0;
      cumPips+=n;
      const dt=new Date(s.closed_at||s.created_at);
      data.push({pips:cumPips,date:`${dt.getMonth()+1}/${dt.getDate()}`,raw:n,status:s.status});
    });
    return data;
  },[sigs]);
  const maxPips=equityData.length?Math.max(...equityData.map(d=>Math.abs(d.pips)),1):1;
  if(total===0)return null;
  return(<div className="cd" style={{marginBottom:12}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <span style={{fontSize:13,fontWeight:700}}>{AE.trophy} Signal Performance</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
      <div style={{textAlign:"center",padding:10,background:"var(--bg)",borderRadius:10,border:"1px solid var(--brd)"}}>
        <div className="m" style={{fontSize:20,fontWeight:700,color:parseInt(winRate)>=60?"var(--G)":parseInt(winRate)>=40?"var(--Y)":"var(--R)"}}>{winRate}%</div>
        <div style={{fontSize:8,color:"var(--dm)",marginTop:3,fontWeight:600}}>Win Rate</div>
      </div>
      <div style={{textAlign:"center",padding:10,background:"var(--bg)",borderRadius:10,border:"1px solid var(--brd)"}}>
        <div className="m" style={{fontSize:20,fontWeight:700,color:"var(--G)"}}>{tpHit}</div>
        <div style={{fontSize:8,color:"var(--dm)",marginTop:3,fontWeight:600}}>TP Hit</div>
      </div>
      <div style={{textAlign:"center",padding:10,background:"var(--bg)",borderRadius:10,border:"1px solid var(--brd)"}}>
        <div className="m" style={{fontSize:20,fontWeight:700,color:"var(--R)"}}>{slHit}</div>
        <div style={{fontSize:8,color:"var(--dm)",marginTop:3,fontWeight:600}}>SL Hit</div>
      </div>
      <div style={{textAlign:"center",padding:10,background:"var(--bg)",borderRadius:10,border:"1px solid var(--brd)"}}>
        <div className="m" style={{fontSize:20,fontWeight:700,color:"var(--B)"}}>{active}</div>
        <div style={{fontSize:8,color:"var(--dm)",marginTop:3,fontWeight:600}}>Active</div>
      </div>
    </div>
    {totalPips!==0&&<div style={{marginTop:10,textAlign:"center",padding:10,background:totalPips>0?"color-mix(in srgb,var(--G) 5%,var(--bg))":"color-mix(in srgb,var(--R) 5%,var(--bg))",borderRadius:10,border:`1px solid ${totalPips>0?"color-mix(in srgb,var(--G) 15%,transparent)":"color-mix(in srgb,var(--R) 15%,transparent)"}`}}>
      <span style={{fontSize:10,color:"var(--dm)",fontWeight:600}}>Total Pips: </span>
      <span className="m" style={{fontSize:16,fontWeight:700,color:totalPips>0?"var(--G)":"var(--R)"}}>{totalPips>0?"+":""}{totalPips.toLocaleString()}</span>
    </div>}
    <div style={{marginTop:10}}>
      <div style={{height:6,borderRadius:3,background:"var(--brd)",overflow:"hidden",display:"flex"}}>
        <div style={{width:`${closed>0?(tpHit/closed)*100:0}%`,background:"var(--G)",height:"100%",transition:"width .5s"}}/>
        <div style={{width:`${closed>0?(slHit/closed)*100:0}%`,background:"var(--R)",height:"100%",transition:"width .5s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:"var(--dm)"}}>
        <span style={{color:"var(--G)"}}>✓ {tpHit} wins</span>
        <span>{total} total signals</span>
        <span style={{color:"var(--R)"}}>✗ {slHit} losses</span>
      </div>
    </div>
  </div>);
}

/* ─── Theme Hook ─── */
function useTheme(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("fxtheme")==="dark"}catch(e){return false}});
  useEffect(()=>{
    const t=dark?"dark":"liquid";
    document.documentElement.setAttribute("data-theme",t);
    try{localStorage.setItem("fxtheme",t)}catch(e){}
    const c=dark?"#050507":"#f5f5f7";
    document.querySelectorAll('meta[name="theme-color"]').forEach(m=>m.remove());
    const meta=document.createElement("meta");
    meta.name="theme-color";meta.content=c;
    document.head.appendChild(meta);
  },[dark]);
  const toggle=()=>{
    const next=!dark;
    setDark(next);
    try{localStorage.setItem("fxtheme",next?"dark":"liquid")}catch(e){}
    // iOS PWA: status bar only reads theme-color on load, so reload
    const isStandalone=window.navigator.standalone||window.matchMedia("(display-mode: standalone)").matches;
    if(isStandalone){setTimeout(()=>window.location.reload(),300)}
  };
  return{dark,toggle};
}

    try{await fetch(`${SB}/rest/v1/push_subscriptions`,{method:'POST',headers:{apikey:SK,Authorization:`Bearer ${tk}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify({user_id:uid,endpoint:j.endpoint,p256dh:j.keys.p256dh,auth_key:j.keys.auth,sub_json:JSON.stringify(j)})})}catch(e){console.error('Save push sub error:',e)}
  };

  // Enable push notifications
  const enable=async()=>{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){console.log('Push not supported');return false}
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){console.log('Permission denied');return false}
      const reg=await navigator.serviceWorker.ready;
      let s=await reg.pushManager.getSubscription();
      if(!s){s=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToArr(VAPID_PUBLIC)})}
      setSub(s);setEnabled(true);
      if(userId&&token)await saveSub(s,userId,token);
      return true;
    }catch(e){console.error('Push subscribe error:',e);return false}
  };

  // Re-save when user logs in
  useEffect(()=>{if(sub&&userId&&token)saveSub(sub,userId,token)},[userId,token]);

  // Local notification fallback
  const notify=(title,body)=>{if(enabled&&Notification.permission==='granted')try{new Notification(title,{body,icon:'icon-192.png'})}catch(e){}};

  // Send push to all subscribers (admin only)
  const sendPushToAll=async(title,body,adminTk,target)=>{
    if(target==='none')return;
    try{
      let url=`${SB}/rest/v1/push_subscriptions?select=sub_json,user_id`;
      if(target==='premium'){
        const ur=await fetch(`${SB}/rest/v1/Users?membership=eq.premium&select=id`,{headers:H(adminTk)});
        const pu=await ur.json();
        if(Array.isArray(pu)&&pu.length>0){url+=`&user_id=in.(${pu.map(u=>u.id).join(',')})`}else return;
      }
      const r=await fetch(url,{headers:H(adminTk)});
      const subs=await r.json();
      if(!Array.isArray(subs)||!subs.length){console.log('No push subs found');return}
      const payload=subs.map(s=>{try{return JSON.parse(s.sub_json)}catch(e){return null}}).filter(Boolean);
      console.log('Sending push to',payload.length,'subscribers');
      // Only send title + teaser, not full content
      const teaser=title.length>40?title.slice(0,40)+"...":title;
      const res=await fetch(`${SB}/functions/v1/send-push`,{method:'POST',headers:{Authorization:`Bearer ${adminTk}`,'Content-Type':'application/json',apikey:SK},body:JSON.stringify({title:"Fxscalproom",body:"📢 "+teaser+" — Open app to view",subscriptions:payload})});
      const result=await res.json();
      console.log('Push result:',result);
    }catch(e){console.error('sendPushToAll error:',e)}
  };

  return{enabled,enable,notify,sendPushToAll};
}

/* ─── Pull to Refresh ─── */
function usePullToRefresh(onRefresh){
  const[pulling,setPulling]=useState(false);
  const[refreshing,setRefreshing]=useState(false);
  const startY=useRef(0);const el=useRef(null);
  const onTouchStart=useCallback(e=>{if(window.scrollY<=0)startY.current=e.touches[0].clientY},[]);
  const onTouchMove=useCallback(e=>{if(startY.current>0&&!refreshing){const dy=e.touches[0].clientY-startY.current;if(dy>60&&window.scrollY<=0)setPulling(true)}},[refreshing]);
  const onTouchEnd=useCallback(async()=>{if(pulling&&!refreshing){setRefreshing(true);setPulling(false);await onRefresh();setRefreshing(false)}startY.current=0;setPulling(false)},[pulling,refreshing,onRefresh]);
  useEffect(()=>{const d=document;d.addEventListener("touchstart",onTouchStart,{passive:true});d.addEventListener("touchmove",onTouchMove,{passive:true});d.addEventListener("touchend",onTouchEnd);return()=>{d.removeEventListener("touchstart",onTouchStart);d.removeEventListener("touchmove",onTouchMove);d.removeEventListener("touchend",onTouchEnd)}},[onTouchStart,onTouchMove,onTouchEnd]);
  const PTR=()=>(<div className={`ptr${pulling||refreshing?" active":""}`}>{refreshing?<div className="ptr-spinner"/>:<div style={{padding:"12px 0",fontSize:11,color:"var(--dm)",fontWeight:600}}>↓ Pull to refresh</div>}</div>);
  return{PTR,refreshing};
}

/* ─── Device Fingerprint ─── */
function getDeviceFingerprint(){
  const c=document.createElement("canvas");const ctx=c.getContext("2d");
  ctx.textBaseline="top";ctx.font="14px Arial";ctx.fillText("fp",2,2);
  const cv=c.toDataURL();
  const d=[
    navigator.language||"",
    screen.width+"x"+screen.height,
    screen.colorDepth||"",
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency||"",
    navigator.platform||"",
    cv.slice(-50),
    (navigator.deviceMemory||""),
  ].join("|");
  let h=0;for(let i=0;i<d.length;i++){h=((h<<5)-h)+d.charCodeAt(i);h|=0}
  return"DF"+Math.abs(h).toString(36).toUpperCase();
}

/* ─── Activity Tracker (logs daily login) ─── */
function useActivityTracker(userId,token){
  useEffect(()=>{
    if(!userId||!token)return;
    // Update last_seen immediately and every 30 seconds
    const updateLastSeen=()=>{
      fetch(`${SB}/rest/v1/Users?id=eq.${userId}`,{method:"PATCH",headers:H(token),body:JSON.stringify({last_seen:new Date().toISOString()})}).catch(()=>{});
    };
    updateLastSeen();
    const lsInterval=setInterval(updateLastSeen,30000);

    const today=new Date().toISOString().slice(0,10);
    const key="fx_last_activity";
    const alreadyLogged=(() => {try{return localStorage.getItem(key)===today}catch(e){return false}})();
    if(!alreadyLogged){
      try{localStorage.setItem(key,today)}catch(e){}
      // Log daily activity
      fetch(`${SB}/rest/v1/ActivityLog`,{method:"POST",headers:H(token),body:JSON.stringify({user_id:userId,login_date:today})}).catch(()=>{});
      // Save fingerprint
      const fp=getDeviceFingerprint();
      fetch(`${SB}/rest/v1/DeviceFingerprints`,{method:"POST",headers:{...H(token),Prefer:"return=minimal"},body:JSON.stringify({user_id:userId,fingerprint:fp})}).catch(()=>{});
      // Check if this user was reward-referred & update active_days
      const updateMyRef=async()=>{
        try{
          const myRef=await fetch(`${SB}/rest/v1/RewardReferrals?referred_id=eq.${userId}&select=id,active_days,verified`,{headers:H(token)});
          const d=await myRef.json();
          if(Array.isArray(d)&&d[0]&&!d[0].verified){
            const actR=await fetch(`${SB}/rest/v1/ActivityLog?user_id=eq.${userId}&select=login_date`,{headers:H(token)});
            const actData=await actR.json();
            const days=Array.isArray(actData)?actData.length:0;
            const updates={active_days:days};
            if(days>=3)updates.verified=true;
            await fetch(`${SB}/rest/v1/RewardReferrals?id=eq.${d[0].id}`,{method:"PATCH",headers:H(token),body:JSON.stringify(updates)});
          }
        }catch(e){}
      };
      updateMyRef();
    }
    return()=>clearInterval(lsInterval);
  },[userId,token]);
}

    const t_=TIERS.find(x=>x.tier===tier);
    if(!t_||stats.verified<t_.refs)return;
    if(claims.find(c=>c.tier===tier))return;
    setClaimLoading(true);
    try{
      await fetch(`${SB}/rest/v1/RewardClaims`,{method:"POST",headers:H(token),body:JSON.stringify({
        user_id:userId,tier,amount:t_.amount,required_refs:t_.refs,verified_refs:stats.verified,status:"pending"
      })});
      const cl=await fetch(`${SB}/rest/v1/RewardClaims?user_id=eq.${userId}&select=*&order=tier.asc`,{headers:H(token)});
      const clData=await cl.json();
      if(Array.isArray(clData))setClaims(clData);
    }catch(e){}
    setClaimLoading(false);
  };

  const statusColor=(s)=>s==="paid"?"var(--G)":s==="approved"?"var(--B)":s==="rejected"?"var(--R)":"var(--Y)";
  const statusLabel=(s)=>({pending:lang==="fa"?"در انتظار بررسی":"Pending",approved:lang==="fa"?"تأیید شده":"Approved",paid:lang==="fa"?"پرداخت شده":"Paid",rejected:lang==="fa"?"رد شده":"Rejected"}[s]||s);

  return(<div className="cd" style={{marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:20}}>{AE.money}</span>
      <div>
        <div style={{fontSize:14,fontWeight:700}}>{lang==="fa"?"جوایز نقدی":"Cash Rewards"}</div>
        <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{lang==="fa"?"دوستات رو دعوت کن و دلار بگیر!":"Invite friends & earn cash!"}</div>
      </div>
    </div>

    {/* Tiers */}
    <div style={{display:"flex",gap:6,marginBottom:14}}>
      {TIERS.map(tr=>{
        const claim=claims.find(c=>c.tier===tr.tier);
        const reached=stats.verified>=tr.refs;
        const pct=Math.min(100,(stats.verified/tr.refs)*100);
        return<div key={tr.tier} style={{flex:1,background:"var(--bg)",border:`1px solid ${reached?"color-mix(in srgb,var(--G) 30%,transparent)":"var(--brd)"}`,borderRadius:12,padding:10,textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:0,left:0,width:`${pct}%`,height:3,background:reached?"var(--G)":"var(--R)",borderRadius:2,transition:"width .5s"}}/>
          <div style={{fontSize:16,marginBottom:4}}>{tr.emoji}</div>
          <div className="m" style={{fontSize:16,fontWeight:700,color:reached?"var(--G)":"var(--tx)"}}>${tr.amount}</div>
          <div style={{fontSize:9,color:"var(--dm)",marginTop:2}}>{stats.verified}/{tr.refs} {lang==="fa"?"نفر":"refs"}</div>
          {claim?<div style={{fontSize:8,fontWeight:700,color:statusColor(claim.status),marginTop:6,padding:"2px 6px",borderRadius:4,background:`color-mix(in srgb,${statusColor(claim.status)} 10%,transparent)`,display:"inline-block"}}>{statusLabel(claim.status)}</div>
          :reached?<div onClick={()=>claimReward(tr.tier)} style={{fontSize:9,fontWeight:700,color:"#fff",marginTop:6,padding:"4px 8px",borderRadius:6,background:"var(--G)",cursor:"pointer",opacity:claimLoading?.5:1}}>{lang==="fa"?"درخواست جایزه":"Claim"}</div>
          :null}
        </div>
      })}
    </div>

    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:14}}>
      {[
        {l:lang==="fa"?"کل":"Total",v:stats.total,c:"var(--tx)"},
        {l:lang==="fa"?"تأیید":"Verified",v:stats.verified,c:"var(--G)"},
        {l:lang==="fa"?"در انتظار":"Pending",v:stats.pending,c:"var(--Y)"},
        {l:lang==="fa"?"مشکوک":"Flagged",v:stats.flagged,c:"var(--R)"},
      ].map((s,i)=><div key={i} style={{background:"var(--bg)",borderRadius:8,padding:8,textAlign:"center",border:"1px solid var(--brd)"}}>
        <div className="m" style={{fontSize:14,fontWeight:700,color:s.c}}>{s.v}</div>
        <div style={{fontSize:8,color:"var(--dm)",fontWeight:600,marginTop:2}}>{s.l}</div>
      </div>)}
    </div>

    {/* Reward Code */}
    <div style={{background:"var(--bg)",border:"1px solid var(--brd)",borderRadius:12,padding:14,marginBottom:10}}>
      <div style={{fontSize:10,color:"var(--dm)",fontWeight:600,marginBottom:8}}>{lang==="fa"?"کد جایزه شما":"Your Reward Code"}</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div className="m" style={{flex:1,fontSize:18,fontWeight:700,letterSpacing:2,color:"var(--B)",textAlign:"center"}}>{rewardCode}</div>
        <div onClick={copyCode} style={{padding:"8px 14px",borderRadius:8,background:"color-mix(in srgb,var(--B) 10%,transparent)",border:"1px solid color-mix(in srgb,var(--B) 20%,transparent)",cursor:"pointer",fontSize:11,fontWeight:600,color:"var(--B)"}}>{copied?(t.copied||"Copied!"):"Copy"}</div>
      </div>
    </div>

    <button className="bt" style={{background:"var(--B)",marginBottom:10}} onClick={shareCode}>{lang==="fa"?"اشتراک‌گذاری کد جایزه":"Share Reward Code"}</button>

    {/* Apply Code */}
    {!alreadyReferred?<div style={{display:"flex",gap:6}}>
      <input className="ip" placeholder={lang==="fa"?"کد جایزه دارید؟":"Have a reward code?"} value={inputCode} onChange={e=>setInputCode(e.target.value)} style={{marginBottom:0,flex:1}}/>
      <button className="bt" style={{background:"var(--G)",width:"auto",padding:"12px 18px",opacity:loading?.6:1}} onClick={applyRewardCode} disabled={loading}>{loading?"...":(t.applyCode||"Apply")}</button>
    </div>:<div style={{padding:10,borderRadius:10,background:"color-mix(in srgb,var(--G) 6%,transparent)",border:"1px solid color-mix(in srgb,var(--G) 15%,transparent)",textAlign:"center"}}>
      <span style={{fontSize:12,fontWeight:600,color:"var(--G)"}}>✓ {lang==="fa"?"کد جایزه اعمال شده":"Reward code applied"}</span>
    </div>}
    {msg&&<div style={{marginTop:8,fontSize:12,fontWeight:600,color:msg.includes("!")?"var(--G)":"var(--R)",textAlign:"center"}}>{msg}</div>}
  </div>);
}

/* ─── App Settings Hook (key-value from AppSettings table) ─── */
function useAppSetting(key,token){
  const[val,setVal]=useState(null);
  const[loading,setLoading]=useState(true);
  const load=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/AppSettings?key=eq.${key}&limit=1`,{headers:H(token||SK)});
      const d=await r.json();
      if(Array.isArray(d)&&d[0]){setVal(d[0].value)}else{setVal(null)}
    }catch(e){}
    setLoading(false);
  },[key,token]);
  useEffect(()=>{load()},[load]);
  const update=async(newVal)=>{
    try{
      // Try update first
      const r=await fetch(`${SB}/rest/v1/AppSettings?key=eq.${key}`,{headers:H(token)});
      const d=await r.json();
      if(Array.isArray(d)&&d[0]){
        await fetch(`${SB}/rest/v1/AppSettings?key=eq.${key}`,{method:"PATCH",headers:H(token),body:JSON.stringify({value:newVal})});
      }else{
        await fetch(`${SB}/rest/v1/AppSettings`,{method:"POST",headers:H(token),body:JSON.stringify({key,value:newVal})});
      }
      setVal(newVal);
    }catch(e){}
  };
  return{val,loading,update,reload:load};
}

function AdminRewards({token}){
  const{lang}=useLang();
  const[claims,setClaims]=useState([]);
  const[users,setUsers]=useState({});
  const[rewardRefs,setRewardRefs]=useState({});
  const[flaggedList,setFlaggedList]=useState([]);
  const[tab,setTab]=useState("claims");
  const[note,setNote]=useState("");
  const[editId,setEditId]=useState(null);

  useEffect(()=>{
    load();
  },[token]);

  const load=async()=>{
    try{
      // Load all claims
      const cl=await fetch(`${SB}/rest/v1/RewardClaims?select=*&order=created_at.desc`,{headers:H(token)});
      const clData=await cl.json();
      if(Array.isArray(clData))setClaims(clData);
      // Load users for name lookup
      const us=await fetch(`${SB}/rest/v1/Users?select=id,full_name,email,reward_code`,{headers:H(token)});
      const usData=await us.json();
      if(Array.isArray(usData)){const m={};usData.forEach(u=>m[u.id]=u);setUsers(m)}
      // Load reward referral counts per user
      const rr=await fetch(`${SB}/rest/v1/RewardReferrals?select=referrer_id,verified,flagged`,{headers:H(token)});
      const rrData=await rr.json();
      if(Array.isArray(rrData)){
        const counts={};
        rrData.forEach(r=>{
          if(!counts[r.referrer_id])counts[r.referrer_id]={total:0,verified:0,flagged:0};
          counts[r.referrer_id].total++;
          if(r.verified)counts[r.referrer_id].verified++;
          if(r.flagged)counts[r.referrer_id].flagged++;
        });
        setRewardRefs(counts);
      }
      // Load flagged referrals
      const fl=await fetch(`${SB}/rest/v1/RewardReferrals?flagged=eq.true&select=*&order=created_at.desc`,{headers:H(token)});
      const flData=await fl.json();
      if(Array.isArray(flData))setFlaggedList(flData);
    }catch(e){}
  };

  const updateClaim=async(id,status)=>{
    await fetch(`${SB}/rest/v1/RewardClaims?id=eq.${id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({status,admin_note:note||null,reviewed_at:new Date().toISOString()})});
    setEditId(null);setNote("");load();
  };

  const verifyRef=async(id,verified)=>{
    await fetch(`${SB}/rest/v1/RewardReferrals?id=eq.${id}`,{method:"PATCH",headers:H(token),body:JSON.stringify({verified,flagged:!verified})});
    load();
  };

  const statusColor=(s)=>s==="paid"?"var(--G)":s==="approved"?"var(--B)":s==="rejected"?"var(--R)":"var(--Y)";
  const{val:rewardsEnabled,update:setRewardsEnabled}=useAppSetting("rewards_enabled",token);
  const isEnabled=rewardsEnabled==="true";

  return(<div>
    {/* Enable/Disable Toggle */}
    <div onClick={()=>setRewardsEnabled(isEnabled?"false":"true")} className="cd" style={{padding:14,marginBottom:14,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:isEnabled?"color-mix(in srgb,var(--G) 25%,transparent)":"var(--brd)",background:isEnabled?"color-mix(in srgb,var(--G) 3%,transparent)":"var(--card)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>{AE.money}</span>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>{lang==="fa"?"جوایز نقدی":"Cash Rewards"}</div>
          <div style={{fontSize:10,color:"var(--dm)",marginTop:2}}>{isEnabled?(lang==="fa"?"فعال — در پروفایل کاربران نمایش داده میشود":"Active — visible to users in profile"):(lang==="fa"?"غیرفعال — کاربران نمیبینند":"Disabled — hidden from users")}</div>
        </div>
      </div>
      <div style={{width:44,height:24,borderRadius:12,background:isEnabled?"var(--G)":"var(--brd2)",position:"relative",transition:".2s"}}><div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:2,left:isEnabled?22:2,transition:".2s"}}/></div>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:12}}>
      {["claims","flagged","stats"].map(t=><div key={t} onClick={()=>setTab(t)} style={{flex:1,padding:8,borderRadius:8,textAlign:"center",cursor:"pointer",background:tab===t?"color-mix(in srgb,var(--B) 10%,transparent)":"transparent",border:`1px solid ${tab===t?"color-mix(in srgb,var(--B) 25%,transparent)":"var(--brd)"}`,fontSize:11,fontWeight:600,color:tab===t?"var(--B)":"var(--mu)"}}>{t==="claims"?(lang==="fa"?"درخواست‌ها":"Claims"):t==="flagged"?(lang==="fa"?"مشکوک":"Flagged"):(lang==="fa"?"آمار":"Stats")}</div>)}
    </div>

    {tab==="claims"&&<>
      {claims.length===0&&<div style={{textAlign:"center",color:"var(--dm)",fontSize:13,padding:20}}>{lang==="fa"?"درخواستی نیست":"No claims yet"}</div>}
      {claims.map(c=>{
        const u=users[c.user_id];
        const rc=rewardRefs[c.user_id]||{total:0,verified:0,flagged:0};
        return<div key={c.id} className="cd" style={{padding:12,marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

              <div style={{fontSize:13,fontWeight:700}}>{u?.full_name||"Unknown"}</div>
              <div style={{fontSize:10,color:"var(--dm)"}}>{u?.email}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="m" style={{fontSize:18,fontWeight:700,color:"var(--G)"}}>${c.amount}</div>
              <div style={{fontSize:9,color:"var(--dm)"}}>Tier {c.tier}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4,marginBottom:8}}>
            <span style={{fontSize:9,padding:"3px 8px",borderRadius:6,background:"color-mix(in srgb,var(--G) 10%,transparent)",color:"var(--G)",fontWeight:600}}>✓ {rc.verified} verified</span>
            <span style={{fontSize:9,padding:"3px 8px",borderRadius:6,background:"color-mix(in srgb,var(--Y) 10%,transparent)",color:"var(--Y)",fontWeight:600}}>⏳ {rc.total-rc.verified-rc.flagged} pending</span>
            {rc.flagged>0&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:6,background:"color-mix(in srgb,var(--R) 10%,transparent)",color:"var(--R)",fontWeight:600}}>⚠ {rc.flagged} flagged</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,fontWeight:700,color:statusColor(c.status),padding:"3px 8px",borderRadius:6,background:`color-mix(in srgb,${statusColor(c.status)} 10%,transparent)`}}>{c.status.toUpperCase()}</span>
            {c.admin_note&&<span style={{fontSize:9,color:"var(--dm)"}}>{c.admin_note}</span>}

          </div>

              <div style={{display:"flex",gap:6}}>
                <button className="bt" style={{background:"var(--G)",flex:1,padding:10,fontSize:12}} onClick={()=>updateClaim(c.id,"approved")}>✓ {lang==="fa"?"تأیید":"Approve"}</button>
                <button className="bt" style={{background:"var(--B)",flex:1,padding:10,fontSize:12}} onClick={()=>updateClaim(c.id,"paid")}>💰 {lang==="fa"?"پرداخت شد":"Paid"}</button>
                <button className="bt" style={{background:"var(--R)",flex:1,padding:10,fontSize:12}} onClick={()=>updateClaim(c.id,"rejected")}>✗ {lang==="fa"?"رد":"Reject"}</button>

            </div>:<div onClick={()=>setEditId(c.id)} style={{marginTop:8,textAlign:"center",padding:8,borderRadius:8,border:"1px solid var(--brd)",cursor:"pointer",fontSize:11,fontWeight:600,color:"var(--B)"}}>
              {lang==="fa"?"بررسی و تصمیم":"Review & Decide"}
            </div>}
          </>}
          {c.status==="approved"&&<div style={{display:"flex",gap:6,marginTop:8}}>
            <button className="bt" style={{background:"var(--B)",flex:1,padding:10,fontSize:12}} onClick={()=>updateClaim(c.id,"paid")}>💰 {lang==="fa"?"پرداخت شد":"Mark Paid"}</button>
          </div>}
        </div>

    </>}

    {tab==="flagged"&&<>
      {flaggedList.length===0&&<div style={{textAlign:"center",color:"var(--dm)",fontSize:13,padding:20}}>{lang==="fa"?"رفرال مشکوکی نیست":"No flagged referrals"}</div>}
      {flaggedList.map(f=>{
        const referrer=users[f.referrer_id];
        const referred=users[f.referred_id];
        return<div key={f.id} className="cd" style={{padding:12,marginBottom:6}}>

    {tab==="stats"&&<>
      <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{lang==="fa"?"رتبه‌بندی دعوت‌کنندگان":"Top Referrers"}</div>
      {Object.entries(rewardRefs).sort((a,b)=>b[1].verified-a[1].verified).slice(0,20).map(([uid,rc],i)=>{

          <div style={{width:24,height:24,borderRadius:"50%",background:i<3?"color-mix(in srgb,var(--Y) 15%,transparent)":"var(--bg)",border:"1px solid var(--brd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"var(--Y)":"var(--dm)"}}>{i+1}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600}}>{u?.full_name||"Unknown"}</div>
            <div style={{fontSize:9,color:"var(--dm)"}}>{u?.email}</div>

            <div className="m" style={{fontSize:13,fontWeight:700,color:"var(--G)"}}>{rc.verified}<span style={{fontSize:9,color:"var(--dm)",fontWeight:400}}>/{rc.total}</span></div>

          </div>
        </div>
      })}
    </>}
  </div>);
}

/* ─── Share Card Generator (Admin Only) ─── */
async function generateShareCard(type,data){
  const W=1080;
  const PAD=72;
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";

  // ─── Theme colors matching app ───
  const TH={
    bg:isDark?"#0a0a0c":"#f5f5f7",
    bg2:isDark?"#18181b":"#ffffff",
    card:isDark?"#1c1c1e":"#ffffff",
    cardBorder:isDark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)",
    tx:isDark?"#e5e5e7":"#1d1d1f",
    tx2:isDark?"#a1a1aa":"#424245",
    mu:isDark?"#71717a":"#86868b",
    dm:isDark?"#52525b":"#aeaeb2",
    brd:isDark?"rgba(255,255,255,.08)":"#e4e4e7",
    brdLight:isDark?"rgba(255,255,255,.04)":"#f4f4f5",
    R:isDark?"#ff453a":"#ff3b30",
    G:isDark?"#30d158":"#28cd41",
    B:isDark?"#0a84ff":"#0071e3",
    boxBg:isDark?"#1c1c1e":"#f9fafb",
    boxBrd:isDark?"rgba(255,255,255,.08)":"#e4e4e7",
    buyBg:isDark?"#0a2615":"#f0fdf4",
    buyC:isDark?"#30d158":"#16a34a",
    sellBg:isDark?"#2a0a0a":"#fef2f2",
    sellC:isDark?"#ff453a":"#dc2626",
    activeBg:isDark?"#0a1628":"#eff6ff",
    activeC:isDark?"#0a84ff":"#2563eb",
    tpBg:isDark?"#0a2615":"#f0fdf4",
    tpC:isDark?"#30d158":"#16a34a",
    slBg:isDark?"#2a0a0a":"#fef2f2",
    slC:isDark?"#ff453a":"#dc2626",
    wmText:isDark?"#3a3a3c":"#d4d4d8",
    wmDot:isDark?"#ff6961":"#fca5a5",
  };

  const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.roundRect(x,y,w,h,r);};

  const wrapText=(text,x,y,maxW,lineH,font,color)=>{
    ctx.font=font;ctx.fillStyle=color;
    const words=text.split(" ");let line="";
    words.forEach(w=>{
      const test=line+w+" ";
      if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,y);y+=lineH;line=w+" "}
      else line=test;
    });
    if(line)ctx.fillText(line.trim(),x,y);
    return y;
  };

  // Pre-calculate height
  let calcH=160;
  if(type==="signal"){
    const s=data;
    calcH+=70;calcH+=20;calcH+=100;calcH+=12;
    const tpCount=[s.take_profit,s.tp2,s.tp3].filter(Boolean).length;
    if(tpCount>0)calcH+=100;
    calcH+=20;calcH+=40;
    if(s.pnl)calcH+=20;
    calcH+=140;
  } else {
    calcH+=20;
    ctx.font="bold 40px system-ui";
    const titleW=ctx.measureText(data.title||"").width;
    calcH+=Math.ceil(titleW/(W-PAD*2)||1)*50+20;
    if(data.description){ctx.font="400 20px system-ui";const dW=ctx.measureText(data.description.slice(0,400)).width;calcH+=Math.min(Math.ceil(dW/(W-PAD*2)||1),8)*30+30}
    if(data.image_url){const imgCount=(data.image_url||"").split(",").filter(Boolean).length;calcH+=imgCount===1?620:Math.ceil(imgCount/2)*500}
    calcH+=140;
  }

  const H=Math.max(800,calcH);
  c.width=W;c.height=H;

  // ─── Background ───
  ctx.fillStyle=TH.bg;ctx.fillRect(0,0,W,H);
  // Subtle gradient mesh like the app
  if(isDark){
    const g1=ctx.createRadialGradient(W*0.15,H*0.05,0,W*0.15,H*0.05,400);
    g1.addColorStop(0,"rgba(0,113,227,.06)");g1.addColorStop(1,"transparent");ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
    const g2=ctx.createRadialGradient(W*0.85,H*0.15,0,W*0.85,H*0.15,350);
    g2.addColorStop(0,"rgba(191,90,242,.04)");g2.addColorStop(1,"transparent");ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  } else {
    const g1=ctx.createRadialGradient(W*0.15,H*0.05,0,W*0.15,H*0.05,400);
    g1.addColorStop(0,"rgba(0,113,227,.06)");g1.addColorStop(1,"transparent");ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
    const g2=ctx.createRadialGradient(W*0.85,H*0.15,0,W*0.85,H*0.15,350);
    g2.addColorStop(0,"rgba(191,90,242,.04)");g2.addColorStop(1,"transparent");ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  }

  // ─── Header: Logo + Date ───
  ctx.font="bold 38px 'DM Sans',system-ui,sans-serif";
  ctx.fillStyle=TH.tx;ctx.fillText("Fxscalproom",PAD,68);
  const logoW=ctx.measureText("Fxscalproom").width;
  ctx.fillStyle=TH.R;ctx.fillText(".",PAD+logoW+4,68);

  ctx.font="500 16px 'DM Sans',system-ui,sans-serif";
  ctx.fillStyle=TH.mu;ctx.textAlign="right";
  ctx.fillText(new Date().toLocaleDateString("en",{year:"numeric",month:"long",day:"numeric"}),W-PAD,63);
  ctx.textAlign="left";

  // Separator
  ctx.strokeStyle=TH.brd;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD,95);ctx.lineTo(W-PAD,95);ctx.stroke();

  let Y=130;

  if(type==="signal"){
    const s=data;
    const isBuy=s.type==="BUY";
    const innerW=W-PAD*2;

    // ─── Card background ───
    rr(PAD-20,Y-20,innerW+40,0,20);// placeholder for measure

    // ─── Pair + BUY/SELL badge + Status ───
    ctx.font="bold 42px 'DM Mono',monospace";
    ctx.fillStyle=TH.tx;ctx.fillText(s.pair||"",PAD,Y+36);

    const badgeColor=isBuy?TH.buyC:TH.sellC;
    const badgeBg=isBuy?TH.buyBg:TH.sellBg;
    const pairW=ctx.measureText(s.pair||"").width;
    const bx=PAD+pairW+16;
    rr(bx,Y+10,80,32,16);ctx.fillStyle=badgeBg;ctx.fill();
    rr(bx,Y+10,80,32,16);ctx.strokeStyle=badgeColor;ctx.lineWidth=1.5;ctx.stroke();
    ctx.font="bold 15px 'DM Sans',system-ui,sans-serif";
    ctx.fillStyle=badgeColor;
    const btW=ctx.measureText(s.type).width;
    ctx.fillText(s.type,bx+40-btW/2,Y+31);

    const statusLabel=s.status==="active"?"ACTIVE":s.status==="tp_hit"?"TP HIT":"SL HIT";
    const statusColor=s.status==="active"?TH.activeC:s.status==="tp_hit"?TH.tpC:TH.slC;
    const statusBg=s.status==="active"?TH.activeBg:s.status==="tp_hit"?TH.tpBg:TH.slBg;
    ctx.font="bold 14px 'DM Sans',system-ui,sans-serif";
    const slW=ctx.measureText(statusLabel).width;
    const sx=W-PAD-slW-24;
    rr(sx,Y+10,slW+24,32,16);ctx.fillStyle=statusBg;ctx.fill();
    rr(sx,Y+10,slW+24,32,16);ctx.strokeStyle=statusColor;ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=statusColor;ctx.fillText(statusLabel,sx+12,Y+31);
    Y+=65;

    // ─── Helper: draw a box ───
    const drawBox=(x,y,w,h,label,value,valueColor)=>{
      rr(x,y,w,h,14);ctx.fillStyle=TH.boxBg;ctx.fill();
      rr(x,y,w,h,14);ctx.strokeStyle=TH.boxBrd;ctx.lineWidth=1;ctx.stroke();
      ctx.textAlign="center";
      ctx.font="500 14px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle=TH.mu;ctx.fillText(label,x+w/2,y+28);
      ctx.font="bold 22px 'DM Mono',monospace";
      ctx.fillStyle=valueColor||TH.mu;ctx.fillText(value||"",x+w/2,y+h-18);
      ctx.textAlign="left";
    };

    const colGap=12;
    const col2W=(innerW-colGap)/2;
    drawBox(PAD,Y,col2W,90,"Entry",s.entry_price,TH.mu);
    drawBox(PAD+col2W+colGap,Y,col2W,90,"SL",s.stop_loss,TH.slC);
    Y+=102;

    const tps=[{l:"TP1",v:s.take_profit},{l:"TP2",v:s.tp2},{l:"TP3",v:s.tp3}].filter(t=>t.v);
    if(tps.length>0){
      const tpColW=(innerW-(tps.length-1)*colGap)/tps.length;
      tps.forEach((tp,i)=>{
        drawBox(PAD+i*(tpColW+colGap),Y,tpColW,90,tp.l,tp.v,TH.tpC);
      });
      Y+=102;
    }

    Y+=6;
    const dateStr=s.created_at?new Date(s.created_at).toLocaleDateString()+" "+new Date(s.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
    ctx.font="500 16px 'DM Sans',system-ui,sans-serif";
    ctx.fillStyle=TH.mu;ctx.fillText(dateStr,PAD,Y+16);

    if(s.pnl){
      const pnlNeg=s.pnl.startsWith("-");
      ctx.font="bold 20px 'DM Mono',monospace";
      ctx.fillStyle=pnlNeg?TH.slC:TH.tpC;
      ctx.textAlign="right";
      ctx.fillText(s.pnl,W-PAD,Y+16);
      if(s.status==="tp_hit"){ctx.font="bold 18px system-ui";ctx.fillText(" ✓",W-PAD,Y+16)}
      ctx.textAlign="left";
      Y+=30;
    } else {Y+=24}

    if(s.closed_at){
      ctx.font="400 14px 'DM Sans',system-ui,sans-serif";
      ctx.fillStyle=TH.mu;ctx.textAlign="right";
      ctx.fillText("Closed: "+new Date(s.closed_at).toLocaleDateString(),W-PAD,Y+14);
      ctx.textAlign="left";
      Y+=24;
    }

  } else if(type==="analysis"){
    const p=data;

    Y=wrapText(p.title||"",PAD,Y,W-PAD*2,50,"bold 40px 'DM Sans',system-ui,sans-serif",TH.tx);
    Y+=30;

    if(p.description){
      Y=wrapText(p.description.slice(0,400)+(p.description.length>400?"...":""),PAD,Y,W-PAD*2,28,"400 19px 'DM Sans',system-ui,sans-serif",TH.tx2);
      Y+=30;
    }

    if(p.image_url){
      const imgUrls=(p.image_url||"").split(",").map(u=>u.trim()).filter(Boolean);
      const gap=12;
      if(imgUrls.length===1){
        // Single image — full width
        try{
          const img=new Image();img.crossOrigin="anonymous";
          await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=imgUrls[0]});
          const imgW=W-PAD*2;
          const imgH=Math.round((img.height/img.width)*imgW);
          if(Y+imgH+140>c.height){const newH=Y+imgH+140;const tempData=ctx.getImageData(0,0,W,c.height);c.height=newH;ctx.fillStyle=TH.bg;ctx.fillRect(0,0,W,newH);ctx.putImageData(tempData,0,0)}
          ctx.shadowColor=isDark?"rgba(0,0,0,.3)":"rgba(0,0,0,.06)";ctx.shadowBlur=16;ctx.shadowOffsetY=3;
          rr(PAD,Y,imgW,imgH,14);ctx.fillStyle=TH.boxBg;ctx.fill();ctx.shadowColor="transparent";
          ctx.save();rr(PAD,Y,imgW,imgH,14);ctx.clip();ctx.drawImage(img,PAD,Y,imgW,imgH);ctx.restore();
          rr(PAD,Y,imgW,imgH,14);ctx.strokeStyle=TH.brd;ctx.lineWidth=1;ctx.stroke();
          Y+=imgH+20;
        }catch(e){}
      } else {
        // 2 images side by side
        const colW=(W-PAD*2-gap)/2;
        const loadedImgs=[];
        for(let ii=0;ii<imgUrls.length;ii++){
          try{const img=new Image();img.crossOrigin="anonymous";await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=imgUrls[ii]});loadedImgs.push(img)}catch(e){}
        }
        // Draw in rows of 2
        for(let row=0;row<loadedImgs.length;row+=2){
          const img1=loadedImgs[row];
          const img2=loadedImgs[row+1];
          const h1=img1?Math.round((img1.height/img1.width)*colW):0;
          const h2=img2?Math.round((img2.height/img2.width)*colW):0;
          const rowH=Math.max(h1,h2);
          if(Y+rowH+140>c.height){const newH=Y+rowH+140;const tempData=ctx.getImageData(0,0,W,c.height);c.height=newH;ctx.fillStyle=TH.bg;ctx.fillRect(0,0,W,newH);ctx.putImageData(tempData,0,0)}
          // Left image
          if(img1){
            const x1=PAD,y1=Y,iw=colW,ih=h1;
            ctx.shadowColor=isDark?"rgba(0,0,0,.2)":"rgba(0,0,0,.04)";ctx.shadowBlur=10;ctx.shadowOffsetY=2;
            rr(x1,y1,iw,ih,12);ctx.fillStyle=TH.boxBg;ctx.fill();ctx.shadowColor="transparent";
            ctx.save();rr(x1,y1,iw,ih,12);ctx.clip();ctx.drawImage(img1,x1,y1,iw,ih);ctx.restore();
            rr(x1,y1,iw,ih,12);ctx.strokeStyle=TH.brd;ctx.lineWidth=1;ctx.stroke();
            // Badge
            ctx.fillStyle=isDark?"rgba(255,255,255,.8)":"rgba(0,0,0,.5)";rr(x1+iw-40,y1+8,32,22,11);ctx.fill();
            ctx.font="bold 11px 'DM Sans',system-ui";ctx.fillStyle=isDark?"#000":"#fff";ctx.textAlign="center";ctx.fillText(`${row+1}/${loadedImgs.length}`,x1+iw-24,y1+23);ctx.textAlign="left";
          }
          // Right image
          if(img2){
            const x2=PAD+colW+gap,y2=Y,iw=colW,ih=h2;
            ctx.shadowColor=isDark?"rgba(0,0,0,.2)":"rgba(0,0,0,.04)";ctx.shadowBlur=10;ctx.shadowOffsetY=2;
            rr(x2,y2,iw,ih,12);ctx.fillStyle=TH.boxBg;ctx.fill();ctx.shadowColor="transparent";
            ctx.save();rr(x2,y2,iw,ih,12);ctx.clip();ctx.drawImage(img2,x2,y2,iw,ih);ctx.restore();
            rr(x2,y2,iw,ih,12);ctx.strokeStyle=TH.brd;ctx.lineWidth=1;ctx.stroke();
            // Badge
            ctx.fillStyle=isDark?"rgba(255,255,255,.8)":"rgba(0,0,0,.5)";rr(x2+iw-40,y2+8,32,22,11);ctx.fill();
            ctx.font="bold 11px 'DM Sans',system-ui";ctx.fillStyle=isDark?"#000":"#fff";ctx.textAlign="center";ctx.fillText(`${row+2}/${loadedImgs.length}`,x2+iw-24,y2+23);ctx.textAlign="left";
          }
          Y+=rowH+gap;
        }
        Y+=8;
      }
    }
  }

  // ─── Watermark footer ───
  const footerH=100;
  if(Y+footerH>c.height){
    const newH=Y+footerH;
    const tempData=ctx.getImageData(0,0,W,c.height);
    c.height=newH;
    ctx.fillStyle=TH.bg;ctx.fillRect(0,0,W,newH);
    ctx.putImageData(tempData,0,0);
  }

  const wmY=c.height-55;
  ctx.strokeStyle=TH.brdLight;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD,wmY-30);ctx.lineTo(W-PAD,wmY-30);ctx.stroke();

  ctx.textAlign="center";
  ctx.font="bold 26px 'DM Sans',system-ui,sans-serif";
  ctx.fillStyle=TH.wmText;
  const wmText="Fxscalproom";
  const wmTextW=ctx.measureText(wmText).width;
  ctx.fillText(wmText,W/2-6,wmY);
  ctx.fillStyle=TH.wmDot;ctx.fillText(".",W/2+wmTextW/2-2,wmY);

  ctx.font="400 13px 'DM Sans',system-ui,sans-serif";
  ctx.fillStyle=TH.wmText;
  ctx.fillText("t.me/FxScalpRoom  ·  fxscalproom.com",W/2,wmY+24);
  ctx.textAlign="left";

  // ─── Export ───
  return new Promise(res=>{
    c.toBlob(blob=>{
      if(!blob){res(null);return}
      const url=URL.createObjectURL(blob);
      const fname=`fxscalproom_${type}_${Date.now()}.png`;
      if(navigator.share&&navigator.canShare){
        try{
          const file=new File([blob],fname,{type:"image/png"});
          if(navigator.canShare({files:[file]})){
            navigator.share({files:[file],title:"Fxscalproom"}).catch(()=>{});
            res(url);return;
          }
        }catch(e){}
      }
      const a=document.createElement("a");a.href=url;a.download=fname;a.click();
      res(url);
    },"image/png");
  });
}

/* ─── Translate Button (inline with Google Translate API) ─── */
function TranslateBtn({text}){
  const{lang}=useLang();
  const[translated,setTranslated]=useState(null);
  const[loading,setLoading]=useState(false);
  const[open,setOpen]=useState(false);
  if(!text||lang==="en")return null;
  const tl={fa:"fa",ar:"ar",tr:"tr",ru:"ru",es:"es"}[lang]||"en";
  const label=lang==="fa"?"ترجمه":lang==="ar"?"ترجمة":lang==="tr"?"Çevir":lang==="ru"?"Перевести":lang==="es"?"Traducir":"Translate";
  const doTranslate=async()=>{
    if(translated){setOpen(!open);return}
    setLoading(true);
    try{
      const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
      const r=await fetch(url);
      const d=await r.json();
      const result=d[0]?.map(s=>s[0]).join("")||"";
      if(result){setTranslated(result);setOpen(true)}else{setTranslated("⚠");setOpen(true)}
    }catch(e){setTranslated("⚠ Translation unavailable");setOpen(true)}
    setLoading(false);
  };
  return<div style={{marginTop:6}}>
    <div onClick={doTranslate} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:8,background:"color-mix(in srgb,var(--B) 8%,transparent)",border:"1px solid color-mix(in srgb,var(--B) 12%,transparent)",fontSize:11,fontWeight:600,color:"var(--B)",cursor:"pointer",opacity:loading?.6:1}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 5h7"/><path d="M5.5 2v3"/><path d="M3.5 8c1.7 2.4 4.3 4 7.5 4"/><path d="M10 5c0 3-1.5 5.5-4 7.5"/><path d="M14 17l3-6 3 6"/><path d="M15.5 15h5"/></svg>
      {loading?"...":(open?("▲ "+label):("▼ "+label))}
    </div>
    {open&&translated&&<div style={{marginTop:6,padding:10,borderRadius:10,background:"color-mix(in srgb,var(--B) 5%,transparent)",border:"1px solid color-mix(in srgb,var(--B) 10%,transparent)",maxHeight:200,overflowY:"auto",fontSize:12,color:"var(--tx2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{translated}</div>}
  </div>;
}

/* ─── Post Detail Modal ─── */
function PostModal({post,onClose}){
  const{lang}=useLang();
  const[zoomed,setZoomed]=useState(false);
  const[scale,setScale]=useState(1);
  const[pos,setPos]=useState({x:0,y:0});
  const lastDist=useRef(0);
  const lastPos=useRef({x:0,y:0});
  const dragging=useRef(false);
  useEffect(()=>{if(post){setThemeColor("#2a2a2a");return()=>setThemeColor(getThemeColor())}},[post]);
  if(!post)return null;
  const handleTouchStart=(e)=>{
    if(e.touches.length===2){lastDist.current=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
    else if(e.touches.length===1&&scale>1){dragging.current=true;lastPos.current={x:e.touches[0].clientX-pos.x,y:e.touches[0].clientY-pos.y}}
  };
  const handleTouchMove=(e)=>{
    if(e.touches.length===2){e.preventDefault();const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const newScale=Math.min(5,Math.max(1,scale*(dist/lastDist.current)));setScale(newScale);lastDist.current=dist;if(newScale<=1)setPos({x:0,y:0})}
    else if(e.touches.length===1&&dragging.current&&scale>1){setPos({x:e.touches[0].clientX-lastPos.current.x,y:e.touches[0].clientY-lastPos.current.y})}
  };
  const handleTouchEnd=()=>{dragging.current=false;if(scale<=1){setScale(1);setPos({x:0,y:0})}};
  const downloadImg=()=>{const a=document.createElement("a");a.href=post.image_url;a.download=`${post.title||"analysis"}.jpg`;a.target="_blank";a.click()};
  const resetZoom=()=>{setScale(1);setPos({x:0,y:0});setZoomed(false)};
  return(<div className="modal-overlay modal-overlay-glass" onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{maxWidth:zoomed?"100%":"400px",width:"100%",borderRadius:zoomed?0:28,maxHeight:zoomed?"100vh":"90vh",overflow:"hidden",overflowY:"auto",boxShadow:"0 8px 60px rgba(0,0,0,.1)",border:"1px solid var(--gb)"}}>
    {/* Glass area — image + category + close */}
    <div className="modal-glass-ios" style={{padding:zoomed?0:20,paddingBottom:zoomed?0:12}}>
    {!zoomed&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <span style={{fontSize:11,color:"var(--mu)",fontWeight:600}}>{post.category?.toUpperCase()}</span>
      <div onClick={onClose} style={{cursor:"pointer",color:"var(--mu)"}}>{IC.x}</div>
    </div>}
    {post.image_url&&<div style={{position:"relative"}}>
      {post.image_url.includes(",")&&!zoomed?<ImageCarousel urls={post.image_url} style={{width:"100%",borderRadius:12,marginBottom:8}} borderRadius={12}/>
      :zoomed?<div style={{width:"100%",height:"80vh",overflow:"hidden",touchAction:"none"}} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
        <img src={(post.image_url||"").split(",")[0]} style={{width:"100%",height:"100%",objectFit:"contain",transform:`scale(${scale}) translate(${pos.x/scale}px,${pos.y/scale}px)`,transition:dragging.current?"none":"transform 0.1s"}} alt=""/>
      </div>:<img src={(post.image_url||"").split(",")[0]} onClick={()=>setZoomed(true)} style={{width:"100%",borderRadius:12,marginBottom:8,cursor:"zoom-in"}} alt=""/>}
      <div style={{display:"flex",gap:6,marginBottom:0}}>
        {!zoomed&&<div onClick={()=>setZoomed(true)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:10,borderRadius:10,background:"color-mix(in srgb,var(--tx) 6%,transparent)",border:"1px solid var(--brd)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--mu)"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Zoom
        </div>}
        {zoomed&&<div onClick={resetZoom} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:10,borderRadius:10,background:"color-mix(in srgb,var(--tx) 6%,transparent)",border:"1px solid var(--brd)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--mu)"}}>
          {IC.x} Close
        </div>}
        <div onClick={()=>generateShareCard("analysis",post)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:10,borderRadius:10,background:"color-mix(in srgb,var(--B) 8%,transparent)",border:"1px solid color-mix(in srgb,var(--B) 15%,transparent)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--B)"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </div>
      </div>
    </div>}
    </div>
    {/* Solid area — text content, readable */}
    {!zoomed&&<div className="modal-text-solid" style={{padding:"18px 20px 20px"}}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,lineHeight:1.4,color:"var(--tx)"}}>{post.title}</h2>
      {post.description&&<p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:6,whiteSpace:"pre-wrap"}}>{post.description}</p>}
      <TranslateBtn text={[post.title,post.description].filter(Boolean).join("\n\n")}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--dm)",marginTop:8}}>
        <span>{post.created_at?new Date(post.created_at).toLocaleDateString()+"  ·  "+relativeTime(post.created_at,lang):""}</span>
      </div>
      {post.is_premium&&<div style={{marginTop:12,fontSize:11,fontWeight:600,color:"var(--R)",background:"color-mix(in srgb,var(--R) 10%,transparent)",padding:"4px 10px",borderRadius:8,display:"inline-block"}}>PREMIUM</div>}
    </div>}
  </div></div>);
}

/* ─── Signal Edit Modal ─── */
function SignalEditModal({sig,onClose,onSave}){
  const{t}=useLang();
  useEffect(()=>{if(sig){setThemeColor("#2a2a2a");return()=>setThemeColor(getThemeColor())}},[sig]);
  const[status,setStatus]=useState(sig?.status||"active");
  const[pnl,setPnl]=useState(sig?.pnl||"");
  const[closedAt,setClosedAt]=useState(sig?.closed_at?sig.closed_at.slice(0,16):"");
  const[etp1,setEtp1]=useState(sig?.take_profit||"");
  const[etp2,setEtp2]=useState(sig?.tp2||"");
  const[etp3,setEtp3]=useState(sig?.tp3||"");
  const[pubDate,setPubDate]=useState(sig?.created_at?sig.created_at.slice(0,16):"");
  const[sigPr,setSigPr]=useState(sig?.is_premium||false);
  const[sigTerm,setSigTerm]=useState(sig?.signal_term||"short");
  const[ePair,setEPair]=useState(sig?.pair||"");
  if(!sig)return null;

function LiveClock(){
  const[time,setTime]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(i)},[]);
  return<span className="m" style={{fontSize:11,color:"var(--tx2)",fontWeight:500}}>{time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>;
}

function useOnlineCount(token){
  const[count,setCount]=useState(0);
  useEffect(()=>{
    if(!token)return;
    const fetchCount=async()=>{
      try{
        const fiveMinAgo=new Date(Date.now()-5*60*1000).toISOString();
        const r=await fetch(`${SB}/rest/v1/Users?last_seen=gte.${fiveMinAgo}&select=id`,{headers:H(token)});
        const d=await r.json();
        setCount(Array.isArray(d)?d.length:0);
      }catch(e){setCount(0)}
    };
    fetchCount();
    const i=setInterval(fetchCount,10000);
    return()=>clearInterval(i);
  },[token]);
  return count;
}

function OnlineCounter({token,isAdmin}){
  const count=useOnlineCount(token);
  if(!count||!isAdmin)return null;
  return<span className="m" style={{fontSize:11,color:"var(--tx2)",fontWeight:500}}>{count} {AE.users}</span>;
}

/* ─── Image Carousel (Instagram-style swipe) ─── */
function ImageCarousel({urls,style,borderRadius}){
  const[idx,setIdx]=useState(0);
  const touchX=useRef(0);
  const imgs=urls.split(",").filter(Boolean);
  if(imgs.length<=1)return<img src={imgs[0]||""} style={{...style,borderRadius:borderRadius||12}} alt=""/>;
  return<div style={{position:"relative",overflow:"hidden",borderRadius:borderRadius||12}}>
    <div style={{display:"flex",transition:"transform .3s ease",transform:`translateX(-${idx*100}%)`}}
      onTouchStart={e=>{touchX.current=e.touches[0].clientX}}
      onTouchEnd={e=>{const dx=e.changedTouches[0].clientX-touchX.current;if(dx<-40&&idx<imgs.length-1)setIdx(idx+1);if(dx>40&&idx>0)setIdx(idx-1)}}>
      {imgs.map((u,i)=><img key={i} src={u} style={{...style,borderRadius:0,flexShrink:0,width:"100%"}} alt=""/>)}
    </div>
    <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.55)",borderRadius:10,padding:"3px 8px",fontSize:11,fontWeight:700,color:"#fff",letterSpacing:.5}}>{idx+1}/{imgs.length}</div>
    <div style={{display:"flex",justifyContent:"center",gap:5,paddingTop:8,paddingBottom:4}}>
      {imgs.map((_,i)=><div key={i} style={{width:i===idx?18:6,height:6,borderRadius:3,background:i===idx?"var(--R)":"var(--brd2)",transition:".2s"}}/>)}
    </div>
  </div>;
}

/* ─── Promo Hook (shared between Plans & Admin) ─── */
function usePromo(token){
  const[promo,setPromo]=useState(null);
  const load=useCallback(async()=>{
    try{
      const r=await fetch(`${SB}/rest/v1/PromoSales?is_active=eq.true&order=created_at.desc&limit=1`,{headers:H(token||SK)});
      const d=await r.json();
      if(Array.isArray(d)&&d[0]){
        const p=d[0];
        const now=new Date();
        const end=new Date(p.end_date);
        if(end>now){setPromo(p);return}
      }
      setPromo(null);
    }catch(e){setPromo(null)}
  },[token]);
  useEffect(()=>{load();const i=setInterval(load,60000);return()=>clearInterval(i)},[load]);
  return{promo,reloadPromo:load};
}

/* ─── Countdown Timer ─── */
function Countdown({endDate}){
  const[left,setLeft]=useState({d:0,h:0,m:0,s:0});
  useEffect(()=>{
    const calc=()=>{
      const diff=Math.max(0,new Date(endDate)-new Date());
      setLeft({d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)});
    };
    calc();const i=setInterval(calc,1000);return()=>clearInterval(i);
  },[endDate]);
  const Box=({v,l})=><div style={{textAlign:"center",flex:1}}>
    <div className="m" style={{fontSize:22,fontWeight:700,color:"var(--R)",background:"color-mix(in srgb,var(--R) 8%,transparent)",borderRadius:10,padding:"8px 0"}}>{String(v).padStart(2,"0")}</div>
    <div style={{fontSize:9,color:"var(--dm)",marginTop:4,fontWeight:600}}>{l}</div>
  </div>;
  return<div style={{display:"flex",gap:6}}>
    {left.d>0&&<Box v={left.d} l="Day"/>}
    <Box v={left.h} l="Hour"/><Box v={left.m} l="Min"/><Box v={left.s} l="Sec"/>
  </div>;
}
